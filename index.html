<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="stylesheet" href="./styles.css" />
    <title>God Mode Mobile</title>
  </head>
  <body>
    <div id="globalLoader" class="loader-overlay" style="display: none;">
      <div class="loader"></div>
    </div>

    <div class="app-container">
      <aside class="sidebar-nav">
        <div class="sidebar-header">
          <h3>Chats</h3>
          <button onclick="newChat()" class="ghost-btn">+</button>
        </div>
        <div id="sidebarChats" class="sidebar-content"></div>
        <div class="sidebar-footer">
          <div class="menu-item"><span>Providers:</span> <small>OpenAI, Claude, Gemini</small></div>
          <div class="menu-item"><span>Workers:</span> <small>GitHub, Vercel, PC-Local</small></div>
          <div class="menu-item"><span>Security:</span> <small>Vault, Settings</small></div>
        </div>
      </aside>

      <main class="app-shell">
        <header class="topbar">
          <button onclick="toggleSidebar()" class="hamburger">☰</button>
          <div class="topbar-center">
            <div class="eyebrow">God Mode</div>
            <h1>Mobile Cockpit</h1>
          </div>
          <div id="chatStatus" class="badge badge-neutral">offline</div>
        </header>

        <section class="panel cockpit-panel">
          <div class="panel-title-row">
            <h2>Status</h2>
            <span id="decisionBadge" class="badge badge-neutral">cloud</span>
          </div>
          <div id="headlineBox" class="headline-box">Pronto a operar.</div>
          <div class="quick-actions">
            <button onclick="setupEnv()" class="secondary-btn">Preparar PC</button>
            <button onclick="newChat()" class="secondary-btn">Novo Chat</button>
          </div>
        </section>

        <section class="chat-section">
          <div id="chatMessages" class="chat-messages">
            <div class="msg system">Modo Cloud Ativo.</div>
          </div>
          <div class="chat-input-area">
            <input id="chatInput" type="text" placeholder="Comando para o God Mode..." />
            <button id="chatSendBtn" class="primary-btn">➤</button>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
