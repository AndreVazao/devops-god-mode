<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="stylesheet" href="./styles.css" />
    <title>God Mode Mobile | Codex Shell</title>
  </head>
  <body>
    <div id="globalLoader" class="loader-overlay" style="display: none;">
      <div class="loader"></div>
    </div>

    <div class="app-container">
      <aside class="sidebar-nav">
        <div class="sidebar-header">
          <h3>GOD MODE</h3>
          <button onclick="newChat()" class="new-chat-btn">+ Novo Chat</button>
        </div>
        <div id="sidebarChats" class="sidebar-content"></div>
        <div class="sidebar-footer">
          <div class="menu-item"><span>Chats</span></div>
          <div class="menu-item"><span>Repos</span></div>
          <div class="menu-item"><span>Providers</span></div>
          <div class="menu-item"><span>Workers</span></div>
          <div class="menu-item"><span>Vault</span></div>
          <div class="menu-item"><span>Settings</span></div>
        </div>
      </aside>

      <main class="app-shell">
        <header class="topbar">
          <button onclick="toggleSidebar()" class="hamburger">☰</button>
          <div class="topbar-center">
            <div class="eyebrow">DevOps Autonomous Agent</div>
            <h1>Codex Cockpit</h1>
          </div>
          <div id="chatStatus" class="badge badge-neutral">offline</div>
        </header>

        <div id="dropZone" class="drop-zone-overlay">Arrasta ficheiros aqui para o God Mode</div>

        <section class="panel cockpit-panel">
          <div class="panel-title-row">
            <span id="decisionBadge" class="badge badge-neutral">cloud mode</span>
          </div>
          <div id="headlineBox" class="headline-box">Pronto a operar.</div>
        </section>

        <section class="chat-section">
          <div id="chatMessages" class="chat-messages">
            <div class="msg system">Modo Cloud Ativo.</div>
          </div>
          <div class="chat-input-area">
            <input id="chatInput" type="text" placeholder="Comando para o God Mode..." />
            <button id="chatSendBtn" class="primary-btn">➤</button>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
