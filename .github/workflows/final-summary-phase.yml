name: Final Summary Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/final-summary-plan.md'
      - 'backend/contracts/final_summary.example.json'
      - 'backend/contracts/final_summary_line.example.json'
      - 'backend/app/services/final_summary_service.py'
      - 'backend/app/routes/final_summary.py'
      - 'backend/main.py'
      - '.github/workflows/final-summary-phase.yml'

jobs:
  final-summary-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate final summary layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.final_summary_service import final_summary_service

          summaries = final_summary_service.get_summaries()["summaries"]
          first_project_id = summaries[0]["recovery_project_id"]
          lines = final_summary_service.get_summary_lines(first_project_id)["lines"]
          package = final_summary_service.get_summary_package(first_project_id)["package"]
          next_action = final_summary_service.get_next_summary_action()["next_summary_action"]
          route_paths = {route.path for route in app.routes}

          assert summaries, "Expected at least one final summary session"
          assert lines, "Expected at least one final summary line"
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/final-summary/status" in route_paths
          assert "/api/final-summary/summaries" in route_paths
          assert "/api/final-summary/lines" in route_paths
          assert "/api/final-summary/next-summary-action" in route_paths
          print("final summary phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Final Summary Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for final summary validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
