name: Phase 202 First PC Install Ready Pack Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/first_pc_install_ready_pack_service.py'
      - 'backend/app/routes/first_pc_install_ready_pack.py'
      - 'backend/app/routes/first_pc_install_ready_pack_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/first-pc-install-ready-pack.md'
      - '.github/workflows/phase202-first-pc-install-ready-pack-smoke.yml'

jobs:
  phase202-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 202 file contract
        run: |
          python - <<'PY'
          from pathlib import Path

          files = {
              'service': Path('backend/app/services/first_pc_install_ready_pack_service.py'),
              'route': Path('backend/app/routes/first_pc_install_ready_pack.py'),
              'frontend': Path('backend/app/routes/first_pc_install_ready_pack_frontend.py'),
              'global_state': Path('backend/app/services/god_mode_global_state_service.py'),
              'docs': Path('docs/orchestration/first-pc-install-ready-pack.md'),
          }
          for label, path in files.items():
              assert path.exists(), f'Missing {label}: {path}'

          service = files['service'].read_text(encoding='utf-8')
          for marker in [
              'class FirstPcInstallReadyPackService',
              'one_click_local_start_contract',
              'GodModeDesktop.exe',
              'http://127.0.0.1:8000/app/home',
              'ESSENTIAL_LOCAL_ROUTES',
              'readiness_pack',
              'can_store_secrets_in_repo',
              'can_auto_update_without_gate',
              'first_real_install_launcher_service',
              'first_pc_runtime_verification_service',
          ]:
              assert marker in service, marker

          route = files['route'].read_text(encoding='utf-8')
          for endpoint in ['/status', '/one-click-local-start-contract', '/ready-pack', '/checklist', '/package']:
              assert endpoint in route, f'Missing endpoint {endpoint}'
          assert 'prefix="/api/first-pc-install-ready-pack"' in route

          frontend = files['frontend'].read_text(encoding='utf-8')
          for marker in ['First PC Install Ready Pack', '/api/first-pc-install-ready-pack/package', '/api/first-pc-install-ready-pack/checklist', '/app/first-pc-install-ready-pack', '/app/pc-install-ready']:
              assert marker in frontend, marker

          global_state = files['global_state'].read_text(encoding='utf-8')
          for marker in ['current_phase": 202', 'latest_merged_phase": 201', 'first_pc_install_ready_pack_model', '/api/first-pc-install-ready-pack/package', 'pc_install_ready_pack_route']:
              assert marker in global_state, marker

          docs = files['docs'].read_text(encoding='utf-8')
          for marker in ['/api/first-pc-install-ready-pack/package', 'GodModeDesktop.exe', 'can_auto_update_without_gate=false', 'assistida']:
              assert marker in docs, marker

          workflow_dir = Path('.github/workflows')
          phase_workflows = sorted(path.name for path in workflow_dir.glob('phase*-*.yml'))
          assert phase_workflows == ['phase202-first-pc-install-ready-pack-smoke.yml'], phase_workflows

          print('phase 202 first pc install ready pack file contract passed')
          PY
