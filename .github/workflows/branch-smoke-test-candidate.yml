name: Branch Smoke Test Candidate

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/**'
      - 'feat/**'
      - 'fix/**'
      - 'hotfix/**'

jobs:
  backend-smoke-candidate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax smoke check
        run: |
          python -m compileall .

      - name: Import smoke check (candidate)
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: test_key
          GITHUB_TOKEN: test_github_token
          VERCEL_TOKEN: test_vercel_token
          OPENAI_KEY: test_openai_key
        run: |
          python - <<'PY'
          import importlib
          modules = [
              'main_candidate',
              'main_v13',
              'app.routes.github_scan',
              'app.routes.registry',
              'app.routes.repo_tree_v13',
              'app.routes.ops_final_candidate',
              'app.services.code_intake_parser_v1',
              'app.services.code_intake_pipeline_v1',
              'app.services.git_ops_plan_v1',
              'app.services.repo_resolution_engine_v1',
              'app.services.browser_prompt_builder_v1',
              'app.services.workflow_error_intake_v1',
              'app.services.workflow_repair_prompt_v1',
              'app.services.approval_shell_v1',
              'app.services.repo_visibility_policy_v1',
              'app.services.pr_execution_plan_v1',
              'app.services.ops_execution_pipeline_v1',
              'app.services.mobile_cockpit_payload_v1',
              'app.services.repo_tree_engine_v4',
              'app.services.repo_tree_action_plan_v3',
          ]
          for name in modules:
              importlib.import_module(name)
              print(f'OK import: {name}')
          PY

      - name: FastAPI route surface check (candidate)
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: test_key
          GITHUB_TOKEN: test_github_token
          VERCEL_TOKEN: test_vercel_token
          OPENAI_KEY: test_openai_key
        run: |
          python - <<'PY'
          from main_candidate import app
          paths = sorted(route.path for route in app.routes)
          required = [
              '/ops/status',
              '/ops/code-intake',
              '/ops/git-ops-plan',
              '/ops/workflow-error-intake',
              '/ops/repo-resolution',
              '/ops/browser-prompt',
              '/ops/intake-pipeline',
              '/ops/approval-shell',
              '/ops/repo-visibility-policy',
              '/ops/pr-execution-plan',
              '/ops/workflow-repair-prompt',
              '/ops/execution-pipeline',
              '/ops/mobile-cockpit',
              '/repo/tree/status',
              '/repo/tree/preview',
              '/repo/tree/action-plan',
              '/repo/tree/cockpit',
              '/repo/tree/drift',
          ]
          missing = [path for path in required if path not in paths]
          if missing:
              raise SystemExit(f'Missing routes: {missing}')
          print('OK routes:', required)
          PY
