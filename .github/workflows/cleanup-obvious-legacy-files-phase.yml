name: Cleanup Obvious Legacy Files Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/cleanup-obvious-legacy-files-plan.md'
      - '.github/workflows/cleanup-obvious-legacy-files-phase.yml'

jobs:
  cleanup-obvious-legacy-files-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate obvious legacy removals
        run: |
          test ! -f .github/workflows/platform-control-hardening-phase.yml
          test ! -f backend/app_main.py
          test ! -f backend/main_candidate.py
          test ! -f backend/repo_tree_service.py
          test ! -f docs/z_test.txt
          test ! -f backend/app/routes/ops_final_candidate.py
          test ! -f backend/app/routes/ops_v1.py
          test ! -f backend/app/routes/ops_v2.py
          test ! -f backend/app/routes/ops_v3.py
          test ! -f backend/app/routes/ops_v4.py
          test ! -f backend/app/routes/ops_v5.py
          test ! -f backend/app/routes/ops_v6.py
          test ! -f backend/app/routes/ops_v7.py
          test ! -f backend/app/routes/ops_v8.py

      - name: Build summary
        run: |
          echo '## Cleanup Obvious Legacy Files Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed obvious legacy files, duplicate entrypoints, and old ops routes.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Next cleanup should run an import/reference sweep before deleting repo_tree and versioned helper families.' >> "$GITHUB_STEP_SUMMARY"
