name: Phase 187 Conversation Requirement Ledger Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/conversation_requirement_ledger.py'
      - 'backend/app/services/conversation_requirement_ledger_service.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/conversation-requirement-ledger.md'
      - '.github/workflows/phase187-conversation-requirement-ledger-smoke.yml'

jobs:
  phase187-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 187 conversation requirement ledger
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.conversation_requirement_ledger_service import conversation_requirement_ledger_service
          from app.services.god_mode_global_state_service import god_mode_global_state_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/conversation-requirement-ledger/status",
              "/api/conversation-requirement-ledger/policy",
              "/api/conversation-requirement-ledger/analyze-text",
              "/api/conversation-requirement-ledger/analyze-messages",
              "/api/conversation-requirement-ledger/compare-project",
              "/api/conversation-requirement-ledger/open-requirements",
              "/api/conversation-requirement-ledger/realness-scorecard",
              "/api/conversation-requirement-ledger/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 187 routes: {missing}"

          status = conversation_requirement_ledger_service.status()
          assert status["ok"] is True
          assert status["request_led"] is True
          assert status["ai_responses_are_proposals_until_decision_or_validation"] is True
          assert status["realness_gate_required"] is True

          policy = conversation_requirement_ledger_service.policy()
          assert policy["ok"] is True
          assert policy["policy"]["preserves_old_requests"] is True
          assert "God Mode started cloud" in policy["policy"]["example_direction_change"]

          transcript = """
          Oner: Quero que o God Mode leia conversas das várias IAs e diferencie os meus pedidos das respostas da IA. Não esquecer que tem que sacar scripts e comparar com o que foi decidido.
          Assistant: Podemos criar um ledger para separar operator_request, ai_response, decision e script_block. Endpoint /api/conversation-requirement-ledger/package.
          Oner: O God Mode começou cloud com Supabase Render e Vercel mas migramos para PC brain e mobile cockpit; os pedidos antigos não podem desaparecer.
          Assistant: Decisão: migrar para PC brain + mobile cockpit, mantendo cloud refs como contexto histórico. PR #999 merged com smoke validado.
          Assistant: ```python
          print('hello from generated script')
          ```
          Oner: Preciso que isto seja real e não fictício, com prova de endpoints, PRs, merges e GitHub Actions.
          """
          result = conversation_requirement_ledger_service.analyze_text(
              project_key="GOD_MODE",
              transcript_text=transcript,
              source_provider="chatgpt",
              source_id="phase187-smoke",
              store=True,
          )
          assert result["ok"] is True
          analysis = result["analysis"]
          assert analysis["operator_message_count"] >= 3
          assert analysis["ai_message_count"] >= 2
          assert analysis["request_count"] >= 2
          assert analysis["decision_count"] >= 2
          assert analysis["script_count"] >= 1
          assert analysis["migration_count"] >= 1
          assert analysis["stores_secret_values"] is False

          request_themes = {theme for item in analysis["requests"] for theme in item["themes"]}
          assert "conversation_intake" in request_themes
          assert "request_decision_diff" in request_themes
          assert "realness" in request_themes

          migration_types = {item["migration_type"] for item in analysis["migrations"]}
          assert "cloud_to_pc" in migration_types or "provider_cloud_to_pc" in migration_types

          script = analysis["scripts"][0]
          assert script["requires_reconciliation_before_apply"] is True
          assert script["script_origin_status"] == "ai_generated"

          compare = conversation_requirement_ledger_service.compare_project("GOD_MODE")
          assert compare["ok"] is True
          assert compare["report"]["request_count"] >= analysis["request_count"]

          open_reqs = conversation_requirement_ledger_service.list_open_requirements("GOD_MODE")
          assert open_reqs["ok"] is True

          score = conversation_requirement_ledger_service.realness_scorecard("GOD_MODE")
          assert score["ok"] is True
          assert "realness_score" in score
          assert score["rule"].startswith("Realness increases")

          package = conversation_requirement_ledger_service.package("GOD_MODE")
          assert package["status"]["request_led"] is True
          assert package["policy"]["policy"]["realness_rule"].startswith("A feature is not marked real")

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 186
          assert global_status["current_phase"] == 187
          assert global_status["conversation_requirement_ledger_endpoint"] == "/api/conversation-requirement-ledger/package"

          global_package = god_mode_global_state_service.package()
          assert global_package["conversation_requirement_ledger_model"]["request_is_source_of_intent"] is True
          assert global_package["conversation_requirement_ledger_model"]["realness_requires_evidence"] is True
          assert any(item["phase"] == 187 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          workflow_dir = Path(".github/workflows")
          phase_workflows = sorted(path.name for path in workflow_dir.glob("phase*-*.yml"))
          assert phase_workflows == ["phase187-conversation-requirement-ledger-smoke.yml"], phase_workflows

          docs = Path("docs/orchestration/conversation-requirement-ledger.md").read_text(encoding="utf-8")
          assert "/api/conversation-requirement-ledger/package" in docs
          assert "Pedido do Oner é a fonte" in docs
          assert "Supabase" in docs and "Render" in docs and "Vercel" in docs

          print("phase 187 conversation requirement ledger smoke passed")
          PY
