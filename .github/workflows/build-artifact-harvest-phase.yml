name: Build Artifact Harvest Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/build-artifact-harvest-plan.md'
      - 'backend/contracts/build_artifact_harvest.example.json'
      - 'backend/contracts/build_artifact_item.example.json'
      - 'backend/app/services/build_artifact_harvest_service.py'
      - 'backend/app/routes/build_artifact_harvest.py'
      - 'backend/main.py'
      - '.github/workflows/build-artifact-harvest-phase.yml'

jobs:
  build-artifact-harvest-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate build artifact harvest layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.build_artifact_harvest_service import build_artifact_harvest_service

          harvests = build_artifact_harvest_service.get_harvests()["harvests"]
          first_project_id = harvests[0]["recovery_project_id"]
          items = build_artifact_harvest_service.get_artifact_items(first_project_id)["items"]
          package = build_artifact_harvest_service.get_harvest_package(first_project_id)["package"]
          next_action = build_artifact_harvest_service.get_next_harvest_action()["next_harvest_action"]
          route_paths = {route.path for route in app.routes}

          assert harvests, "Expected at least one artifact harvest session"
          assert items, "Expected at least one artifact item"
          assert next_action is not None
          assert package["download_ready"] is True
          assert package["rename_ready"] is True
          assert "/api/build-artifact-harvest/status" in route_paths
          assert "/api/build-artifact-harvest/harvests" in route_paths
          assert "/api/build-artifact-harvest/items" in route_paths
          assert "/api/build-artifact-harvest/next-harvest-action" in route_paths
          print("build artifact harvest phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Build Artifact Harvest Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for build artifact harvest validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
