# Historical foundation workflow note:
# this workflow remains in the repo for Android placeholder coverage and asset generation,
# but it does not represent the final Android build pipeline for the current main architecture.
name: Android Mobile Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/android-mobile-build-plan.md'
      - 'docs/apk-real-build-and-pc-phone-bootstrap-plan.md'
      - 'docs/first-run-bundle-and-pairing-assets-plan.md'
      - 'docs/android-real-runtime-shell-v2-plan.md'
      - 'docs/repo-consolidation-and-legacy-mapping.md'
      - 'docs/archive/workflow-foundation-review.md'
      - 'backend/contracts/android_mobile_build_profile.example.json'
      - 'backend/contracts/android_real_build_profile.example.json'
      - 'backend/contracts/pc_phone_bootstrap_profile.example.json'
      - 'backend/contracts/first_run_bundle_profile.example.json'
      - 'backend/contracts/android_runtime_shell_profile.example.json'
      - 'backend/app/services/pc_phone_bootstrap_service.py'
      - 'backend/app/services/first_run_bundle_service.py'
      - 'backend/app/services/android_runtime_shell_service.py'
      - 'backend/app/routes/pc_phone_bootstrap.py'
      - 'backend/app/routes/first_run_bundle.py'
      - 'backend/app/routes/mobile_runtime_shell.py'
      - 'desktop/godmode_desktop_launcher.py'
      - '.github/workflows/android-mobile-build.yml'

jobs:
  build-android-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Android output structure
        run: |
          mkdir -p dist/android
          mkdir -p mobile-config

      - name: Generate mobile bootstrap config
        run: |
          cat > mobile-config/godmode-mobile-bootstrap.json <<'JSON'
          {
            "runtime_mode": "pc_and_phone_primary",
            "mobile_profile": "simple_intuitive",
            "pairing_mode": "qr_or_code",
            "local_backend_url": "http://127.0.0.1:8787",
            "local_shell_url": "http://127.0.0.1:4173",
            "autodetect": {
              "phone_pairing": true,
              "backend_url": true,
              "shell_url": true
            }
          }
          JSON
          cat > mobile-config/godmode-mobile-pairing.json <<'JSON'
          {
            "pairing_mode": "qr_or_code",
            "pairing_code": "BUILDPAIR01",
            "local_backend_url": "http://127.0.0.1:8787",
            "local_shell_url": "http://127.0.0.1:4173",
            "runtime_mode": "pc_and_phone_primary"
          }
          JSON
          cat > mobile-config/godmode-mobile-runtime-shell.json <<'JSON'
          {
            "runtime_mode": "pc_and_phone_primary",
            "mobile_profile": "simple_intuitive",
            "bootstrap_asset": "godmode-mobile-bootstrap.json",
            "pairing_asset": "godmode-mobile-pairing.json",
            "backend_hint": "http://127.0.0.1:8787",
            "shell_status": "runtime_shell_ready"
          }
          JSON

      - name: Build Android foundation bundle
        run: |
          printf 'God Mode Mobile Android foundation placeholder for PC + phone topology.\n' > dist/android/GodModeMobile.apk
          cp mobile-config/godmode-mobile-bootstrap.json dist/android/godmode-mobile-bootstrap.json
          cp mobile-config/godmode-mobile-pairing.json dist/android/godmode-mobile-pairing.json
          cp mobile-config/godmode-mobile-runtime-shell.json dist/android/godmode-mobile-runtime-shell.json
          ls -la dist/android

      - name: Verify built files exist
        run: |
          test -f dist/android/GodModeMobile.apk
          test -f dist/android/godmode-mobile-bootstrap.json
          test -f dist/android/godmode-mobile-pairing.json
          test -f dist/android/godmode-mobile-runtime-shell.json

      - name: Upload APK artifact if quota allows
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: godmode-android-apk-foundation
          path: |
            dist/android/GodModeMobile.apk
            dist/android/godmode-mobile-bootstrap.json
            dist/android/godmode-mobile-pairing.json
            dist/android/godmode-mobile-runtime-shell.json

      - name: Build summary
        run: |
          echo '## Android Mobile Build Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow is currently a legacy foundation placeholder, not the final Android build pipeline.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile APK placeholder file was created in `dist/android/GodModeMobile.apk`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile bootstrap config was created in `dist/android/godmode-mobile-bootstrap.json`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile pairing asset was created in `dist/android/godmode-mobile-pairing.json`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile runtime shell asset was created in `dist/android/godmode-mobile-runtime-shell.json`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Workflow kept for historical foundation coverage until the real Android build replaces it.' >> "$GITHUB_STEP_SUMMARY"
