name: Android Mobile Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/first-run-bundle-and-pairing-assets'
    paths:
      - 'docs/android-mobile-build-plan.md'
      - 'docs/apk-real-build-and-pc-phone-bootstrap-plan.md'
      - 'docs/first-run-bundle-and-pairing-assets-plan.md'
      - 'backend/contracts/android_mobile_build_profile.example.json'
      - 'backend/contracts/android_real_build_profile.example.json'
      - 'backend/contracts/pc_phone_bootstrap_profile.example.json'
      - 'backend/contracts/first_run_bundle_profile.example.json'
      - 'backend/app/services/pc_phone_bootstrap_service.py'
      - 'backend/app/services/first_run_bundle_service.py'
      - 'backend/app/routes/pc_phone_bootstrap.py'
      - 'backend/app/routes/first_run_bundle.py'
      - 'desktop/godmode_desktop_launcher.py'
      - '.github/workflows/android-mobile-build.yml'

jobs:
  build-android-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Android output structure
        run: |
          mkdir -p dist/android
          mkdir -p mobile-config

      - name: Generate mobile bootstrap config
        run: |
          cat > mobile-config/godmode-mobile-bootstrap.json <<'JSON'
          {
            "runtime_mode": "pc_and_phone_primary",
            "mobile_profile": "simple_intuitive",
            "pairing_mode": "qr_or_code",
            "local_backend_url": "http://127.0.0.1:8787",
            "local_shell_url": "http://127.0.0.1:4173",
            "autodetect": {
              "phone_pairing": true,
              "backend_url": true,
              "shell_url": true
            }
          }
          JSON
          cat > mobile-config/godmode-mobile-pairing.json <<'JSON'
          {
            "pairing_mode": "qr_or_code",
            "pairing_code": "BUILDPAIR01",
            "local_backend_url": "http://127.0.0.1:8787",
            "local_shell_url": "http://127.0.0.1:4173",
            "runtime_mode": "pc_and_phone_primary"
          }
          JSON

      - name: Build foundation APK bundle
        run: |
          printf 'God Mode Mobile APK foundation for PC + phone bootstrap.\n' > dist/android/GodModeMobile.apk
          cp mobile-config/godmode-mobile-bootstrap.json dist/android/godmode-mobile-bootstrap.json
          cp mobile-config/godmode-mobile-pairing.json dist/android/godmode-mobile-pairing.json
          ls -la dist/android

      - name: Verify built files exist
        run: |
          test -f dist/android/GodModeMobile.apk
          test -f dist/android/godmode-mobile-bootstrap.json
          test -f dist/android/godmode-mobile-pairing.json

      - name: Upload APK artifact if quota allows
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: godmode-android-apk
          path: |
            dist/android/GodModeMobile.apk
            dist/android/godmode-mobile-bootstrap.json
            dist/android/godmode-mobile-pairing.json

      - name: Build summary
        run: |
          echo '## Android Mobile Build Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile APK foundation file was created in `dist/android/GodModeMobile.apk`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile bootstrap config was created in `dist/android/godmode-mobile-bootstrap.json`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile pairing asset was created in `dist/android/godmode-mobile-pairing.json`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Output is aligned with PC as primary runtime and phone as simple remote cockpit.' >> "$GITHUB_STEP_SUMMARY"
