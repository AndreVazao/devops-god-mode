name: Local Project Application Execution Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/local-project-application-execution-plan.md'
      - 'backend/contracts/local_application_execution.example.json'
      - 'backend/contracts/local_apply_safeguard.example.json'
      - 'backend/app/services/local_project_application_execution_service.py'
      - 'backend/app/routes/local_project_application_execution.py'
      - 'backend/main.py'
      - '.github/workflows/local-project-application-execution-phase.yml'

jobs:
  local-project-application-execution-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate local project application execution layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.local_project_application_execution_service import local_project_application_execution_service
          executions = local_project_application_execution_service.get_executions()["executions"]
          safeguards = local_project_application_execution_service.get_safeguards()["safeguards"]
          package = local_project_application_execution_service.get_execution_package()["package"]
          next_action = local_project_application_execution_service.get_next_execution_action()["next_execution_action"]
          route_paths = {route.path for route in app.routes}
          assert executions
          assert safeguards
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/local-project-application-execution/status" in route_paths
          assert "/api/local-project-application-execution/executions" in route_paths
          assert "/api/local-project-application-execution/safeguards" in route_paths
          assert "/api/local-project-application-execution/next-execution-action" in route_paths
          print("local project application execution phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Local Project Application Execution Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Added local project application execution and verify/rollback safeguard layer.' >> "$GITHUB_STEP_SUMMARY"
