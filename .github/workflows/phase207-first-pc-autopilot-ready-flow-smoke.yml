name: Phase 207 First PC Autopilot Ready Flow Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/first_pc_autopilot_ready_flow_service.py'
      - 'backend/app/routes/first_pc_autopilot_ready_flow.py'
      - 'backend/app/routes/first_pc_autopilot_ready_flow_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/first-pc-autopilot-ready-flow.md'
      - '.github/workflows/phase207-first-pc-autopilot-ready-flow-smoke.yml'

jobs:
  phase207-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 207 file contract
        run: |
          python - <<'PY'
          from pathlib import Path
          files={
            'service':Path('backend/app/services/first_pc_autopilot_ready_flow_service.py'),
            'route':Path('backend/app/routes/first_pc_autopilot_ready_flow.py'),
            'frontend':Path('backend/app/routes/first_pc_autopilot_ready_flow_frontend.py'),
            'global_state':Path('backend/app/services/god_mode_global_state_service.py'),
            'docs':Path('docs/orchestration/first-pc-autopilot-ready-flow.md'),
          }
          for label,path in files.items():
            assert path.exists(), f'Missing {label}: {path}'
          service=files['service'].read_text(encoding='utf-8')
          for marker in ['class FirstPcAutopilotReadyFlowService','readiness_checks','operator_steps','launch_contract','start_today_autopilot','first_pc_install_ready_pack_service','ia_operator_permission_vault_bridge_service','mobile_permission_relay_driver_voice_service','god_mode_local_vault_service']:
            assert marker in service, marker
          route=files['route'].read_text(encoding='utf-8')
          for endpoint in ['/status','/readiness','/operator-steps','/launch-contract','/start-today-autopilot','/package']:
            assert endpoint in route, f'Missing endpoint {endpoint}'
          assert 'prefix="/api/first-pc-autopilot-ready"' in route
          frontend=files['frontend'].read_text(encoding='utf-8')
          for marker in ['God Mode Today Ready','/api/first-pc-autopilot-ready/package','/api/first-pc-autopilot-ready/start-today-autopilot','/app/first-pc-autopilot-ready','/app/today-ready']:
            assert marker in frontend, marker
          global_state=files['global_state'].read_text(encoding='utf-8')
          for marker in ['current_phase": 207','latest_merged_phase": 206','today_ready_model','/api/first-pc-autopilot-ready/package','today_ready_route']:
            assert marker in global_state, marker
          docs=files['docs'].read_text(encoding='utf-8')
          for marker in ['/api/first-pc-autopilot-ready/package','/app/first-pc-autopilot-ready','GodModeDesktop.exe','Start Autopilot','readiness']:
            assert marker in docs, marker
          phase_workflows=sorted(p.name for p in Path('.github/workflows').glob('phase*-*.yml'))
          assert phase_workflows == ['phase207-first-pc-autopilot-ready-flow-smoke.yml'], phase_workflows
          print('phase 207 today ready file contract passed')
          PY
