name: Phase 204 Autonomous IA Work Session Operator Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/autonomous_ia_work_session_operator_service.py'
      - 'backend/app/routes/autonomous_ia_work_session_operator.py'
      - 'backend/app/routes/autonomous_ia_work_session_operator_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/autonomous-ia-work-session-operator.md'
      - '.github/workflows/phase204-autonomous-ia-work-session-operator-smoke.yml'

jobs:
  phase204-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 204 file contract
        run: |
          python - <<'PY'
          from pathlib import Path

          files = {
              'service': Path('backend/app/services/autonomous_ia_work_session_operator_service.py'),
              'route': Path('backend/app/routes/autonomous_ia_work_session_operator.py'),
              'frontend': Path('backend/app/routes/autonomous_ia_work_session_operator_frontend.py'),
              'global_state': Path('backend/app/services/god_mode_global_state_service.py'),
              'docs': Path('docs/orchestration/autonomous-ia-work-session-operator.md'),
          }
          for label, path in files.items():
              assert path.exists(), f'Missing {label}: {path}'

          service = files['service'].read_text(encoding='utf-8')
          for marker in [
              'class AutonomousIaWorkSessionOperatorService',
              'WORK_PACKET_STATUSES',
              'create_session',
              'create_work_packet',
              'create_packets_from_self_diagnosis',
              'import_response',
              'convert_response_to_tasks',
              'can_operate_while_oner_busy',
              'can_send_without_manual_provider_gate',
              'can_login_or_scrape_private_chats',
              'conversation_source_import_feed_service.import_text',
          ]:
              assert marker in service, marker

          route = files['route'].read_text(encoding='utf-8')
          for endpoint in ['/status', '/policy', '/create-session', '/create-work-packet', '/create-packets-from-self-diagnosis', '/mark-packet-status', '/import-response', '/convert-response-to-tasks', '/create-provider-launcher-contract', '/packets', '/dashboard', '/package']:
              assert endpoint in route, f'Missing endpoint {endpoint}'
          assert 'prefix="/api/autonomous-ia-work-session"' in route

          frontend = files['frontend'].read_text(encoding='utf-8')
          for marker in ['Autonomous IA Work Session', '/api/autonomous-ia-work-session/create-session', '/api/autonomous-ia-work-session/import-response', '/app/autonomous-ia-work-session', '/app/ia-work-operator']:
              assert marker in frontend, marker

          global_state = files['global_state'].read_text(encoding='utf-8')
          for marker in ['current_phase": 204', 'latest_merged_phase": 203', 'autonomous_ia_work_session_model', '/api/autonomous-ia-work-session/package', 'ia_work_operator_route']:
              assert marker in global_state, marker

          docs = files['docs'].read_text(encoding='utf-8')
          for marker in ['/api/autonomous-ia-work-session/package', 'ia_work_packet', 'can_operate_while_oner_busy=true', 'can_login_or_scrape_private_chats=false']:
              assert marker in docs, marker

          workflow_dir = Path('.github/workflows')
          phase_workflows = sorted(path.name for path in workflow_dir.glob('phase*-*.yml'))
          assert phase_workflows == ['phase204-autonomous-ia-work-session-operator-smoke.yml'], phase_workflows

          print('phase 204 autonomous ia work session operator file contract passed')
          PY
