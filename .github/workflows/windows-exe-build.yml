name: Windows EXE Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/windows-exe-build-workflow'
    paths:
      - 'docs/windows-exe-build-workflow-plan.md'
      - 'backend/contracts/windows_exe_build_profile.example.json'
      - '.github/workflows/windows-exe-build.yml'

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build tooling
        run: pip install pyinstaller

      - name: Prepare dist directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build placeholder desktop executable bundle
        shell: pwsh
        run: |
          Set-Content -Path dist/GodModeDesktop.exe -Value 'Placeholder Windows EXE artifact for God Mode desktop packaging phase.'
          Get-Item dist/GodModeDesktop.exe | Format-List FullName,Length,LastWriteTime

      - name: Verify built file exists
        shell: pwsh
        run: |
          if (-not (Test-Path dist/GodModeDesktop.exe)) {
            throw 'dist/GodModeDesktop.exe was not created.'
          }

      - name: Upload EXE artifact if quota allows
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: godmode-windows-exe
          path: dist/GodModeDesktop.exe

      - name: Build summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Windows EXE Build Summary'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Placeholder desktop EXE file was created in `dist/GodModeDesktop.exe`.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Artifact upload is best-effort and may fail when GitHub Actions storage quota is exhausted.'
