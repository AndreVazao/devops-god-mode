name: Execution Waits For Approval Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/execution-waits-for-approval'
    paths:
      - 'docs/execution-waits-for-approval-plan.md'
      - 'backend/contracts/approval_gated_action.example.json'
      - 'backend/app/services/approval_gated_execution_service.py'
      - 'backend/app/routes/approval_gated_execution.py'
      - 'backend/main.py'
      - '.github/workflows/execution-waits-for-approval-smoke.yml'

jobs:
  smoke-execution-waits-for-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate approval-gated execution files
        run: |
          test -f docs/execution-waits-for-approval-plan.md
          test -f backend/contracts/approval_gated_action.example.json
          test -f backend/app/services/approval_gated_execution_service.py
          test -f backend/app/routes/approval_gated_execution.py
          test -f backend/main.py

      - name: Validate approval-gated execution markers
        run: |
          grep -q "waiting_for_approval" docs/execution-waits-for-approval-plan.md
          grep -q '"status": "waiting_for_approval"' backend/contracts/approval_gated_action.example.json
          grep -q "create_sensitive_execution" backend/app/services/approval_gated_execution_service.py
          grep -q "approved_to_continue" backend/app/services/approval_gated_execution_service.py
          grep -q "/api/execution-gate" backend/app/routes/approval_gated_execution.py
          grep -q "approval_gated_execution_router" backend/main.py
