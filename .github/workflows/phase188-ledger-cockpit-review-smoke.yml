name: Phase 188 Ledger Cockpit Review Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/conversation_ledger_cockpit_review.py'
      - 'backend/app/services/conversation_ledger_cockpit_review_service.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/conversation-ledger-cockpit-review.md'
      - '.github/workflows/phase188-ledger-cockpit-review-smoke.yml'

jobs:
  phase188-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 188 ledger cockpit review
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.conversation_requirement_ledger_service import conversation_requirement_ledger_service
          from app.services.conversation_ledger_cockpit_review_service import conversation_ledger_cockpit_review_service
          from app.services.god_mode_global_state_service import god_mode_global_state_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/conversation-ledger-cockpit-review/status",
              "/api/conversation-ledger-cockpit-review/policy",
              "/api/conversation-ledger-cockpit-review/cards",
              "/api/conversation-ledger-cockpit-review/review",
              "/api/conversation-ledger-cockpit-review/batch-review",
              "/api/conversation-ledger-cockpit-review/summary",
              "/api/conversation-ledger-cockpit-review/history",
              "/api/conversation-ledger-cockpit-review/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 188 routes: {missing}"

          status = conversation_ledger_cockpit_review_service.status()
          assert status["ok"] is True
          assert status["mobile_cockpit_ready"] is True
          assert status["operator_can_mark_requirements"] is True
          assert status["request_led_review"] is True

          policy = conversation_ledger_cockpit_review_service.policy()
          assert policy["ok"] is True
          assert "silently close an operator request" in policy["policy"]["blocked"]
          assert "implemented" in policy["policy"]["card_statuses"]

          transcript = """
          Oner: Quero que o God Mode compare tudo o que eu pedi com o que ficou decidido e mostre no telemóvel requisitos esquecidos.
          Assistant: Proposta: criar cards de cockpit para open requirements.
          Oner: Não esquecer que se mudou de cloud Supabase Render Vercel para PC, os pedidos antigos ficam como migrados, não apagados.
          Assistant: Decisão: criar endpoint /api/conversation-ledger-cockpit-review/package e validar com smoke.
          Oner: Preciso que cada card tenha botões para confirmar, manter aberto, migrar, obsoleto e implementado.
          """
          analysis = conversation_requirement_ledger_service.analyze_text(
              project_key="GOD_MODE",
              transcript_text=transcript,
              source_provider="chatgpt",
              source_id="phase188-smoke",
              store=True,
          )
          assert analysis["ok"] is True
          assert analysis["analysis"]["request_count"] >= 2

          cards = conversation_ledger_cockpit_review_service.build_cards("GOD_MODE")
          assert cards["ok"] is True
          snapshot = cards["snapshot"]
          assert snapshot["card_count"] >= 1
          first_card = snapshot["cards"][0]
          assert first_card["request_id"]
          assert first_card["requires_evidence_for_real"] is True
          actions = {item["decision"] for item in first_card["mobile_actions"]}
          assert {"confirmed", "still_open", "migrated", "obsolete", "implemented", "rejected_ai_proposal"}.issubset(actions)

          bad = conversation_ledger_cockpit_review_service.review_requirement(first_card["request_id"], "bad_status", "GOD_MODE")
          assert bad["ok"] is False
          assert bad["error"] == "invalid_decision"

          review = conversation_ledger_cockpit_review_service.review_requirement(
              request_id=first_card["request_id"],
              decision="migrated",
              project_key="GOD_MODE",
              operator_note="Pedido migrado para arquitetura PC brain + mobile cockpit.",
              evidence_ref="PR #330 / Phase 187 ledger",
              migration_note="Cloud refs preservadas como histórico.",
              priority="critical",
          )
          assert review["ok"] is True
          assert review["review"]["decision"] == "migrated"
          assert review["review"]["realness_status"] == "real_evidence_linked"

          history = conversation_ledger_cockpit_review_service.review_history("GOD_MODE")
          assert history["ok"] is True
          assert history["review_count"] >= 1

          summary = conversation_ledger_cockpit_review_service.summary("GOD_MODE")
          assert summary["ok"] is True
          assert "decision_counts" in summary

          package = conversation_ledger_cockpit_review_service.package("GOD_MODE")
          assert package["status"]["mobile_cockpit_ready"] is True
          assert package["policy"]["policy"]["realness_rule"].startswith("Implemented/confirmed")

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 187
          assert global_status["current_phase"] == 188
          assert global_status["conversation_ledger_cockpit_review_endpoint"] == "/api/conversation-ledger-cockpit-review/package"

          global_package = god_mode_global_state_service.package()
          assert global_package["conversation_ledger_cockpit_review_model"]["request_led_review"] is True
          assert global_package["conversation_ledger_cockpit_review_model"]["evidence_preferred_for_realness"] is True
          assert any(item["phase"] == 188 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          workflow_dir = Path(".github/workflows")
          phase_workflows = sorted(path.name for path in workflow_dir.glob("phase*-*.yml"))
          assert phase_workflows == ["phase188-ledger-cockpit-review-smoke.yml"], phase_workflows

          docs = Path("docs/orchestration/conversation-ledger-cockpit-review.md").read_text(encoding="utf-8")
          assert "/api/conversation-ledger-cockpit-review/package" in docs
          assert "Pedido aberto não pode desaparecer" in docs
          assert "Confirmar" in docs

          print("phase 188 ledger cockpit review smoke passed")
          PY
