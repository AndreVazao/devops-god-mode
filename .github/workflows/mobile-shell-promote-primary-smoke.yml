name: Mobile Shell Promote Primary Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/mobile-shell-promote-primary'
    paths:
      - 'frontend/mobile-shell/index.html'
      - 'frontend/mobile-shell/app.js'
      - 'frontend/mobile-shell/styles.css'
      - 'docs/mobile-shell-primary-promotion.md'
      - '.github/workflows/mobile-shell-promote-primary-smoke.yml'

jobs:
  smoke-mobile-shell-promote-primary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate primary files
        run: |
          test -f docs/mobile-shell-primary-promotion.md
          test -f frontend/mobile-shell/index.html
          test -f frontend/mobile-shell/app.js
          test -f frontend/mobile-shell/styles.css

      - name: Validate promoted hybrid markers
        run: |
          grep -q "Mobile Hybrid Shell" frontend/mobile-shell/index.html
          grep -q "Driving" frontend/mobile-shell/index.html
          grep -q "Assisted" frontend/mobile-shell/index.html
          grep -q "god_mode_shell_mode" frontend/mobile-shell/app.js
          grep -q "apiBaseInput" frontend/mobile-shell/app.js
          grep -q "mode-btn-active" frontend/mobile-shell/styles.css
          grep -q "Promover a linha híbrida" docs/mobile-shell-primary-promotion.md
