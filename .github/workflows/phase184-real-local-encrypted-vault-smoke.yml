name: Phase 184 Real Local Encrypted Vault Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/real_local_encrypted_vault.py'
      - 'backend/app/services/real_local_encrypted_vault_service.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/real-local-encrypted-vault.md'
      - '.github/workflows/phase184-real-local-encrypted-vault-smoke.yml'

jobs:
  phase184-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 184 real local encrypted vault
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.god_mode_global_state_service import god_mode_global_state_service
          from app.services.operator_approval_gate_service import operator_approval_gate_service
          from app.services.real_local_encrypted_vault_service import real_local_encrypted_vault_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/real-local-encrypted-vault/status",
              "/api/real-local-encrypted-vault/policy",
              "/api/real-local-encrypted-vault/create-write-gate",
              "/api/real-local-encrypted-vault/create-read-gate",
              "/api/real-local-encrypted-vault/store-secret",
              "/api/real-local-encrypted-vault/read-secret",
              "/api/real-local-encrypted-vault/entries",
              "/api/real-local-encrypted-vault/audit",
              "/api/real-local-encrypted-vault/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 184 routes: {missing}"

          status = real_local_encrypted_vault_service.status()
          assert status["ok"] is True
          assert status["stores_encrypted_values"] is True
          assert status["stores_plaintext_values"] is False
          assert status["passphrase_persisted"] is False
          assert status["approval_required_for_read"] is True
          assert status["approval_required_for_write"] is True

          policy = real_local_encrypted_vault_service.policy()
          assert policy["ok"] is True
          assert "persist passphrase" in policy["policy"]["blocked"]

          raw_secret = "super_real_local_secret_value_184"
          passphrase = "phase184-test-passphrase"
          secret_ref_id = "secret-ref-phase184-smoke"

          blocked = real_local_encrypted_vault_service.store_secret(
              secret_ref_id=secret_ref_id,
              secret_value=raw_secret,
              passphrase=passphrase,
              project_id="GOD_MODE",
              provider="SUPABASE",
              environment="test",
              key_name="SUPABASE_SERVICE_ROLE_KEY",
              approved_gate_id="missing-gate",
          )
          assert blocked["ok"] is False
          assert "gate" in blocked.get("error", "")

          write_gate = real_local_encrypted_vault_service.create_write_gate(
              secret_ref_id=secret_ref_id,
              project_id="GOD_MODE",
              provider="SUPABASE",
              environment="test",
              key_name="SUPABASE_SERVICE_ROLE_KEY",
          )
          assert write_gate["ok"] is True
          gate_id = write_gate["gate"]["gate_id"]
          deny_attempt = real_local_encrypted_vault_service.store_secret(
              secret_ref_id=secret_ref_id,
              secret_value=raw_secret,
              passphrase=passphrase,
              project_id="GOD_MODE",
              provider="SUPABASE",
              environment="test",
              key_name="SUPABASE_SERVICE_ROLE_KEY",
              approved_gate_id=gate_id,
          )
          assert deny_attempt["ok"] is False
          assert deny_attempt["error"] == "approval_gate_not_approved"

          approved = operator_approval_gate_service.resolve_gate(gate_id, "approve")
          assert approved["ok"] is True

          stored = real_local_encrypted_vault_service.store_secret(
              secret_ref_id=secret_ref_id,
              secret_value=raw_secret,
              passphrase=passphrase,
              project_id="GOD_MODE",
              provider="SUPABASE",
              environment="test",
              key_name="SUPABASE_SERVICE_ROLE_KEY",
              approved_gate_id=gate_id,
              notes="phase 184 smoke",
          )
          assert stored["ok"] is True
          assert raw_secret not in str(stored)
          assert stored["metadata"]["has_encrypted_value"] is True

          entries = real_local_encrypted_vault_service.list_entries()
          assert entries["ok"] is True
          assert any(item["secret_ref_id"] == secret_ref_id for item in entries["entries"])
          assert raw_secret not in str(entries)

          read_gate = real_local_encrypted_vault_service.create_read_gate(secret_ref_id=secret_ref_id, purpose="phase184 smoke read")
          assert read_gate["ok"] is True
          read_gate_id = read_gate["gate"]["gate_id"]
          blocked_read = real_local_encrypted_vault_service.read_secret(secret_ref_id, passphrase, read_gate_id, "phase184 smoke read")
          assert blocked_read["ok"] is False
          assert blocked_read["error"] == "approval_gate_not_approved"

          approved_read = operator_approval_gate_service.resolve_gate(read_gate_id, "approve")
          assert approved_read["ok"] is True

          read_redacted = real_local_encrypted_vault_service.read_secret(secret_ref_id, passphrase, read_gate_id, "phase184 smoke read", reveal=False)
          assert read_redacted["ok"] is True
          assert read_redacted["value_available_for_local_injection"] is True
          assert "secret_value" not in read_redacted
          assert raw_secret not in str(read_redacted)

          read_revealed = real_local_encrypted_vault_service.read_secret(secret_ref_id, passphrase, read_gate_id, "phase184 smoke explicit reveal", reveal=True)
          assert read_revealed["ok"] is True
          assert read_revealed["secret_value"] == raw_secret

          wrong = real_local_encrypted_vault_service.read_secret(secret_ref_id, "wrong-pass", read_gate_id, "phase184 wrong pass", reveal=False)
          assert wrong["ok"] is False
          assert wrong["error"] == "decrypt_failed_or_wrong_passphrase"

          audit = real_local_encrypted_vault_service.audit_log(limit=20)
          assert audit["ok"] is True
          assert audit["event_count"] >= 3
          assert raw_secret not in str(audit)
          assert all(item["redacted"] is True for item in audit["events"])

          package = real_local_encrypted_vault_service.package()
          assert package["status"]["stores_encrypted_values"] is True
          assert package["status"]["stores_plaintext_values"] is False
          assert raw_secret not in str(package)

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 183
          assert global_status["current_phase"] == 184
          assert global_status["real_local_encrypted_vault_endpoint"] == "/api/real-local-encrypted-vault/package"

          global_package = god_mode_global_state_service.package()
          assert global_package["real_local_encrypted_vault_model"]["stores_encrypted_values"] is True
          assert global_package["real_local_encrypted_vault_model"]["stores_plaintext_values"] is False
          assert any(item["phase"] == 184 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          workflow_dir = Path(".github/workflows")
          phase_workflows = sorted(path.name for path in workflow_dir.glob("phase*-*.yml"))
          assert phase_workflows == ["phase184-real-local-encrypted-vault-smoke.yml"], phase_workflows

          docs = Path("docs/orchestration/real-local-encrypted-vault.md").read_text(encoding="utf-8")
          assert "/api/real-local-encrypted-vault/package" in docs
          assert "Passphrase não é persistida" in docs
          assert "Phase 184" in docs

          print("phase 184 real local encrypted vault smoke passed")
          PY
