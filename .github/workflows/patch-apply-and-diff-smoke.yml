name: Patch Apply And Diff Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/patch-apply-and-diff'
    paths:
      - 'docs/patch-apply-and-diff-plan.md'
      - 'backend/contracts/patch_apply_preview.example.json'
      - 'backend/app/services/patch_apply_preview_service.py'
      - 'backend/app/routes/patch_apply_preview.py'
      - 'backend/main.py'
      - '.github/workflows/patch-apply-and-diff-smoke.yml'

jobs:
  smoke-patch-apply-and-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate patch apply files
        run: |
          test -f docs/patch-apply-and-diff-plan.md
          test -f backend/contracts/patch_apply_preview.example.json
          test -f backend/app/services/patch_apply_preview_service.py
          test -f backend/app/routes/patch_apply_preview.py
          test -f backend/main.py

      - name: Validate patch apply markers
        run: |
          grep -q '"preview_id": "preview_0001"' backend/contracts/patch_apply_preview.example.json
          grep -q '"apply_status": "preview_ready"' backend/contracts/patch_apply_preview.example.json
          grep -q "create_preview" backend/app/services/patch_apply_preview_service.py
          grep -q "applied_and_validated" backend/app/services/patch_apply_preview_service.py
          grep -q "/api/patch-apply-preview" backend/app/routes/patch_apply_preview.py
          grep -q "patch_apply_preview_router" backend/main.py
