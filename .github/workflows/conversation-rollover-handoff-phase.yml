name: Conversation Rollover Handoff Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/conversation-rollover-and-provider-handoff-plan.md'
      - 'backend/contracts/conversation_rollover.example.json'
      - 'backend/contracts/provider_handoff_operation.example.json'
      - 'backend/app/services/conversation_rollover_handoff_service.py'
      - 'backend/app/routes/conversation_rollover_handoff.py'
      - 'backend/main.py'
      - '.github/workflows/conversation-rollover-handoff-phase.yml'

jobs:
  conversation-rollover-handoff-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate conversation rollover handoff layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.conversation_rollover_handoff_service import conversation_rollover_handoff_service
          rollovers = conversation_rollover_handoff_service.get_rollovers()["rollovers"]
          handoffs = conversation_rollover_handoff_service.get_handoffs()["handoffs"]
          package = conversation_rollover_handoff_service.get_rollover_package()["package"]
          next_action = conversation_rollover_handoff_service.get_next_rollover_action()["next_rollover_action"]
          route_paths = {route.path for route in app.routes}
          assert rollovers
          assert handoffs
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/conversation-rollover-handoff/status" in route_paths
          assert "/api/conversation-rollover-handoff/rollovers" in route_paths
          assert "/api/conversation-rollover-handoff/handoffs" in route_paths
          assert "/api/conversation-rollover-handoff/next-rollover-action" in route_paths
          print("conversation rollover handoff phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Conversation Rollover Handoff Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Added conversation rollover preparation and provider handoff operation layer.' >> "$GITHUB_STEP_SUMMARY"
