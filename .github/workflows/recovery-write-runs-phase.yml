name: Recovery Write Runs Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-recovery-write-runs-plan.md'
      - 'backend/contracts/recovery_write_run.example.json'
      - 'backend/contracts/recovery_write_run_target.example.json'
      - 'backend/app/services/project_recovery_write_run_service.py'
      - 'backend/app/routes/project_recovery_write_run.py'
      - 'backend/main.py'
      - '.github/workflows/recovery-write-runs-phase.yml'

jobs:
  recovery-write-runs-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate recovery write runs layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_recovery_write_run_service import project_recovery_write_run_service

          runs = project_recovery_write_run_service.get_runs()["runs"]
          targets = project_recovery_write_run_service.get_run_targets()["targets"]
          next_action = project_recovery_write_run_service.get_next_run_action()["next_run_action"]
          route_paths = {route.path for route in app.routes}

          assert runs, "Expected at least one recovery write run"
          assert targets, "Expected at least one recovery write run target"
          assert next_action is not None
          assert "/api/project-recovery-write-runs/status" in route_paths
          assert "/api/project-recovery-write-runs/runs" in route_paths
          assert "/api/project-recovery-write-runs/targets" in route_paths
          assert "/api/project-recovery-write-runs/next-run-action" in route_paths
          print("recovery write runs phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Recovery Write Runs Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for recovery write runs validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
