name: Conversation Provider Linkage Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/conversation-provider-linkage-plan.md'
      - 'backend/contracts/conversation_provider_linkage.example.json'
      - 'backend/contracts/conversation_provider_action.example.json'
      - 'backend/app/services/conversation_provider_linkage_service.py'
      - 'backend/app/routes/conversation_provider_linkage.py'
      - 'backend/main.py'
      - '.github/workflows/conversation-provider-linkage-phase.yml'

jobs:
  conversation-provider-linkage-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate conversation provider linkage layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.conversation_provider_linkage_service import conversation_provider_linkage_service

          linkages = conversation_provider_linkage_service.get_provider_linkages()["linkages"]
          actions = conversation_provider_linkage_service.get_provider_actions("chatgpt")["actions"]
          package = conversation_provider_linkage_service.get_provider_package("chatgpt")["package"]
          next_action = conversation_provider_linkage_service.get_next_provider_action()["next_provider_action"]
          route_paths = {route.path for route in app.routes}

          assert linkages, "Expected at least one conversation provider linkage"
          assert actions, "Expected at least one conversation provider action"
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/conversation-provider-linkage/status" in route_paths
          assert "/api/conversation-provider-linkage/linkages" in route_paths
          assert "/api/conversation-provider-linkage/actions" in route_paths
          assert "/api/conversation-provider-linkage/next-provider-action" in route_paths
          print("conversation provider linkage phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Conversation Provider Linkage Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for conversation provider linkage validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
