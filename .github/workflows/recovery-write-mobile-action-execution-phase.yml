name: Recovery Write Mobile Action Execution Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-recovery-write-mobile-action-execution-plan.md'
      - 'backend/contracts/recovery_write_mobile_execution.example.json'
      - 'backend/contracts/recovery_write_mobile_effect.example.json'
      - 'backend/app/services/project_recovery_write_mobile_action_execution_service.py'
      - 'backend/app/routes/project_recovery_write_mobile_action_execution.py'
      - 'backend/main.py'
      - '.github/workflows/recovery-write-mobile-action-execution-phase.yml'

jobs:
  recovery-write-mobile-action-execution-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate recovery write mobile action execution layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_recovery_write_mobile_action_execution_service import project_recovery_write_mobile_action_execution_service

          executions = project_recovery_write_mobile_action_execution_service.get_mobile_executions()["executions"]
          first_project_id = executions[0]["recovery_project_id"]
          effects = project_recovery_write_mobile_action_execution_service.get_mobile_effects(first_project_id)["effects"]
          package = project_recovery_write_mobile_action_execution_service.get_mobile_execution_package(first_project_id)["package"]
          next_execution = project_recovery_write_mobile_action_execution_service.get_next_mobile_execution()["next_mobile_execution"]
          route_paths = {route.path for route in app.routes}

          assert executions, "Expected at least one mobile execution session"
          assert effects, "Expected at least one mobile execution effect"
          assert next_execution is not None
          assert package["mobile_cockpit_ready"] is True
          assert "/api/project-recovery-write-mobile-action-execution/status" in route_paths
          assert "/api/project-recovery-write-mobile-action-execution/executions" in route_paths
          assert "/api/project-recovery-write-mobile-action-execution/effects" in route_paths
          assert "/api/project-recovery-write-mobile-action-execution/next-mobile-execution" in route_paths
          print("recovery write mobile action execution phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Recovery Write Mobile Action Execution Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for recovery write mobile action execution validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
