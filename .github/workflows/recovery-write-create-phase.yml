name: Recovery Write Create Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-recovery-write-create-plan.md'
      - 'backend/contracts/recovery_write_create.example.json'
      - 'backend/contracts/recovery_write_create_target.example.json'
      - 'backend/app/services/project_recovery_write_create_service.py'
      - 'backend/app/routes/project_recovery_write_create.py'
      - 'backend/main.py'
      - '.github/workflows/recovery-write-create-phase.yml'

jobs:
  recovery-write-create-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate recovery write create layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_recovery_write_create_service import project_recovery_write_create_service

          requests = project_recovery_write_create_service.get_create_requests()["requests"]
          targets = project_recovery_write_create_service.get_create_targets()["targets"]
          next_action = project_recovery_write_create_service.get_next_create_action()["next_create_action"]
          route_paths = {route.path for route in app.routes}

          assert requests, "Expected at least one recovery write create request"
          assert targets, "Expected at least one recovery write create target"
          assert next_action is not None
          assert "/api/project-recovery-write-create/status" in route_paths
          assert "/api/project-recovery-write-create/requests" in route_paths
          assert "/api/project-recovery-write-create/targets" in route_paths
          assert "/api/project-recovery-write-create/next-create-action" in route_paths
          print("recovery write create phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Recovery Write Create Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for recovery write create validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
