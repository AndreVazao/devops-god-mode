name: Universal Total Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'backend/**'
      - 'desktop/**'
      - 'docs/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'desktop/**'
      - 'docs/**'
      - '.github/workflows/**'

jobs:
  universal-total-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Universal backend import and route test
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          import asyncio

          from main import app
          from app.services.asset_derivative_service import asset_derivative_service
          from app.services.browser_conversation_intake_service import browser_conversation_intake_service
          from app.services.bundle_publish_link_service import bundle_publish_link_service
          from app.services.capability_reuse_service import capability_reuse_service
          from app.services.context_aware_orchestration_service import context_aware_orchestration_service
          from app.services.conversation_bundle_service import conversation_bundle_service
          from app.services.conversation_reconciliation_service import conversation_reconciliation_service
          from app.services.conversation_repo_materialization_service import conversation_repo_materialization_service
          from app.services.deploy_execution_plan_service import deploy_execution_plan_service
          from app.services.deploy_target_execution_service import deploy_target_execution_service
          from app.services.deployment_secret_binding_service import deployment_secret_binding_service
          from app.services.env_intake_service import env_intake_service
          from app.services.env_vault_import_service import env_vault_import_service
          from app.services.guarded_deploy_promotion_service import guarded_deploy_promotion_service
          from app.services.intelligent_completion_planner_service import intelligent_completion_planner_service
          from app.services.intelligent_merge_guard_service import intelligent_merge_guard_service
          from app.services.intelligent_patch_apply_service import intelligent_patch_apply_service
          from app.services.intelligent_patch_synthesis_service import intelligent_patch_synthesis_service
          from app.services.intelligent_repo_merge_service import intelligent_repo_merge_service
          from app.services.intelligent_repo_state_service import intelligent_repo_state_service
          from app.services.mobile_cockpit_command_surface_service import mobile_cockpit_command_surface_service
          from app.services.multi_ai_intake_and_script_repair_service import multi_ai_intake_and_script_repair_service
          from app.services.android_real_build_progressive_service import android_real_build_progressive_service
          from app.services.offline_command_buffering_service import offline_command_buffering_service
          from app.services.operator_approval_gate_service import operator_approval_gate_service
          from app.services.operator_chat_runtime_snapshot_service import operator_chat_runtime_snapshot_service
          from app.services.operator_conversation_thread_service import operator_conversation_thread_service
          from app.services.operator_input_request_service import operator_input_request_service
          from app.services.operator_pending_attention_service import operator_pending_attention_service
          from app.services.operator_popup_delivery_service import operator_popup_delivery_service
          from app.services.operator_response_guidance_service import operator_response_guidance_service
          from app.services.operator_resumable_action_service import operator_resumable_action_service
          from app.services.preview_packaging_service import preview_packaging_service
          from app.services.provider_connector_registry_service import provider_connector_registry_service
          from app.services.provider_deploy_execution_service import provider_deploy_execution_service
          from app.services.provider_secret_sync_service import provider_secret_sync_service
          from app.services.provider_session_partition_service import provider_session_partition_service
          from app.services.remote_session_persistence_service import remote_session_persistence_service
          from app.services.continuous_remote_execution_service import continuous_remote_execution_service
          from app.services.repo_env_harvest_service import repo_env_harvest_service
          from app.services.runtime_supervisor_guidance_service import runtime_supervisor_guidance_service
          from app.services.external_asset_intake_service import external_asset_intake_service
          from app.services.external_asset_publish_execution_service import external_asset_publish_execution_service
          from app.services.external_asset_materialization_service import external_asset_materialization_service
          from app.services.local_asset_workspace_service import local_asset_workspace_service
          from app.services.local_asset_transformation_service import local_asset_transformation_service
          from app.services.secret_vault_service import secret_vault_service
          from app.services.shared_secret_topology_service import shared_secret_topology_service
          from app.services.tenant_browser_onboarding_executor_service import tenant_browser_onboarding_executor_service
          from app.services.tenant_multirepo_linkage_service import tenant_multirepo_linkage_service
          from app.services.tenant_partition_service import tenant_partition_service
          from app.services.tenant_provider_onboarding_service import tenant_provider_onboarding_service
          from app.services.tenant_scoped_vault_projection_service import tenant_scoped_vault_projection_service
          from app.services.workspace_publish_bridge_service import workspace_publish_bridge_service
          from app.services.external_fetch_runtime_service import external_fetch_runtime_service

          async def run_checks() -> None:
              route_paths = {route.path for route in app.routes}
              required_routes = {
                  "/health",
                  "/app/operator-chat",
                  "/api/operator-chat-runtime-snapshot/status",
                  "/api/browser-intake/status",
                  "/api/browser-control/status",
                  "/api/mobile-cockpit/status",
                  "/api/driving-mode/status",
                  "/api/context-orchestration/status",
                  "/api/multi-ai-repair/status",
                  "/api/android-real-build-progressive/status",
                  "/api/offline-command-buffering/status",
                  "/api/continuous-remote-execution/status",
                  "/api/remote-session-persistence/status",
                  "/api/external-asset-intake/status",
                  "/api/external-asset-publish/status",
                  "/api/external-asset-materialization/status",
                  "/api/local-asset-workspace/status",
                  "/api/local-asset-transformation/status",
                  "/api/workspace-publish-bridge/status",
                  "/api/external-fetch-runtime/status",
                  "/api/asset-derivative/status",
                  "/api/preview-packaging/status",
                  "/api/bundle-publish-link/status",
                  "/api/capability-reuse/status",
                  "/api/conversation-bundles/status",
                  "/api/conversation-reconciliation/status",
                  "/api/conversation-repo-materialization/status",
                  "/api/intelligent-completion-planner/status",
                  "/api/intelligent-patch-synthesis/status",
                  "/api/intelligent-patch-apply/status",
                  "/api/intelligent-repo-merge/status",
                  "/api/intelligent-repo-state/status",
                  "/api/intelligent-merge-guard/status",
                  "/api/secret-vault/status",
                  "/api/deployment-secret-binding/status",
                  "/api/guarded-deploy-promotion/status",
                  "/api/deploy-execution-plan/status",
                  "/api/deploy-target-execution/status",
                  "/api/provider-deploy-execution/status",
                  "/api/provider-secret-sync/status",
                  "/api/provider-connector-registry/status",
                  "/api/env-intake/status",
                  "/api/env-vault-import/status",
                  "/api/repo-env-harvest/status",
                  "/api/shared-secret-topology/status",
                  "/api/tenant-partition/status",
                  "/api/provider-session-partition/status",
                  "/api/tenant-scoped-vault-projection/status",
                  "/api/tenant-provider-onboarding/status",
                  "/api/tenant-browser-onboarding-executor/status",
                  "/api/tenant-multirepo-linkage/status",
                  "/api/operator-conversation-thread/status",
                  "/api/operator-response-guidance/status",
                  "/api/operator-approval-gate/status",
                  "/api/operator-input-request/status",
                  "/api/operator-pending-attention/status",
                  "/api/operator-popup-delivery/status",
                  "/api/operator-resumable-action/status",
              }
              missing = sorted(required_routes - route_paths)
              assert not missing, f"Missing routes: {missing}"

              assert context_aware_orchestration_service.get_context_summary()["ok"] is True
              assert mobile_cockpit_command_surface_service.get_summary()["ok"] is True
              assert operator_chat_runtime_snapshot_service.get_status()["ok"] is True
              repair = multi_ai_intake_and_script_repair_service.get_broken_scripts()
              assert repair["ok"] is True and repair["issues"]
              assert android_real_build_progressive_service.get_summary()["ok"] is True
              assert offline_command_buffering_service.get_connectivity()["ok"] is True
              assert remote_session_persistence_service.get_session_package()["ok"] is True
              assert continuous_remote_execution_service.get_execution_package()["ok"] is True
              assert runtime_supervisor_guidance_service.get_summary()["ok"] is True

              session_one = browser_conversation_intake_service.create_session(source_type="browser_ai_conversation", source_url="https://chatgpt.com/c/workflow-session-1", conversation_title="Workflow Session 1", project_hint="workflow_project")
              session_two = browser_conversation_intake_service.create_session(source_type="browser_ai_conversation", source_url="https://claude.ai/chat/workflow-session-2", conversation_title="Workflow Session 2", project_hint="workflow_project")
              browser_conversation_intake_service.append_capture(session_id=session_one["session_id"], snippets=[{"kind": "decision", "text": "usar FastAPI no backend"}], code_blocks=[{"language": "python", "path": "backend/app/main.py", "code": "print('workflow one')\n"}, {"language": "python", "path": "backend/app/main.py", "code": "print('workflow one')\n"}], capture_status="captured")
              browser_conversation_intake_service.append_capture(session_id=session_two["session_id"], snippets=[{"kind": "decision", "text": "usar OCR no módulo de imagem"}], code_blocks=[{"language": "python", "path": "backend/app/main.py", "code": "print('workflow one improved')\nprint('extra')\n"}, {"language": "typescript", "path": "frontend/src/app/page.tsx", "code": "export default function Page(){return <div>workflow</div>}\n"}], capture_status="captured")
              bundle_created = conversation_bundle_service.create_bundle_from_sessions(session_ids=[session_one["session_id"], session_two["session_id"]], project_hint="workflow_project", bundle_name="workflow-project-bundle")
              reconciliation = conversation_reconciliation_service.reconcile_bundle(bundle_id=bundle_created["bundle"]["bundle_id"])
              reconciliation_report = conversation_reconciliation_service.get_report(bundle_id=bundle_created["bundle"]["bundle_id"])
              repo_materialized = conversation_repo_materialization_service.materialize_bundle_repo_plan(bundle_id=bundle_created["bundle"]["bundle_id"], repository_name="workflow-project-repo")
              capability_lookup = capability_reuse_service.lookup_capability("fastapi")
              provider_registry = provider_connector_registry_service.list_providers()
              completion_plan = intelligent_completion_planner_service.build_completion_plan(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo", desired_capabilities=["fastapi", "ocr"])
              patch_synthesis = intelligent_patch_synthesis_service.synthesize_bundle_patch(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo", desired_capabilities=["fastapi", "ocr"])
              patch_apply = intelligent_patch_apply_service.apply_synthesized_patch(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo", desired_capabilities=["fastapi", "ocr"], overwrite_existing=True)
              repo_merge = intelligent_repo_merge_service.merge_applied_patch(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo", desired_capabilities=["fastapi", "ocr"], overwrite_existing=True)
              repo_state = intelligent_repo_state_service.inspect_merge_workspace(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo")
              merge_guard = intelligent_merge_guard_service.evaluate_merge_workspace(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo")

              tenant_saved = tenant_partition_service.upsert_tenant(tenant_id="owner-andre", owner_type="self", display_name="André", repo_scope_mode="private_default", provider_scope_mode="private_default", vault_namespace="vault/owner-andre", notes="primary owner namespace")
              tenant_plan = tenant_partition_service.build_partition_plan(tenant_id="owner-andre", project_name="baribudos-studio", multirepo_mode=True)
              tenant_onboarding = tenant_provider_onboarding_service.build_plan(tenant_id="owner-andre", project_name="baribudos-studio", providers=["github", "vercel", "supabase"], multirepo_mode=True)
              provider_session = tenant_provider_onboarding_service.materialize_session_preview(tenant_id="owner-andre", provider_name="github", account_label="owner-andre-github", notes="main owner account")
              browser_executor = tenant_browser_onboarding_executor_service.execute_first_run_capture(tenant_id="owner-andre", project_name="baribudos-studio", provider_name="github", account_label="owner-andre-github-live", multirepo_mode=True)
              multirepo_linkage = tenant_multirepo_linkage_service.build_linkage(tenant_id="owner-andre", project_name="baribudos-studio", frontend_runtime="vercel", backend_runtime="render")

              operator_thread = operator_conversation_thread_service.open_thread(tenant_id="owner-andre", conversation_title="God Mode mobile operator thread", channel_mode="mobile_chat")
              append_user = operator_conversation_thread_service.append_message(thread_id=operator_thread["thread"]["thread_id"], role="user", content="Preciso que continues o login no provider e aguardes pelo meu input.", suggested_next_steps=["Abrir popup seguro", "Esperar input do operador"])
              input_request = operator_input_request_service.create_request(tenant_id="owner-andre", thread_id=operator_thread["thread"]["thread_id"], provider_name="github", request_kind="credential_field", title="Login necessário", prompt_text="Escreve a credencial pedida para continuar o login.", field_label="Password", field_mode="password", is_sensitive=True)
              popup_delivery = operator_popup_delivery_service.create_delivery(tenant_id="owner-andre", thread_id=operator_thread["thread"]["thread_id"], popup_kind="input_request", popup_ref_id=input_request["request"]["request_id"], title="Login necessário", requires_operator_response=True)
              popup_reissue = operator_popup_delivery_service.reissue_pending_delivery(delivery_id=popup_delivery["delivery"]["delivery_id"])
              popup_delivered = operator_popup_delivery_service.mark_delivered(delivery_id=popup_delivery["delivery"]["delivery_id"])
              approval_gate = operator_approval_gate_service.create_gate(tenant_id="owner-andre", thread_id=operator_thread["thread"]["thread_id"], action_label="Continuar login automatizado", action_scope="provider_login", action_payload_summary="Vai transcrever o próximo input do operador para o fluxo do provider.", risk_level="medium")
              resumable_action = operator_resumable_action_service.create_action(tenant_id="owner-andre", thread_id=operator_thread["thread"]["thread_id"], provider_name="ctt", action_kind="provider_login_flow", purpose_summary="Continuar login no site CTT depois de sincronizar input offline.", resume_strategy="retry_from_latest_safe_checkpoint", requires_fresh_provider_session=True)
              snapshot = operator_chat_runtime_snapshot_service.build_snapshot(tenant_id="owner-andre", thread_id=operator_thread["thread"]["thread_id"])
              attention_feed = operator_pending_attention_service.build_attention_feed(tenant_id="owner-andre")
              submit_input = operator_input_request_service.submit_request(request_id=input_request["request"]["request_id"], submitted_value="my-secure-value")
              popup_ack = operator_popup_delivery_service.acknowledge_response(delivery_id=popup_delivery["delivery"]["delivery_id"])
              offline_sync = operator_resumable_action_service.submit_offline_sync(action_id=resumable_action["action"]["action_id"], payload_summary="Password preenchida offline e pronta a sincronizar.")
              resume_expired = operator_resumable_action_service.resume_action(action_id=resumable_action["action"]["action_id"], provider_session_still_valid=False)
              resolve_gate = operator_approval_gate_service.resolve_gate(gate_id=approval_gate["gate"]["gate_id"], decision="approve")
              guidance = operator_response_guidance_service.build_guidance(thread_id=operator_thread["thread"]["thread_id"])
              attention_after = operator_pending_attention_service.build_attention_feed(tenant_id="owner-andre")

              env_text = "OPENAI_API_KEY=neutral-test-value-openai\nSTRIPE_SECRET_KEY=sk_test_example_value\nPAYPAL_CLIENT_ID=paypal_client_example\nNEXT_PUBLIC_API_URL=https://baribudos.example/api\n"
              parsed_env = env_intake_service.parse_env_text(env_text=env_text, source_name="baribudos-studio/.env", target_project="baribudos-studio", environment_name="production")
              imported_env = env_vault_import_service.import_env_text(env_text=env_text, source_name="vault/owner-andre:baribudos-studio/.env", target_project="baribudos-studio", environment_name="production")
              harvested_envs = repo_env_harvest_service.harvest_repo_env_sources(repository_name="AndreVazao/baribudos-studio", target_project="baribudos-studio", environment_name="production", env_sources=[{"source_name": ".env", "path": ".env", "env_text": env_text}, {"source_name": ".env.local", "path": ".env.local", "env_text": "PAYPAL_SECRET=paypal_secret_example\nDATABASE_URL=postgres://example\n"}])
              shared_topology = shared_secret_topology_service.build_topology(project_names=["baribudos-studio", "workflow-project-repo"])
              tenant_projection = tenant_scoped_vault_projection_service.build_projection(tenant_id="owner-andre")

              secret_registered = secret_vault_service.register_secret(secret_name="OPENAI_API_KEY", secret_value="neutral-test-value-openai", provider="openai", usage_scope="deploy_runtime", target_refs=["workflow-project-repo:production", "vault/owner-andre"])
              secret_list = secret_vault_service.list_secrets()
              binding = deployment_secret_binding_service.bind_secret(target_name="workflow-project-repo", environment_name="production", secret_name="OPENAI_API_KEY", inject_as="OPENAI_API_KEY")
              binding_plan = deployment_secret_binding_service.build_deploy_secret_plan(target_name="workflow-project-repo", environment_name="production")
              provider_sync = provider_secret_sync_service.build_sync_plan(target_project="workflow-project-repo", environment_name="production", provider_name="github_actions")
              guarded_promotion = guarded_deploy_promotion_service.prepare_promotion(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo", environment_name="production")
              deploy_plan = deploy_execution_plan_service.build_plan(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo", environment_name="production")
              target_execution = deploy_target_execution_service.execute_plan(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo", environment_name="production", dry_run=True)
              provider_execution = provider_deploy_execution_service.execute_provider_plan(bundle_id=bundle_created["bundle"]["bundle_id"], target_project="workflow-project-repo", environment_name="production", provider_name="github_actions", dry_run=True)

              staged_asset = external_asset_intake_service.stage_asset_request(source_type="browser_web_service", source_ref="inline://workflow-test/icon.svg", asset_role="icon", project_hint="workflow_test", repository_full_name="AndreVazao/devops-god-mode", destination_path="assets/icons/example-icon.svg", content_text="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'><circle cx='4' cy='4' r='3'/></svg>", content_kind="svg_text")
              materialized = await external_asset_materialization_service.materialize_github_file_to_stage(repository_full_name="AndreVazao/devops-god-mode", file_path="README.md", asset_role="reference_doc", project_hint="workflow_test", destination_path="assets/reference/README.md", ref="main")
              workspace_file = local_asset_workspace_service.materialize_staged_asset_to_disk(staged_asset["staged_asset"]["staged_asset_id"])
              transformed = local_asset_transformation_service.transform_text_asset(workspace_file=workspace_file["workspace_file"], operation="suffix", transform_value="\n<!-- generated in workflow -->\n", output_suffix=".wf")
              fetched_binary = await external_fetch_runtime_service.fetch_url_to_stage(source_url="https://github.githubassets.com/favicons/favicon.png", asset_role="brand_icon_png", project_hint="workflow_test", repository_full_name="AndreVazao/devops-god-mode", destination_path="assets/fetched/favicon.png", source_type="external_url", user_agent="GodModeWorkflow/1.0")
              fetched_binary_workspace = local_asset_workspace_service.materialize_staged_asset_to_disk(fetched_binary["staged_asset"]["staged_asset_id"])
              svg_wrapper = asset_derivative_service.create_svg_wrapper(workspace_file=transformed["output_file"], output_name="workflow-card", title="Workflow Card", background="#101820")
              binary_sidecar = asset_derivative_service.create_binary_metadata_sidecar(workspace_file=fetched_binary_workspace["workspace_file"], label="workflow binary asset")
              preview_bundle = preview_packaging_service.create_preview_bundle(bundle_name="workflow-preview-bundle", workspace_files=[svg_wrapper["output_file"], fetched_binary_workspace["workspace_file"], binary_sidecar["sidecar_file"]], title="Workflow Preview Bundle")
              preview_archive = preview_packaging_service.create_bundle_archive(bundle_name="workflow-preview-bundle")
              publish_plan = external_asset_intake_service.build_github_publish_plan(repository_full_name="AndreVazao/devops-god-mode", project_hint="workflow_test")
              publish_execution = await external_asset_publish_execution_service.execute_publish_plan(repository_full_name="AndreVazao/devops-god-mode", project_hint="workflow_test", branch="main", dry_run=True)

              assert bundle_created["bundle_status"] == "bundle_created"
              assert reconciliation["reconciliation_status"] == "reconciled"
              assert reconciliation_report["ok"] is True
              assert repo_materialized["materialized_count"] >= 2
              assert capability_lookup["ok"] is True
              assert provider_registry["ok"] is True and provider_registry["provider_count"] >= 3
              assert tenant_saved["ok"] is True and tenant_saved["upsert_status"] == "tenant_partition_saved"
              assert tenant_plan["ok"] is True and tenant_plan["plan"]["multirepo_mode"] is True
              assert tenant_onboarding["ok"] is True and tenant_onboarding["provider_count"] == 3
              assert provider_session["ok"] is True and provider_session["upsert_status"] == "provider_session_saved"
              assert browser_executor["ok"] is True and browser_executor["step_count"] == 4
              assert multirepo_linkage["ok"] is True and multirepo_linkage["frontend_repo"] == "baribudos-studio-frontend"
              assert operator_thread["ok"] is True and operator_thread["open_status"] == "thread_opened"
              assert append_user["ok"] is True and append_user["append_status"] == "message_appended"
              assert input_request["ok"] is True and input_request["create_status"] == "operator_input_requested"
              assert popup_delivery["ok"] is True and popup_delivery["create_status"] == "popup_delivery_created"
              assert popup_reissue["ok"] is True and popup_reissue["reissue_status"] == "popup_reissue_required"
              assert popup_delivered["ok"] is True and popup_delivered["mark_status"] == "popup_delivered"
              assert approval_gate["ok"] is True and approval_gate["create_status"] == "approval_gate_created"
              assert resumable_action["ok"] is True and resumable_action["create_status"] == "resumable_action_created"
              assert snapshot["ok"] is True and snapshot["thread_count"] >= 1
              assert snapshot["active_thread"]["ok"] is True
              assert attention_feed["ok"] is True and attention_feed["waiting_thread_count"] >= 1
              assert submit_input["ok"] is True and submit_input["submit_status"] == "input_received"
              assert popup_ack["ok"] is True and popup_ack["ack_status"] == "operator_response_acknowledged"
              assert offline_sync["ok"] is True and offline_sync["sync_status"] == "offline_sync_received"
              assert resume_expired["ok"] is True and resume_expired["resume_status"] == "provider_session_expired_restart_required"
              assert resolve_gate["ok"] is True and resolve_gate["resolve_status"] == "approved"
              assert guidance["ok"] is True and guidance["guidance_status"] == "operator_guidance_ready"
              assert attention_after["ok"] is True and attention_after["pending_gate_count"] == 0
              assert attention_after["pending_input_count"] == 0
              assert parsed_env["ok"] is True and parsed_env["item_count"] >= 4
              assert imported_env["ok"] is True and imported_env["imported_count"] >= 4
              assert harvested_envs["ok"] is True and harvested_envs["harvested_count"] == 2
              assert shared_topology["ok"] is True and shared_topology["shared_secret_count"] >= 1
              assert tenant_projection["ok"] is True
              assert completion_plan["ok"] is True
              assert patch_synthesis["ok"] is True and patch_synthesis["file_count"] >= 2
              assert patch_apply["ok"] is True and patch_apply["applied_count"] >= 2
              assert repo_merge["ok"] is True and repo_merge["merged_count"] >= 2
              assert repo_state["ok"] is True and repo_state["file_count"] >= 2
              assert merge_guard["ok"] is True and sum(merge_guard["counts"].values()) >= 2
              assert secret_registered["ok"] is True
              assert secret_list["ok"] is True and secret_list["secret_count"] >= 1
              assert binding["ok"] is True and binding["binding_status"] == "secret_bound"
              assert binding_plan["ok"] is True and binding_plan["binding_count"] >= 1
              assert provider_sync["ok"] is True and provider_sync["mapped_binding_count"] >= 1
