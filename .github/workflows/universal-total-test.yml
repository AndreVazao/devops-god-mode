name: Universal Total Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'backend/**'
      - 'desktop/**'
      - 'docs/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'desktop/**'
      - 'docs/**'
      - '.github/workflows/**'

jobs:
  universal-total-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Universal backend import and route test
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          import asyncio
          import json

          from main import app
          from app.services.asset_derivative_service import asset_derivative_service
          from app.services.browser_conversation_intake_service import browser_conversation_intake_service
          from app.services.bundle_publish_link_service import bundle_publish_link_service
          from app.services.context_aware_orchestration_service import context_aware_orchestration_service
          from app.services.conversation_bundle_service import conversation_bundle_service
          from app.services.mobile_cockpit_command_surface_service import mobile_cockpit_command_surface_service
          from app.services.multi_ai_intake_and_script_repair_service import multi_ai_intake_and_script_repair_service
          from app.services.android_real_build_progressive_service import android_real_build_progressive_service
          from app.services.offline_command_buffering_service import offline_command_buffering_service
          from app.services.preview_packaging_service import preview_packaging_service
          from app.services.remote_session_persistence_service import remote_session_persistence_service
          from app.services.continuous_remote_execution_service import continuous_remote_execution_service
          from app.services.runtime_supervisor_guidance_service import runtime_supervisor_guidance_service
          from app.services.external_asset_intake_service import external_asset_intake_service
          from app.services.external_asset_publish_execution_service import external_asset_publish_execution_service
          from app.services.external_asset_materialization_service import external_asset_materialization_service
          from app.services.local_asset_workspace_service import local_asset_workspace_service
          from app.services.local_asset_transformation_service import local_asset_transformation_service
          from app.services.workspace_publish_bridge_service import workspace_publish_bridge_service
          from app.services.external_fetch_runtime_service import external_fetch_runtime_service

          async def run_checks() -> None:
              route_paths = {route.path for route in app.routes}
              required_routes = {
                  "/health",
                  "/api/browser-intake/status",
                  "/api/browser-control/status",
                  "/api/mobile-cockpit/status",
                  "/api/driving-mode/status",
                  "/api/context-orchestration/status",
                  "/api/multi-ai-repair/status",
                  "/api/android-real-build-progressive/status",
                  "/api/offline-command-buffering/status",
                  "/api/continuous-remote-execution/status",
                  "/api/remote-session-persistence/status",
                  "/api/external-asset-intake/status",
                  "/api/external-asset-publish/status",
                  "/api/external-asset-materialization/status",
                  "/api/local-asset-workspace/status",
                  "/api/local-asset-transformation/status",
                  "/api/workspace-publish-bridge/status",
                  "/api/external-fetch-runtime/status",
                  "/api/asset-derivative/status",
                  "/api/preview-packaging/status",
                  "/api/bundle-publish-link/status",
                  "/api/conversation-bundles/status",
              }
              missing = sorted(required_routes - route_paths)
              assert not missing, f"Missing routes: {missing}"

              orchestration = context_aware_orchestration_service.get_context_summary()
              cockpit = mobile_cockpit_command_surface_service.get_summary()
              repair = multi_ai_intake_and_script_repair_service.get_broken_scripts()
              progressive = android_real_build_progressive_service.get_summary()
              connectivity = offline_command_buffering_service.get_connectivity()
              queued = offline_command_buffering_service.queue_command(
                  source_side="phone",
                  command_text="continuar montagem do programa a partir da conversa alvo",
                  project_hint="workflow_test",
              )
              synced = offline_command_buffering_service.sync_buffered_commands_to_pc()
              sessions = remote_session_persistence_service.get_session_package()
              execution = continuous_remote_execution_service.get_execution_package()
              supervisor = runtime_supervisor_guidance_service.get_summary()

              session_one = browser_conversation_intake_service.create_session(
                  source_type="browser_ai_conversation",
                  source_url="https://chatgpt.com/c/workflow-session-1",
                  conversation_title="Workflow Session 1",
                  project_hint="workflow_project",
              )
              session_two = browser_conversation_intake_service.create_session(
                  source_type="browser_ai_conversation",
                  source_url="https://claude.ai/chat/workflow-session-2",
                  conversation_title="Workflow Session 2",
                  project_hint="workflow_project",
              )
              browser_conversation_intake_service.append_capture(
                  session_id=session_one["session_id"],
                  snippets=[{"kind": "decision", "text": "usar FastAPI no backend"}],
                  code_blocks=[{"language": "python", "path": "backend/app/main.py", "code": "print('workflow one')\n"}],
                  capture_status="captured",
              )
              browser_conversation_intake_service.append_capture(
                  session_id=session_two["session_id"],
                  snippets=[{"kind": "decision", "text": "usar Next.js no cockpit"}],
                  code_blocks=[{"language": "typescript", "path": "frontend/src/app/page.tsx", "code": "export default function Page(){return <div>workflow</div>}\n"}],
                  capture_status="captured",
              )
              bundle_status = conversation_bundle_service.get_status()
              bundle_created = conversation_bundle_service.create_bundle_from_sessions(
                  session_ids=[session_one["session_id"], session_two["session_id"]],
                  project_hint="workflow_project",
                  bundle_name="workflow-project-bundle",
              )
              auto_group = conversation_bundle_service.auto_group_captured_sessions()
              repo_plan = conversation_bundle_service.build_repo_materialization_plan(
                  bundle_id=bundle_created["bundle"]["bundle_id"],
                  repository_name="workflow-project-repo",
              )

              staged_asset = external_asset_intake_service.stage_asset_request(
                  source_type="browser_web_service",
                  source_ref="inline://workflow-test/icon.svg",
                  asset_role="icon",
                  project_hint="workflow_test",
                  repository_full_name="AndreVazao/devops-god-mode",
                  destination_path="assets/icons/example-icon.svg",
                  content_text="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'><circle cx='4' cy='4' r='3'/></svg>",
                  content_kind="svg_text",
              )
              materialization_status = external_asset_materialization_service.get_status()
              materialized = await external_asset_materialization_service.materialize_github_file_to_stage(
                  repository_full_name="AndreVazao/devops-god-mode",
                  file_path="README.md",
                  asset_role="reference_doc",
                  project_hint="workflow_test",
                  destination_path="assets/reference/README.md",
                  ref="main",
              )
              workspace_status = local_asset_workspace_service.get_status()
              workspace_file = local_asset_workspace_service.materialize_staged_asset_to_disk(staged_asset["staged_asset"]["staged_asset_id"])
              workspace_project = local_asset_workspace_service.materialize_project_assets_to_disk("workflow_test")
              transformation_status = local_asset_transformation_service.get_status()
              transformed = local_asset_transformation_service.transform_text_asset(
                  workspace_file=workspace_file["workspace_file"], operation="suffix", transform_value="\n<!-- generated in workflow -->\n", output_suffix=".wf"
              )
              duplicated = local_asset_transformation_service.duplicate_workspace_asset(workspace_file=workspace_file["workspace_file"], duplicate_name="example-icon-copy")
              bridge_status = workspace_publish_bridge_service.get_status()
              restaged = workspace_publish_bridge_service.restage_workspace_file(
                  workspace_file=transformed["output_file"], asset_role="icon_variant", source_ref="workspace://workflow/generated-icon", project_hint="workflow_test", repository_full_name="AndreVazao/devops-god-mode", destination_path="assets/icons/generated-icon.svg", content_kind="svg_text"
              )
              bridge_publish = await workspace_publish_bridge_service.publish_workspace_file(
                  workspace_file=duplicated["duplicate_file"], asset_role="icon_copy", source_ref="workspace://workflow/icon-copy", repository_full_name="AndreVazao/devops-god-mode", destination_path="assets/icons/example-icon-copy.svg", project_hint="workflow_test", branch="main", content_kind="svg_text", dry_run=True
              )
              fetch_status = external_fetch_runtime_service.get_status()
              fetched = await external_fetch_runtime_service.fetch_url_to_stage(
                  source_url="https://example.com/", asset_role="landing_html", project_hint="workflow_test", repository_full_name="AndreVazao/devops-god-mode", destination_path="assets/fetched/example.html", source_type="external_url", auth_mode="header", auth_value="X-Test-Token: workflow", extra_headers={"X-Workflow": "universal"}, user_agent="GodModeWorkflow/1.0"
              )
              fetched_binary = await external_fetch_runtime_service.fetch_url_to_stage(
                  source_url="https://github.githubassets.com/favicons/favicon.png", asset_role="brand_icon_png", project_hint="workflow_test", repository_full_name="AndreVazao/devops-god-mode", destination_path="assets/fetched/favicon.png", source_type="external_url", user_agent="GodModeWorkflow/1.0"
              )
              fetched_binary_workspace = local_asset_workspace_service.materialize_staged_asset_to_disk(fetched_binary["staged_asset"]["staged_asset_id"])
              derivative_status = asset_derivative_service.get_status()
              svg_wrapper = asset_derivative_service.create_svg_wrapper(workspace_file=transformed["output_file"], output_name="workflow-card", title="Workflow Card", background="#101820")
              binary_sidecar = asset_derivative_service.create_binary_metadata_sidecar(workspace_file=fetched_binary_workspace["workspace_file"], label="workflow binary asset")
              preview_status = preview_packaging_service.get_status()
              preview_bundle = preview_packaging_service.create_preview_bundle(bundle_name="workflow-preview-bundle", workspace_files=[svg_wrapper["output_file"], fetched_binary_workspace["workspace_file"], binary_sidecar["sidecar_file"]], title="Workflow Preview Bundle")
              preview_archive = preview_packaging_service.create_bundle_archive(bundle_name="workflow-preview-bundle")
              bundle_link_status = bundle_publish_link_service.get_status()
              bundle_restage = bundle_publish_link_service.restage_preview_bundle(bundle_name="workflow-preview-bundle", repository_full_name="AndreVazao/devops-god-mode", destination_root="delivery/workflow-preview-bundle", project_hint="workflow_test", include_archive=True)
              bundle_publish = await bundle_publish_link_service.dry_run_publish_preview_bundle(bundle_name="workflow-preview-bundle", repository_full_name="AndreVazao/devops-god-mode", destination_root="delivery/workflow-preview-bundle", project_hint="workflow_test", branch="main", include_archive=True)
              intake_package = external_asset_intake_service.get_package()
              publish_plan = external_asset_intake_service.build_github_publish_plan(repository_full_name="AndreVazao/devops-god-mode", project_hint="workflow_test")
              publish_status = external_asset_publish_execution_service.get_status()
              publish_execution = await external_asset_publish_execution_service.execute_publish_plan(repository_full_name="AndreVazao/devops-god-mode", project_hint="workflow_test", branch="main", dry_run=True)

              assert orchestration["ok"] is True
              assert cockpit["ok"] is True
              assert repair["ok"] is True and repair["issues"]
              assert progressive["ok"] is True
              assert connectivity["ok"] is True and queued["ok"] is True and synced["mode"] == "offline_command_sync"
              assert sessions["ok"] is True and execution["ok"] is True and supervisor["ok"] is True
              assert bundle_status["ok"] is True
              assert bundle_created["bundle_status"] == "bundle_created"
              assert auto_group["ok"] is True
              assert repo_plan["plan_status"] == "repo_plan_ready"
              assert len(repo_plan["plan"]["file_plan"]) >= 2
              assert staged_asset["ok"] is True
              assert materialization_status["ok"] is True
              assert materialized["materialization_status"] in {"materialized_to_stage", "github_not_configured"}
              assert workspace_status["ok"] is True and workspace_file["materialization_status"] == "materialized_to_workspace"
              assert workspace_project["ok"] is True and workspace_project["materialized_count"] >= 1
              assert transformation_status["ok"] is True and transformed["transformation_status"] == "transformed"
              assert duplicated["duplicate_status"] == "duplicated"
              assert bridge_status["ok"] is True and restaged["restage_status"] == "restaged_from_workspace"
              assert bridge_publish["publish_status"] == "dry_run_ready"
              assert fetch_status["ok"] is True and fetched["fetch_status"] == "fetched_and_staged"
              assert fetched_binary["fetch_status"] == "fetched_and_staged"
              assert derivative_status["ok"] is True and svg_wrapper["derivative_status"] == "svg_wrapper_created"
              assert binary_sidecar["derivative_status"] == "binary_sidecar_created"
              assert preview_status["ok"] is True and preview_bundle["bundle_status"] == "preview_bundle_created"
              assert preview_archive["archive_status"] == "preview_archive_created"
              assert bundle_link_status["ok"] is True and bundle_restage["restage_status"] == "bundle_restaged"
              assert bundle_publish["publish_status"] == "dry_run_ready"
              assert intake_package["ok"] is True and publish_plan["ok"] is True
              assert publish_status["ok"] is True and publish_execution["ok"] is True

              assert Path("data/browser_conversation_intake_store.json").exists()
              assert Path("data/conversation_bundle_store.json").exists()
              assert Path(transformed["output_file"]).exists()
              assert Path(svg_wrapper["output_file"]).exists()
              assert Path(binary_sidecar["sidecar_file"]).exists()
              assert Path(preview_bundle["index_file"]).exists()
              assert Path(preview_archive["archive_file"]).exists()
              print("universal total test passed")

          asyncio.run(run_checks())
          PY

      - name: Validate desktop build inputs exist
        run: |
          test -f desktop/godmode_desktop_launcher.py
          test -f desktop/GodModeDesktop.spec
          test -f desktop/windows_shortcut_bootstrap.ps1
          test -f desktop/windows_autostart_bootstrap.ps1
          test -f desktop/windows_autostart_remove.ps1

      - name: Build summary
        run: |
          echo '## Universal Total Test Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Core backend imports were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Main route set was validated for generic evolving phases.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Multi-provider conversation intake, bundling, repo planning, packaging and delivery dry-runs were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Desktop EXE input files were validated.' >> "$GITHUB_STEP_SUMMARY"
