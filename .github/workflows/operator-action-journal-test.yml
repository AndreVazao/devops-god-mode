name: Operator Action Journal Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/operator-action-journal-test.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/operator-action-journal-test.yml'

jobs:
  operator-action-journal-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate journal routes and snapshot integration
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.operator_action_journal_service import operator_action_journal_service
          from app.services.operator_chat_runtime_snapshot_service import operator_chat_runtime_snapshot_service
          from app.services.operator_conversation_thread_service import operator_conversation_thread_service

          route_paths = {route.path for route in app.routes}
          required_routes = {
              "/api/operator-action-journal/status",
              "/api/operator-action-journal/package",
              "/api/operator-action-journal/list",
              "/api/operator-action-journal/log",
              "/api/operator-chat-runtime-snapshot/status",
          }
          missing = sorted(required_routes - route_paths)
          assert not missing, f"Missing routes: {missing}"

          assert operator_action_journal_service.get_status()["ok"] is True

          opened = operator_conversation_thread_service.open_thread(
              tenant_id="owner-andre",
              conversation_title="Journal validation thread",
              channel_mode="mobile_chat",
          )
          thread_id = opened["thread"]["thread_id"]

          logged_one = operator_action_journal_service.log_event(
              tenant_id="owner-andre",
              thread_id=thread_id,
              event_type="offline_queue_enqueued",
              summary="Mensagem ficou em fila local durante falha de rede.",
              outcome="queued",
              details={"queue_size": 1},
          )
          logged_two = operator_action_journal_service.log_event(
              tenant_id="owner-andre",
              thread_id=thread_id,
              event_type="offline_queue_flushed",
              summary="Fila local sincronizada depois do reconnect.",
              outcome="synchronized",
              details={"queue_size": 0},
          )
          listed = operator_action_journal_service.list_entries(tenant_id="owner-andre", thread_id=thread_id, limit=10)
          snapshot = operator_chat_runtime_snapshot_service.build_snapshot(tenant_id="owner-andre", thread_id=thread_id)

          assert logged_one["ok"] is True and logged_one["entry"]["event_type"] == "offline_queue_enqueued"
          assert logged_two["ok"] is True and logged_two["entry"]["event_type"] == "offline_queue_flushed"
          assert listed["ok"] is True and listed["entry_count"] >= 2
          assert snapshot["ok"] is True
          assert snapshot["journal_entry_count"] >= 2
          assert len(snapshot["thread_journal_entries"]) >= 2
          assert snapshot["thread_journal_entries"][0]["thread_id"] == thread_id

          assert Path("data/operator_action_journal.json").exists()
          assert Path("backend/app/services/operator_action_journal_service.py").exists()
          assert Path("backend/app/routes/operator_action_journal.py").exists()
          assert Path("docs/frontend/operator-chat-action-journal.md").exists()

          print("operator action journal test passed")
          PY

      - name: Build summary
        run: |
          echo '## Operator Action Journal Test Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Operator action journal routes were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Journal logging and listing were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Runtime snapshot integration with journal entries was validated.' >> "$GITHUB_STEP_SUMMARY"
