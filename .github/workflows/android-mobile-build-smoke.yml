name: Android Mobile Build Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/android-apk-build-workflow'
    paths:
      - 'docs/android-mobile-build-plan.md'
      - 'backend/contracts/android_mobile_build_profile.example.json'
      - '.github/workflows/android-mobile-build.yml'
      - '.github/workflows/android-mobile-build-smoke.yml'

jobs:
  smoke-android-mobile-build-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android mobile build files
        run: |
          test -f docs/android-mobile-build-plan.md
          test -f backend/contracts/android_mobile_build_profile.example.json
          test -f .github/workflows/android-mobile-build.yml

      - name: Validate Android mobile build markers
        run: |
          grep -q '"artifact_type": "apk"' backend/contracts/android_mobile_build_profile.example.json
          grep -q '"target_platform": "android_phone"' backend/contracts/android_mobile_build_profile.example.json
          grep -q "setup-node" .github/workflows/android-mobile-build.yml
          grep -q "GodModeMobile.apk" .github/workflows/android-mobile-build.yml
          grep -q "upload-artifact" .github/workflows/android-mobile-build.yml
