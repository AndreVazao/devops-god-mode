name: Recovery Write Execution Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-recovery-write-execution-plan.md'
      - 'backend/contracts/recovery_write_execution_session.example.json'
      - 'backend/contracts/recovery_write_execution_result.example.json'
      - 'backend/app/services/project_recovery_write_execution_service.py'
      - 'backend/app/routes/project_recovery_write_execution.py'
      - 'backend/main.py'
      - '.github/workflows/recovery-write-execution-phase.yml'

jobs:
  recovery-write-execution-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate recovery write execution layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_recovery_write_execution_service import project_recovery_write_execution_service

          sessions = project_recovery_write_execution_service.get_execution_sessions()["sessions"]
          first_project_id = sessions[0]["recovery_project_id"]
          results = project_recovery_write_execution_service.get_execution_results(first_project_id)["results"]
          package = project_recovery_write_execution_service.get_execution_package(first_project_id)["package"]
          next_action = project_recovery_write_execution_service.get_next_execution_action()["next_execution_action"]
          route_paths = {route.path for route in app.routes}

          assert sessions, "Expected at least one recovery write execution session"
          assert results, "Expected at least one recovery write execution result"
          assert next_action is not None
          assert package["session"]["execution_target_count"] == len(package["results"])
          assert "/api/project-recovery-write-execution/status" in route_paths
          assert "/api/project-recovery-write-execution/sessions" in route_paths
          assert "/api/project-recovery-write-execution/results" in route_paths
          assert "/api/project-recovery-write-execution/next-execution-action" in route_paths
          print("recovery write execution phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Recovery Write Execution Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for recovery write execution validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
