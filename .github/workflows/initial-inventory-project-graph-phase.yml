name: Initial Inventory Project Graph Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/initial-inventory-project-graph-plan.md'
      - 'backend/contracts/initial_inventory_source.example.json'
      - 'backend/contracts/project_graph_link.example.json'
      - 'backend/app/services/initial_inventory_project_graph_service.py'
      - 'backend/app/routes/initial_inventory_project_graph.py'
      - 'backend/main.py'
      - '.github/workflows/initial-inventory-project-graph-phase.yml'

jobs:
  initial-inventory-project-graph-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate initial inventory project graph layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.initial_inventory_project_graph_service import initial_inventory_project_graph_service
          sources = initial_inventory_project_graph_service.get_inventory_sources()["sources"]
          links = initial_inventory_project_graph_service.get_project_graph_links()["links"]
          package = initial_inventory_project_graph_service.get_inventory_package()["package"]
          next_action = initial_inventory_project_graph_service.get_next_inventory_action()["next_inventory_action"]
          route_paths = {route.path for route in app.routes}
          assert sources
          assert links
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/initial-inventory-project-graph/status" in route_paths
          assert "/api/initial-inventory-project-graph/sources" in route_paths
          assert "/api/initial-inventory-project-graph/links" in route_paths
          assert "/api/initial-inventory-project-graph/next-inventory-action" in route_paths
          print("initial inventory project graph phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Initial Inventory Project Graph Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Workflow for initial inventory project graph validation.' >> "$GITHUB_STEP_SUMMARY"
