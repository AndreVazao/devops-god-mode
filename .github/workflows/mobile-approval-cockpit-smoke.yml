name: Mobile Approval Cockpit Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/mobile-approval-cockpit'
    paths:
      - 'docs/mobile-approval-cockpit-plan.md'
      - 'frontend/mobile-shell/index.html'
      - 'frontend/mobile-shell/app.js'
      - 'frontend/mobile-shell/styles.css'
      - '.github/workflows/mobile-approval-cockpit-smoke.yml'

jobs:
  smoke-mobile-approval-cockpit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate mobile approval cockpit files
        run: |
          test -f docs/mobile-approval-cockpit-plan.md
          test -f frontend/mobile-shell/index.html
          test -f frontend/mobile-shell/app.js
          test -f frontend/mobile-shell/styles.css

      - name: Validate approval cockpit markers
        run: |
          grep -q "Aprovações" frontend/mobile-shell/index.html
          grep -q "refreshApprovalsBtn" frontend/mobile-shell/index.html
          grep -q "approvalCards" frontend/mobile-shell/index.html
          grep -q "refreshApprovals" frontend/mobile-shell/app.js
          grep -q "respondApproval" frontend/mobile-shell/app.js
          grep -q "/api/approval-broker/requests" frontend/mobile-shell/app.js
          grep -q "approval-card" frontend/mobile-shell/styles.css
          grep -q "approval-action-buttons" frontend/mobile-shell/styles.css
