name: Atomic JSON Store Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase34-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/prune-atomic-json-store-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/prune-atomic-json-store-validation.yml'

jobs:
  atomic-json-store-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate atomic JSON store and audit integration
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory

          from app.utils.atomic_json_store import AtomicJsonStore
          from app.services.system_integrity_audit_service import system_integrity_audit_service
          from main import app

          route_paths = {route.path for route in app.routes}
          assert "/api/system-integrity-audit/run" in route_paths
          assert "/app/system-integrity-audit" in route_paths

          with TemporaryDirectory() as tmp:
              store_path = Path(tmp) / "state.json"
              store = AtomicJsonStore(store_path, default_factory=lambda: {"items": []})
              assert store.load() == {"items": []}
              first = store.save({"items": [1]})
              assert first["ok"] is True
              assert store_path.exists()
              assert store.load()["items"] == [1]
              second = store.save({"items": [1, 2]})
              assert second["ok"] is True
              assert store.backup_path.exists()
              assert store.load()["items"] == [1, 2]
              update = store.update(lambda payload: {"items": payload["items"] + [3]})
              assert update["ok"] is True
              assert store.load()["items"] == [1, 2, 3]

          status = system_integrity_audit_service.get_status()
          report = system_integrity_audit_service.run_audit()
          dashboard = system_integrity_audit_service.build_dashboard()

          assert status["atomic_store_enabled"] is True
          assert report["critical_count"] == 0, report["findings"]
          assert report["high_count"] == 0, report["findings"]
          assert dashboard["missing_expected_file_count"] == 0
          assert Path("data/system_integrity_audit_report.json").exists()
          assert Path("backend/app/utils/atomic_json_store.py").exists()
          assert Path("backend/app/utils/__init__.py").exists()
          assert Path("docs/frontend/atomic-json-store.md").exists()

          print("atomic json store validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Atomic JSON Store Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- AtomicJsonStore save/load/update behavior was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- System integrity audit now writes through the atomic store.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Critical/high audit findings remain blocked by CI.' >> "$GITHUB_STEP_SUMMARY"
