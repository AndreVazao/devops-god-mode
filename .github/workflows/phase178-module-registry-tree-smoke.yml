name: Phase 178 Module Registry Tree Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/module_registry_snapshot.py'
      - 'backend/app/services/module_registry_snapshot_service.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/module-registry-snapshot.md'
      - '.github/workflows/phase178-module-registry-tree-smoke.yml'

jobs:
  phase178-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 178 module registry and global state integration
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.god_mode_global_state_service import god_mode_global_state_service
          from app.services.module_registry_snapshot_service import module_registry_snapshot_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/module-registry-snapshot/status",
              "/api/module-registry-snapshot/tree-status",
              "/api/module-registry-snapshot/summary",
              "/api/module-registry-snapshot/snapshot",
              "/api/module-registry-snapshot/search",
              "/api/module-registry-snapshot/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 178 routes: {missing}"

          status = module_registry_snapshot_service.status()
          assert status["ok"] is True
          assert status["project_id"] == "GOD_MODE"
          assert status["route_module_count"] > 50
          assert status["service_module_count"] > 50
          assert status["official_tree_path"] == "docs/project-tree/GOD_MODE_TREE.md"

          summary = module_registry_snapshot_service.category_summary()
          assert summary["ok"] is True
          assert summary["totals"]["combined"] > 100
          categories = {item["category"] for item in summary["categories"]}
          assert "cockpit_home_mobile" in categories
          assert "github_repo_patch_build" in categories
          assert "memory_knowledge_rag" in categories
          assert "self_update_vault_security" in categories

          search = module_registry_snapshot_service.search_modules("home", limit=10)
          assert search["ok"] is True
          assert search["count"] > 0

          global_status = god_mode_global_state_service.status()
          assert global_status["ok"] is True
          assert global_status["latest_merged_phase"] == 177
          assert global_status["current_phase"] == 178
          assert global_status["official_tree_path"] == "docs/project-tree/GOD_MODE_TREE.md"
          assert global_status["module_registry_endpoint"] == "/api/module-registry-snapshot/package"

          package = god_mode_global_state_service.package()
          assert package["project_tree_model"]["official_tree_path"] == "docs/project-tree/GOD_MODE_TREE.md"
          assert package["project_tree_model"]["manual_tree_is_fallback_only"] is True
          assert package["module_registry"]["status"]["ok"] is True
          assert package["module_registry"]["summary"]["totals"]["combined"] > 100
          assert any(item["phase"] == 177 and item["status"] == "merged" for item in package["implemented_phases"])
          assert any(item["phase"] == 178 and item["status"] == "in_progress" for item in package["implemented_phases"])

          docs = Path("docs/orchestration/module-registry-snapshot.md").read_text(encoding="utf-8")
          assert "/api/module-registry-snapshot/package" in docs
          assert "docs/project-tree/GOD_MODE_TREE.md" in docs
          assert "reuse-first" in docs

          print("phase 178 module registry tree smoke passed")
          PY
