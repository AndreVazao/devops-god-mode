name: Android Real Build Pipeline Foundation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/android-real-build-pipeline-foundation-plan.md'
      - 'backend/contracts/android_real_pipeline_profile.example.json'
      - 'backend/contracts/android_real_output_artifact.example.json'
      - 'backend/app/services/android_real_build_pipeline_service.py'
      - 'backend/app/routes/android_real_build_pipeline.py'
      - 'backend/app/services/android_runtime_shell_service.py'
      - 'backend/main.py'
      - '.github/workflows/android-real-build-pipeline-foundation.yml'

jobs:
  build-android-real-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Android real output structure
        run: |
          mkdir -p dist/android-real
          mkdir -p android-real-config

      - name: Generate Android real foundation config
        run: |
          cat > android-real-config/godmode-android-real-pipeline.json <<'JSON'
          {
            "pipeline_id": "android_real_pipeline_01",
            "target_platform": "android_phone",
            "topology": "pc_and_phone_primary",
            "build_mode": "real_pipeline_foundation",
            "packaging_strategy": "android_webview_or_shell_binding",
            "output_type": "apk_foundation"
          }
          JSON
          cat > android-real-config/godmode-android-real-artifact.json <<'JSON'
          {
            "artifact_id": "android_real_artifact_01",
            "artifact_type": "apk_foundation",
            "artifact_name": "GodModeMobileRealFoundation.apk",
            "runtime_binding": "pc_and_phone_primary",
            "pairing_support": "qr_or_code"
          }
          JSON

      - name: Build Android real foundation artifact
        run: |
          printf 'God Mode Android real pipeline foundation placeholder artifact.\n' > dist/android-real/GodModeMobileRealFoundation.apk
          cp android-real-config/godmode-android-real-pipeline.json dist/android-real/godmode-android-real-pipeline.json
          cp android-real-config/godmode-android-real-artifact.json dist/android-real/godmode-android-real-artifact.json
          ls -la dist/android-real

      - name: Verify built files exist
        run: |
          test -f dist/android-real/GodModeMobileRealFoundation.apk
          test -f dist/android-real/godmode-android-real-pipeline.json
          test -f dist/android-real/godmode-android-real-artifact.json

      - name: Upload Android real foundation artifacts if quota allows
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: godmode-android-real-foundation
          path: |
            dist/android-real/GodModeMobileRealFoundation.apk
            dist/android-real/godmode-android-real-pipeline.json
            dist/android-real/godmode-android-real-artifact.json

      - name: Build summary
        run: |
          echo '## Android Real Build Pipeline Foundation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- New Android real foundation workflow executed separately from the historical placeholder workflow.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Foundation artifact was created in `dist/android-real/GodModeMobileRealFoundation.apk`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Pipeline config was created in `dist/android-real/godmode-android-real-pipeline.json`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Output artifact config was created in `dist/android-real/godmode-android-real-artifact.json`.' >> "$GITHUB_STEP_SUMMARY"
