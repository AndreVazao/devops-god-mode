name: Phase 211 Support Session Connector Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/support_session_connector_service.py'
      - 'backend/app/routes/support_session_connector.py'
      - 'backend/app/routes/support_session_connector_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/support-session-connector.md'
      - '.github/workflows/phase211-support-session-connector-smoke.yml'

jobs:
  phase211-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 211 support session contract
        run: |
          python - <<'PY'
          from pathlib import Path
          files={
            'service':Path('backend/app/services/support_session_connector_service.py'),
            'route':Path('backend/app/routes/support_session_connector.py'),
            'frontend':Path('backend/app/routes/support_session_connector_frontend.py'),
            'global_state':Path('backend/app/services/god_mode_global_state_service.py'),
            'docs':Path('docs/orchestration/support-session-connector.md'),
          }
          for label,path in files.items():
              assert path.exists(), f'Missing {label}: {path}'
          service=files['service'].read_text(encoding='utf-8')
          for marker in ['class SupportSessionConnectorService','VERSION = "phase_211_v1"','create_session','redacted_diagnostics','propose_action','revoke_session','Mobile Permission Relay','can_execute_without_mobile_gate','raw_secret_exposure_allowed']:
              assert marker in service, marker
          route=files['route'].read_text(encoding='utf-8')
          for endpoint in ['/status','/policy','/create','/diagnostics','/propose-action','/record-action-result','/revoke','/dashboard','/package']:
              assert endpoint in route, endpoint
          assert 'prefix="/api/support-session"' in route
          frontend=files['frontend'].read_text(encoding='utf-8')
          for marker in ['God Mode Support Session','/api/support-session/create','/api/support-session/diagnostics','/api/support-session/propose-action','/app/support-session','/app/temporary-support']:
              assert marker in frontend, marker
          global_state=files['global_state'].read_text(encoding='utf-8')
          for marker in ['current_phase": 211','latest_merged_phase": 210','support_session_model','/api/support-session/package','support_session_route']:
              assert marker in global_state, marker
          docs=files['docs'].read_text(encoding='utf-8')
          for marker in ['/api/support-session/package','/app/support-session','Assisted Action Mode','Mobile Permission Relay','Sem segredos raw']:
              assert marker in docs, marker
          workflows=sorted(p.name for p in Path('.github/workflows').glob('phase*-*.yml'))
          assert workflows == ['phase211-support-session-connector-smoke.yml'], workflows
          print('phase 211 support session contract passed')
          PY
