name: Recovery Write Candidates Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-recovery-write-candidates-plan.md'
      - 'backend/contracts/recovery_write_candidate.example.json'
      - 'backend/contracts/recovery_write_candidate_target.example.json'
      - 'backend/app/services/project_recovery_write_candidate_service.py'
      - 'backend/app/routes/project_recovery_write_candidate.py'
      - 'backend/main.py'
      - '.github/workflows/recovery-write-candidates-phase.yml'

jobs:
  recovery-write-candidates-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate recovery write candidates layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_recovery_write_candidate_service import project_recovery_write_candidate_service

          candidates = project_recovery_write_candidate_service.get_candidates()["candidates"]
          targets = project_recovery_write_candidate_service.get_candidate_targets()["targets"]
          next_action = project_recovery_write_candidate_service.get_next_candidate_action()["next_candidate_action"]
          route_paths = {route.path for route in app.routes}

          assert candidates, "Expected at least one recovery write candidate"
          assert targets, "Expected at least one recovery write candidate target"
          assert next_action is not None
          assert "/api/project-recovery-write-candidates/status" in route_paths
          assert "/api/project-recovery-write-candidates/candidates" in route_paths
          assert "/api/project-recovery-write-candidates/targets" in route_paths
          assert "/api/project-recovery-write-candidates/next-candidate-action" in route_paths
          print("recovery write candidates phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Recovery Write Candidates Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for recovery write candidates validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
