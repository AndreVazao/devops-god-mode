name: Project Initiation Bootstrap Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-initiation-bootstrap-plan.md'
      - 'backend/contracts/project_initiation_bootstrap.example.json'
      - 'backend/contracts/project_bootstrap_step.example.json'
      - 'backend/app/services/project_initiation_bootstrap_service.py'
      - 'backend/app/routes/project_initiation_bootstrap.py'
      - 'backend/main.py'
      - '.github/workflows/project-initiation-bootstrap-phase.yml'

jobs:
  project-initiation-bootstrap-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate project initiation bootstrap layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_initiation_bootstrap_service import project_initiation_bootstrap_service

          initiations = project_initiation_bootstrap_service.get_initiations()["initiations"]
          steps = project_initiation_bootstrap_service.get_bootstrap_steps("chatgpt")["steps"]
          package = project_initiation_bootstrap_service.get_initiation_package("chatgpt")["package"]
          next_action = project_initiation_bootstrap_service.get_next_initiation_action()["next_initiation_action"]
          route_paths = {route.path for route in app.routes}

          assert initiations, "Expected at least one project initiation"
          assert steps, "Expected at least one bootstrap step"
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/project-initiation-bootstrap/status" in route_paths
          assert "/api/project-initiation-bootstrap/initiations" in route_paths
          assert "/api/project-initiation-bootstrap/steps" in route_paths
          assert "/api/project-initiation-bootstrap/next-initiation-action" in route_paths
          print("project initiation bootstrap phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Project Initiation Bootstrap Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for project initiation bootstrap validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
