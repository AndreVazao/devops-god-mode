name: Remaining Atomic Stores Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase37-*'
    paths:
      - 'backend/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  remaining-atomic-stores-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate mobile approval and execution queue atomic migration
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.mobile_approval_cockpit_v2_service import mobile_approval_cockpit_v2_service
          from app.services.approved_card_execution_queue_service import approved_card_execution_queue_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/mobile-approval-cockpit-v2/status",
              "/api/mobile-approval-cockpit-v2/cards",
              "/api/mobile-approval-cockpit-v2/decide",
              "/api/approved-card-execution-queue/status",
              "/api/approved-card-execution-queue/ingest-approved-cards",
              "/api/approved-card-execution-queue/tasks",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          mobile_status = mobile_approval_cockpit_v2_service.get_status()
          queue_status = approved_card_execution_queue_service.get_status()
          assert mobile_status["atomic_store_enabled"] is True
          assert queue_status["atomic_store_enabled"] is True

          card = mobile_approval_cockpit_v2_service.create_card(
              title="Atomic migration validation card",
              body="Validate mobile approval atomic store and queue ingestion.",
              card_type="pr_write_approval",
              project_id="devops-god-mode",
              tenant_id="owner-andre",
              priority="high",
              requires_approval=True,
              actions=[{"action_id":"approve","label":"Approve","decision":"approved"}],
          )["card"]
          decision = mobile_approval_cockpit_v2_service.decide_card(
              card_id=card["card_id"],
              decision="approved",
              operator_note="CI approval",
              tenant_id="owner-andre",
          )
          assert decision["ok"] is True
          assert decision["card"]["status"] == "approved"

          ingest = approved_card_execution_queue_service.ingest_approved_cards(tenant_id="owner-andre", project_id="devops-god-mode")
          assert ingest["ok"] is True
          assert ingest["created_task_count"] >= 1
          task = ingest["tasks"][-1]
          assert task["source_card_type"] == "pr_write_approval"
          assert any(step["step_id"] == "open-pr" for step in task["steps"])

          mobile_path = Path("data/mobile_approval_cockpit_v2.json")
          queue_path = Path("data/approved_card_execution_queue.json")
          assert mobile_path.exists()
          assert queue_path.exists()
          assert mobile_path.with_suffix(mobile_path.suffix + ".lock").exists()
          assert queue_path.with_suffix(queue_path.suffix + ".lock").exists()
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          print("remaining atomic stores validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Remaining Atomic Stores Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile approval cockpit now uses AtomicJsonStore.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Approved card execution queue now uses AtomicJsonStore.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Atomic persistence and task ingestion were validated.' >> "$GITHUB_STEP_SUMMARY"
