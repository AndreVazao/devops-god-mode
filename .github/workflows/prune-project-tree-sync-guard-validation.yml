name: Atomic Store Audit Enforcement

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase39-*'
    paths:
      - 'backend/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  atomic-store-audit-enforcement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate atomic store enforcement and integrity audit
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.system_integrity_audit_service import system_integrity_audit_service
          from app.services.operator_command_intake_service import operator_command_intake_service
          from app.services.mobile_approval_cockpit_v2_service import mobile_approval_cockpit_v2_service
          from app.services.approved_card_execution_queue_service import approved_card_execution_queue_service
          from app.services.multi_ai_conversation_inventory_service import multi_ai_conversation_inventory_service
          from app.services.repo_relationship_graph_service import repo_relationship_graph_service
          from app.services.vault_deploy_env_planner_service import vault_deploy_env_planner_service

          route_paths = {route.path for route in app.routes}
          assert "/api/system-integrity-audit/run" in route_paths
          assert "/app/system-integrity-audit" in route_paths

          critical_services = [
              system_integrity_audit_service,
              operator_command_intake_service,
              mobile_approval_cockpit_v2_service,
              approved_card_execution_queue_service,
              multi_ai_conversation_inventory_service,
              repo_relationship_graph_service,
              vault_deploy_env_planner_service,
          ]
          for service in critical_services:
              status = service.get_status()
              assert status["ok"] is True
              assert status.get("atomic_store_enabled") is True, status

          report = system_integrity_audit_service.run_audit()
          dashboard = system_integrity_audit_service.build_dashboard()
          assert report["ok"] is True
          assert dashboard["ok"] is True
          assert report["critical_count"] == 0, report["findings"]
          assert report["high_count"] == 0, report["findings"]
          assert report["workflow_scan"]["phase_like_count"] == 0, report["workflow_scan"]
          assert report["workflow_scan"]["non_canonical_count"] == 0, report["workflow_scan"]
          assert report["expected_file_scan"]["missing_expected_file_count"] == 0, report["expected_file_scan"]

          tree = Path("PROJECT_TREE.txt").read_text(encoding="utf-8")
          assert "prune-project-tree-sync-guard-validation.yml" in tree
          assert Path("data/system_integrity_audit_report.json").exists()
          assert Path("data/system_integrity_audit_report.json.lock").exists()

          print("atomic store audit enforcement passed")
          PY

      - name: Build summary
        run: |
          echo '## Atomic Store Audit Enforcement Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- All critical backbone stores expose atomic_store_enabled.' >> "$GITHUB_STEP_SUMMARY"
          echo '- System Integrity Audit has no critical/high findings.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Workflow policy and PROJECT_TREE policy were validated.' >> "$GITHUB_STEP_SUMMARY"
