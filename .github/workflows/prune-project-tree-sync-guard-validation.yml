name: Mobile Start Config Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase58-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'frontend/mobile-shell/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'frontend/mobile-shell/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  mobile-start-config-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Mobile Start Config
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.mobile_start_config_service import mobile_start_config_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/mobile-start-config/status",
              "/api/mobile-start-config/package",
              "/api/mobile-start-config/config",
              "/api/mobile-start-config/validate",
              "/api/mobile-start-config/launch-plan",
              "/api/mobile-start-config/dashboard",
              "/app/mobile-start-config",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = mobile_start_config_service.get_status()
          assert status["ok"] is True
          assert status["config_path"] == "frontend/mobile-shell/apk-launch-config.json"

          read = mobile_start_config_service.read_config()
          assert read["ok"] is True
          config = read["config"]
          assert config["default_entry_route"] == "/app/apk-start"
          assert config["preferred_chat_route"] == "/app/operator-chat-sync-cards"
          assert config["legacy_chat_route"] == "/app/operator-chat-sync"
          assert config["rules"]["use_manifest_router_first"] is True
          assert config["rules"]["prefer_inline_cards_chat"] is True
          assert config["webview"]["javascript_enabled"] is True
          assert config["webview"]["dom_storage_enabled"] is True

          validation = mobile_start_config_service.validate_config()
          assert validation["ok"] is True
          assert validation["validation"]["status"] == "green"
          assert not validation["validation"]["blockers"]

          plan = mobile_start_config_service.build_launch_plan(tenant_id="owner-andre", device_id="validation-apk")
          assert plan["ok"] is True
          assert plan["plan"]["open_first"] == "/app/apk-start"
          assert plan["plan"]["resolved_route"] == "/app/operator-chat-sync-cards"
          assert plan["plan"]["fallback_route"] == "/app/operator-chat-sync"
          assert plan["plan"]["safe_home_route"] == "/app/home"

          dashboard = mobile_start_config_service.build_dashboard(tenant_id="owner-andre", device_id="validation-apk")
          assert dashboard["ok"] is True
          assert dashboard["plan"]["validation_status"] == "green"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "mobile_start_config_frontend.py",
              "mobile_start_config.py",
              "mobile_start_config_service.py",
              "apk-launch-config.json",
              "mobile-start-config.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("frontend/mobile-shell/apk-launch-config.json").exists()
          assert Path("backend/app/services/mobile_start_config_service.py").exists()
          assert Path("backend/app/routes/mobile_start_config.py").exists()
          assert Path("backend/app/routes/mobile_start_config_frontend.py").exists()
          assert Path("docs/frontend/mobile-start-config.md").exists()
          assert Path("data/mobile_start_config.json").exists()
          assert Path("data/mobile_start_config.json.lock").exists()

          print("mobile start config validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Mobile Start Config Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile/APK start config was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK entry route points to /app/apk-start.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Launch plan resolves to chat inline cards with legacy fallback.' >> "$GITHUB_STEP_SUMMARY"
