name: Home General Test Button Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase92-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  home-general-test-button-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Home General Test Button
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.home_operator_ux_service import home_operator_ux_service
          from app.services.real_operator_rehearsal_service import real_operator_rehearsal_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/home-operator-ux/panel",
              "/api/real-operator-rehearsal/run",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          panel = home_operator_ux_service.build_panel(tenant_id="owner-andre")
          assert panel["ok"] is True
          assert panel["general_test_endpoint"] == "/api/real-operator-rehearsal/run"
          general_buttons = [b for b in panel["safe_buttons"] if b.get("kind") == "general_test"]
          assert len(general_buttons) == 1
          assert general_buttons[0]["label"] == "Teste geral"
          assert general_buttons[0]["endpoint"] == "/api/real-operator-rehearsal/run"
          assert general_buttons[0]["payload"]["tenant_id"] == "owner-andre"

          rehearsal = real_operator_rehearsal_service.run(tenant_id="owner-andre", requested_project="GOD_MODE")
          assert rehearsal["ok"] is True
          assert rehearsal["status"] == "ready", rehearsal["failed_checks"]
          assert rehearsal["score"] == 100
          assert rehearsal["flow"]["route_result"]["job_id"]

          frontend = Path("backend/app/routes/god_mode_home_frontend.py").read_text(encoding="utf-8")
          frontend_markers = [
              "runPayloadButton(endpoint,payload={})",
              "Teste geral",
              "/api/real-operator-rehearsal/run",
              "general_test",
              "r?.flow?.route_result?.job_id",
              "r?.score",
              "window.__easyPayloads",
          ]
          for marker in frontend_markers:
              assert marker in frontend, f"Missing frontend marker: {marker}"

          docs = Path("docs/frontend/home-general-test-button.md").read_text(encoding="utf-8")
          for marker in ["Teste geral", "/api/real-operator-rehearsal/run", "requested_project", "Ver JSON"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "home_operator_ux_service.py",
              "god_mode_home_frontend.py",
              "home-general-test-button.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("home general test button validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Home General Test Button Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Modo Fácil now exposes a Teste geral safe button.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Teste geral calls the real operator rehearsal endpoint.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Result cards support rehearsal score, status and job data.' >> "$GITHUB_STEP_SUMMARY"
