name: Project Tree Autorefresh Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase50-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  project-tree-autorefresh-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Project Tree Autorefresh
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/project-tree-autorefresh/status",
              "/api/project-tree-autorefresh/package",
              "/api/project-tree-autorefresh/dashboard",
              "/api/project-tree-autorefresh/current",
              "/api/project-tree-autorefresh/generated",
              "/api/project-tree-autorefresh/compare",
              "/api/project-tree-autorefresh/write",
              "/app/project-tree-autorefresh",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = project_tree_autorefresh_service.get_status()
          assert status["ok"] is True
          assert status["tree_file"] == "PROJECT_TREE.txt"

          current = project_tree_autorefresh_service.read_current_tree()
          assert current["ok"] is True
          assert "devops-god-mode/" in current["content"]

          generated = project_tree_autorefresh_service.build_tree_text()
          assert "backend" in generated
          assert "project_tree_autorefresh_service.py" in generated
          assert "project_tree_autorefresh.py" in generated

          compare = project_tree_autorefresh_service.compare_tree()
          assert compare["ok"] is True
          assert compare["report"]["generated_line_count"] > 10
          assert compare["report"]["current_line_count"] > 10

          write_blocked = project_tree_autorefresh_service.write_generated_tree(allow_overwrite=False)
          assert write_blocked["ok"] is False
          assert write_blocked["error"] == "overwrite_requires_explicit_allow"

          dashboard = project_tree_autorefresh_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["status"] in {"in_sync", "needs_refresh"}

          assert Path("backend/app/services/project_tree_autorefresh_service.py").exists()
          assert Path("backend/app/routes/project_tree_autorefresh.py").exists()
          assert Path("backend/app/routes/project_tree_autorefresh_frontend.py").exists()
          assert Path("docs/frontend/project-tree-autorefresh.md").exists()
          assert Path("data/project_tree_autorefresh.json").exists()
          assert Path("data/project_tree_autorefresh.json.lock").exists()

          print("project tree autorefresh validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Project Tree Autorefresh Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project tree generation and comparison were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Overwrite protection was validated.' >> "$GITHUB_STEP_SUMMARY"
