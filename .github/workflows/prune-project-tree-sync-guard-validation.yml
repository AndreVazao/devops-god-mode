name: PC Autopilot Loop Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase79-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  pc-autopilot-loop-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate PC Autopilot Loop
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.pc_autopilot_loop_service import pc_autopilot_loop_service
          from app.services.operator_chat_real_work_bridge_service import operator_chat_real_work_bridge_service
          from app.services.operator_priority_service import operator_priority_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/pc-autopilot/status",
              "/api/pc-autopilot/package",
              "/api/pc-autopilot/latest",
              "/api/pc-autopilot/dashboard",
              "/api/pc-autopilot/configure",
              "/api/pc-autopilot/cycle",
              "/api/pc-autopilot/start",
              "/api/pc-autopilot/stop",
              "/app/pc-autopilot",
              "/app/autopilot-loop",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = pc_autopilot_loop_service.get_status()
          assert status["ok"] is True
          assert status["apk_disconnect_safe"] is True
          assert status["approval_bypass"] is False
          assert status["settings"]["enabled"] is False
          assert status["settings"]["run_when_apk_disconnected"] is True
          assert status["settings"]["approval_bypass"] is False

          configured = pc_autopilot_loop_service.configure(
              enabled=False,
              interval_seconds=5,
              max_rounds_per_cycle=2,
              max_jobs_per_round=2,
          )
          assert configured["ok"] is True
          assert configured["settings"]["interval_seconds"] == 5
          assert configured["settings"]["max_rounds_per_cycle"] == 2
          assert configured["settings"]["max_jobs_per_round"] == 2
          assert configured["settings"]["approval_bypass"] is False

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="pc autopilot validation order",
          )
          result = operator_chat_real_work_bridge_service.submit_chat_command(
              message="continua o God Mode até precisares do meu OK",
              tenant_id="owner-andre",
              requested_project=None,
              auto_run=False,
          )
          assert result["ok"] is True
          assert result["report"]["job_id"]

          cycle = pc_autopilot_loop_service.run_cycle(reason="validation_cycle")
          assert cycle["ok"] is True
          assert cycle["cycle"]["cycle_id"].startswith("pc-autopilot-cycle-")
          assert cycle["cycle"]["approval_bypass"] is False
          assert cycle["cycle"]["stop_reason"] in {"idle_no_jobs_processed", "blocked_waiting_operator", "failed_needs_review", "budget_exhausted"}
          assert "supervisor" in cycle

          latest = pc_autopilot_loop_service.latest()
          assert latest["ok"] is True
          assert latest["cycle"]["cycle_id"] == cycle["cycle"]["cycle_id"]

          dashboard = pc_autopilot_loop_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["status"]["ok"] is True
          assert any(button.get("endpoint") == "/api/pc-autopilot/start" for button in dashboard["buttons"])
          assert any(button.get("route") == "/app/mobile-approval-cockpit-v2" for button in dashboard["buttons"])

          start = pc_autopilot_loop_service.start()
          assert start["ok"] is True
          assert start["status"] in {"started", "already_running"}
          stop = pc_autopilot_loop_service.stop()
          assert stop["ok"] is True
          assert stop["status"] == "stopping"

          docs = Path("docs/frontend/pc-autopilot-loop.md").read_text(encoding="utf-8")
          for marker in ["/api/pc-autopilot/start", "desligado por defeito", "não contorna aprovações", "APK esteja fechado"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          frontend = Path("backend/app/routes/pc_autopilot_loop_frontend.py").read_text(encoding="utf-8")
          for marker in ["/api/pc-autopilot/start", "Ciclo agora", "Aprovações", "APK esteja fechado"]:
              assert marker in frontend, f"Missing frontend marker: {marker}"

          source = Path("backend/app/services/pc_autopilot_loop_service.py").read_text(encoding="utf-8")
          for marker in ["threading.Thread", "daemon=True", "approval_bypass", "run_when_apk_disconnected", "run_cycle"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "pc_autopilot_loop.py",
              "pc_autopilot_loop_frontend.py",
              "pc_autopilot_loop_service.py",
              "pc-autopilot-loop.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          assert Path("data/pc_autopilot_loop.json").exists()
          print("pc autopilot loop validation passed")
          PY

      - name: Build summary
        run: |
          echo '## PC Autopilot Loop Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- PC autopilot loop API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Loop can run cycles while APK is disconnected.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Approval bypass is explicitly disabled.' >> "$GITHUB_STEP_SUMMARY"
