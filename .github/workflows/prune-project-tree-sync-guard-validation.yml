name: Install Readiness Final Gate Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase94-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  install-readiness-final-gate-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Install Readiness Final Gate
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.artifacts_center_service import artifacts_center_service
          from app.services.god_mode_home_service import god_mode_home_service
          from app.services.install_readiness_final_service import install_readiness_final_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required_routes = {
              "/api/install-readiness-final/status",
              "/api/install-readiness-final/check",
              "/api/install-readiness-final/package",
              "/api/home-operator-ux/panel",
              "/api/real-operator-rehearsal/run",
              "/api/andreos-memory-audit/audit",
              "/api/artifacts-center/dashboard",
              "/api/daily-command-router/route",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing_routes = sorted(required_routes - route_paths)
          assert not missing_routes, f"Missing routes: {missing_routes}"

          home = god_mode_home_service.build_dashboard(tenant_id="owner-andre")
          actions = {item["id"]: item for item in home["quick_actions"]}
          assert "install_readiness_final" in actions
          assert actions["install_readiness_final"]["endpoint"] == "/api/install-readiness-final/check"

          check = install_readiness_final_service.build_check(
              tenant_id="owner-andre",
              requested_project="GOD_MODE",
              run_deep=True,
          )
          assert check["mode"] == "install_readiness_final_gate"
          assert check["status"] == "ready_to_install", check["failed_checks"]
          assert check["ready_to_install"] is True
          assert check["score"] == 100
          assert not check["failed_checks"]

          check_ids = {item["id"] for item in check["checks"]}
          required_check_ids = {
              "home_responds",
              "easy_mode_exists",
              "general_test_exists_and_passes",
              "andreos_memory_audit_passes",
              "real_operator_rehearsal_passes",
              "artifacts_center_points_to_apk_exe",
              "apk_exe_workflows_exist",
              "apk_artifact_not_placeholder",
              "exe_artifact_not_placeholder",
              "project_tree_autorefresh_sees_new_files",
              "memory_sensitive_guard_active",
              "main_routes_exist",
              "general_test_button_visible",
              "home_result_card_ready",
              "backend_autonomy_contract",
              "home_exposes_install_readiness",
          }
          missing_checks = sorted(required_check_ids - check_ids)
          assert not missing_checks, f"Missing final gate checks: {missing_checks}"

          status = install_readiness_final_service.get_status(tenant_id="owner-andre")
          assert status["mode"] == "install_readiness_final_status"
          assert status["ready_to_install"] is True

          package = install_readiness_final_service.get_package(
              tenant_id="owner-andre",
              requested_project="GOD_MODE",
          )
          assert package["ok"] is True
          assert package["package"]["check"]["ready_to_install"] is True

          artifacts = artifacts_center_service.build_dashboard()
          expected_files = {item["expected_file"] for item in artifacts["artifacts"]}
          assert "GodModeMobile-debug.apk" in expected_files
          assert "GodModeDesktop.exe" in expected_files

          docs = Path("docs/frontend/install-readiness-final-gate.md").read_text(encoding="utf-8")
          for marker in ["/api/install-readiness-final/check", "ready_to_install", "GodModeMobile-debug.apk", "GodModeDesktop.exe", "Instalação final"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          for entry in [
              "install_readiness_final.py",
              "install_readiness_final_service.py",
              "install-readiness-final-gate.md",
              "prune-project-tree-sync-guard-validation.yml",
          ]:
              assert entry in generated_tree, f"Project Tree Autorefresh generated tree missing {entry}"

          workflow = Path(".github/workflows/prune-project-tree-sync-guard-validation.yml").read_text(encoding="utf-8")
          assert "Install Readiness Final Gate Validation" in workflow
          assert "phase94-*" in workflow
          assert "PR Checks Visibility Validation" not in workflow

          print("install readiness final gate validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Install Readiness Final Gate Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Final install readiness endpoints were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home exposes Instalação final as a quick action.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home, Modo Fácil, Teste geral, memory audit and real rehearsal were checked.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK/EXE workflows and expected artifact names were checked.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project Tree Autorefresh confirms the new phase files.' >> "$GITHUB_STEP_SUMMARY"
