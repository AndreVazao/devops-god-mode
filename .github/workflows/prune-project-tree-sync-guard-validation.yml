name: End To End Operational Drill Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase65-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  end-to-end-operational-drill-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate End To End Operational Drill
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.end_to_end_operational_drill_service import end_to_end_operational_drill_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/e2e-operational-drill/status",
              "/api/e2e-operational-drill/package",
              "/api/e2e-operational-drill/dashboard",
              "/api/e2e-operational-drill/latest-report",
              "/api/e2e-operational-drill/run",
              "/app/e2e-operational-drill",
              "/app/operational-drill",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = end_to_end_operational_drill_service.get_status()
          assert status["ok"] is True
          assert status["non_destructive"] is True
          assert status["atomic_store_enabled"] is True

          result = end_to_end_operational_drill_service.run_drill(
              tenant_id="owner-andre",
              project_id="GOD_MODE",
              request_text="prepara um plano seguro para continuar o God Mode até precisares do meu OK",
              include_offline_bridge=True,
          )
          assert result["ok"] is True
          report = result["report"]
          assert report["status"] in {"green", "yellow", "red"}
          assert report["thread_id"], "drill should create a chat thread"
          assert report["job_id"], "drill should create a durable job"
          assert report["proof"]["chat_thread_created"] is True
          assert report["proof"]["job_created"] is True
          assert report["proof"]["worker_tick_ran"] is True
          assert report["proof"]["approval_surface_checked"] is True
          assert report["proof"]["resume_checked"] is True
          assert report["proof"]["offline_bridge_checked"] is True
          assert report["proof"]["report_written_to_chat"] is True
          assert report["trace"], "drill should keep a trace"

          latest = end_to_end_operational_drill_service.latest_report()
          assert latest["ok"] is True
          assert latest["report"]["drill_id"] == report["drill_id"]

          dashboard = end_to_end_operational_drill_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["latest_report"]["drill_id"] == report["drill_id"]
          assert dashboard["buttons"], "dashboard should expose mobile buttons"

          package = end_to_end_operational_drill_service.get_package()
          assert package["ok"] is True
          assert package["package"]["latest_report"]["report"]["drill_id"] == report["drill_id"]

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "end_to_end_operational_drill_frontend.py",
              "end_to_end_operational_drill.py",
              "end_to_end_operational_drill_service.py",
              "end-to-end-operational-drill.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/end_to_end_operational_drill_service.py").exists()
          assert Path("backend/app/routes/end_to_end_operational_drill.py").exists()
          assert Path("backend/app/routes/end_to_end_operational_drill_frontend.py").exists()
          assert Path("docs/frontend/end-to-end-operational-drill.md").exists()
          assert Path("data/end_to_end_operational_drill.json").exists()
          assert Path("data/end_to_end_operational_drill.json.lock").exists()

          print("end-to-end operational drill validation passed")
          PY

      - name: Build summary
        run: |
          echo '## End To End Operational Drill Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- E2E operational drill API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Chat thread, durable job, worker tick, approval surface, resume and offline bridge were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Final report written to chat and persisted in data store.' >> "$GITHUB_STEP_SUMMARY"
