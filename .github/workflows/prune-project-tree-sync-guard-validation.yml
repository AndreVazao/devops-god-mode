name: Bot Factory Portfolio Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase46-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  bot-factory-portfolio-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Bot Factory portfolio memory
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.project_portfolio_service import project_portfolio_service
          from app.services.memory_core_service import memory_core_service

          route_paths = {route.path for route in app.routes}
          assert "/api/project-portfolio/dashboard" in route_paths
          assert "/app/project-portfolio" in route_paths

          seed = project_portfolio_service.seed_defaults()
          assert seed["ok"] is True
          assert "BOT_FACTORY" in seed["projects"]

          dashboard = project_portfolio_service.build_dashboard()
          assert dashboard["ok"] is True
          bot_factory = next((item for item in dashboard["projects"] if item["project_id"] == "BOT_FACTORY"), None)
          assert bot_factory is not None
          assert bot_factory["priority"] == "critical"
          assert "outros bots" in bot_factory["goal"]

          memory = memory_core_service.read_project("BOT_FACTORY")
          assert memory["ok"] is True
          assert "MEMORIA_MESTRE.md" in memory["memory"]
          assert "Observação assistida de jogos" in memory["memory"]["MEMORIA_MESTRE.md"]
          assert "Verificar se já existe repositório/app" in memory["memory"]["BACKLOG.md"]
          assert "Separar observação, análise, planeamento e execução" in memory["memory"]["PROMPTS.md"]

          required_files = [
              "MEMORIA_MESTRE.md",
              "DECISOES.md",
              "BACKLOG.md",
              "ROADMAP.md",
              "ARQUITETURA.md",
              "HISTORICO.md",
              "PROMPTS.md",
              "ERROS.md",
              "ULTIMA_SESSAO.md",
          ]
          for file_name in required_files:
              assert Path("memory/vault/AndreOS/02_PROJETOS/BOT_FACTORY", file_name).exists()

          assert Path("data/project_portfolio.json").exists()
          assert Path("data/project_portfolio.json.lock").exists()
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          print("bot factory portfolio validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Bot Factory Portfolio Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Bot Factory was added as a critical portfolio project.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Bot Factory AndreOS memory files were validated.' >> "$GITHUB_STEP_SUMMARY"
