name: Chat Boot Briefing Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase60-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  chat-boot-briefing-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Chat Boot Briefing
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.chat_boot_briefing_service import chat_boot_briefing_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/chat-boot-briefing/status",
              "/api/chat-boot-briefing/package",
              "/api/chat-boot-briefing/briefing",
              "/api/chat-boot-briefing/boot",
              "/api/chat-boot-briefing/dashboard",
              "/app/chat-boot-briefing",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = chat_boot_briefing_service.get_status()
          assert status["ok"] is True
          assert status["atomic_store_enabled"] is True

          briefing_result = chat_boot_briefing_service.build_briefing(tenant_id="owner-andre", device_id="validation-apk")
          assert briefing_result["ok"] is True
          briefing = briefing_result["briefing"]
          assert briefing["status"] in {"green", "yellow", "red"}
          assert briefing["message"]
          assert briefing["recommended_route"]
          assert briefing["fallback_route"] == "/app/operator-chat-sync"
          assert "Aprovações pendentes" in briefing["message"]

          boot = chat_boot_briefing_service.boot_chat(tenant_id="owner-andre", device_id="validation-apk")
          assert boot["ok"] is True
          assert boot["boot"]["thread_id"]
          assert boot["boot"]["card_count"] >= 3
          assert boot["cards"], "boot should create inline action cards"
          assert boot["append"]["ok"] is True

          dashboard = chat_boot_briefing_service.build_dashboard(tenant_id="owner-andre", device_id="validation-apk")
          assert dashboard["ok"] is True
          assert dashboard["briefing"]["message"]
          assert dashboard["buttons"], "dashboard should expose mobile buttons"
          assert any(button["id"] == "boot" for button in dashboard["buttons"])

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "chat_boot_briefing_frontend.py",
              "chat_boot_briefing.py",
              "chat_boot_briefing_service.py",
              "chat-boot-briefing.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/chat_boot_briefing_service.py").exists()
          assert Path("backend/app/routes/chat_boot_briefing.py").exists()
          assert Path("backend/app/routes/chat_boot_briefing_frontend.py").exists()
          assert Path("docs/frontend/chat-boot-briefing.md").exists()
          assert Path("data/chat_boot_briefing.json").exists()
          assert Path("data/chat_boot_briefing.json.lock").exists()

          print("chat boot briefing validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Chat Boot Briefing Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Chat boot briefing API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Boot flow writes an initial chat message and creates action cards.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile dashboard buttons and Project Tree Autorefresh were validated.' >> "$GITHUB_STEP_SUMMARY"
