name: Chat Real Work Bridge Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase77-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  chat-real-work-bridge-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Chat Real Work Bridge
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.operator_priority_service import operator_priority_service
          from app.services.operator_chat_real_work_bridge_service import operator_chat_real_work_bridge_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/operator-chat-real-work/status",
              "/api/operator-chat-real-work/package",
              "/api/operator-chat-real-work/latest",
              "/api/operator-chat-real-work/submit",
              "/app/operator-chat-sync-cards",
              "/app/chat",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="chat bridge validation order",
          )

          status = operator_chat_real_work_bridge_service.get_status()
          assert status["ok"] is True
          assert status["status"] == "chat_to_real_work_ready"
          assert status["primary_chat_route"] == "/app/operator-chat-sync-cards"
          assert status["real_work_endpoint"] == "/api/real-work/submit"
          assert status["money_priority_enabled"] is False

          result = operator_chat_real_work_bridge_service.submit_chat_command(
              message="continua o God Mode até precisares do meu OK",
              tenant_id="owner-andre",
              requested_project=None,
              auto_run=True,
          )
          assert result["ok"] is True
          assert result["thread_id"], "chat bridge should create or use a thread"
          report = result["report"]
          assert report["resolved_project_id"] == "GOD_MODE"
          assert report["intent"] == "continue_project"
          assert report["job_id"], "chat bridge should create a durable orchestrator job"
          assert report["operator_priority_obeyed"] is True
          assert report["money_priority_enabled"] is False
          assert any(item["route"] == "/app/mobile-approval-cockpit-v2" for item in report["next_actions"])

          latest = operator_chat_real_work_bridge_service.latest()
          assert latest["ok"] is True
          assert latest["report"]["bridge_id"] == report["bridge_id"]

          package = operator_chat_real_work_bridge_service.get_package()
          assert package["ok"] is True
          assert package["package"]["status"]["ok"] is True
          assert package["package"]["latest"]["report"]["bridge_id"] == report["bridge_id"]

          frontend = Path("backend/app/routes/operator_chat_sync_cards_frontend.py").read_text(encoding="utf-8")
          for marker in ["/api/operator-chat-real-work/submit", "Enviar e executar", "Prioridades", "Aprovações"]:
              assert marker in frontend, f"Missing frontend marker: {marker}"

          docs = Path("docs/frontend/operator-chat-real-work-bridge.md").read_text(encoding="utf-8")
          for marker in ["/app/operator-chat-sync-cards", "/api/operator-chat-real-work/submit", "Request Orchestrator", "ordem do operador"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "operator_chat_real_work_bridge.py",
              "operator_chat_real_work_bridge_service.py",
              "operator_chat_sync_cards_frontend.py",
              "operator-chat-real-work-bridge.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          assert Path("data/operator_chat_real_work_bridge.json").exists()
          print("chat real work bridge validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Chat Real Work Bridge Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Main mobile chat now submits to real work pipeline.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Operator priority policy is preserved.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Chat command creates durable orchestrator job.' >> "$GITHUB_STEP_SUMMARY"
