name: Easy Mode Command Buttons Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase88-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  easy-mode-command-buttons-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Easy Mode Command Buttons
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.daily_command_router_service import daily_command_router_service
          from app.services.home_operator_ux_service import home_operator_ux_service
          from app.services.operator_priority_service import operator_priority_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/home-operator-ux/panel",
              "/api/daily-command-router/route",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="easy mode command buttons validation order",
          )

          panel = home_operator_ux_service.build_panel(tenant_id="owner-andre")
          assert panel["ok"] is True
          assert panel["daily_command_route_endpoint"] == "/api/daily-command-router/route"
          assert len(panel["quick_commands"]) >= 4
          assert all(cmd["route_endpoint"] == "/api/daily-command-router/route" for cmd in panel["quick_commands"])
          assert panel["primary_action"]["endpoint"] == "/api/daily-command-router/route"
          assert panel["primary_action"]["payload"]["command_id"] == "continue_active_project"

          routed = daily_command_router_service.route("prepare_install", tenant_id="owner-andre", requested_project="GOD_MODE")
          assert routed["ok"] is True
          assert routed["kind"] == "read_endpoint"
          assert routed["endpoint"] == "/api/install-first-run/guide"

          frontend = Path("backend/app/routes/god_mode_home_frontend.py").read_text(encoding="utf-8")
          frontend_markers = [
              "easyPanel",
              "easyContent",
              "routeCommand(commandId)",
              "/api/daily-command-router/route",
              "renderEasy(panel)",
              "Comandos rápidos",
              "payload.command_id",
              "route_endpoint",
          ]
          for marker in frontend_markers:
              assert marker in frontend, f"Missing frontend marker: {marker}"

          docs = Path("docs/frontend/easy-mode-command-buttons.md").read_text(encoding="utf-8")
          for marker in ["Modo fácil", "/api/daily-command-router/route", "continue_active_project", "Botões seguros"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "god_mode_home_frontend.py",
              "easy-mode-command-buttons.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("easy mode command buttons validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Easy Mode Command Buttons Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home easy mode now renders clickable command buttons.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Commands call the Daily Command Router by command_id.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Safe buttons support command payloads, routes and endpoints.' >> "$GITHUB_STEP_SUMMARY"
