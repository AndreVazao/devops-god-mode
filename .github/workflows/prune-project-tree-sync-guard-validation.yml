name: Request Worker Loop Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase62-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  request-worker-loop-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Request Worker Loop
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.request_orchestrator_service import request_orchestrator_service
          from app.services.request_worker_loop_service import request_worker_loop_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/request-worker/status",
              "/api/request-worker/package",
              "/api/request-worker/dashboard",
              "/api/request-worker/configure",
              "/api/request-worker/tick",
              "/api/request-worker/run",
              "/app/request-worker",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = request_worker_loop_service.get_status()
          assert status["ok"] is True
          assert status["apk_disconnect_safe"] is True
          assert status["tick_based"] is True

          config = request_worker_loop_service.configure(enabled=True, max_jobs_per_tick=3)
          assert config["ok"] is True
          assert config["settings"]["enabled"] is True
          assert config["settings"]["max_jobs_per_tick"] == 3

          queued = request_orchestrator_service.submit_request(
              request="prepara um plano seguro para continuar o God Mode",
              tenant_id="owner-andre",
              project_id="GOD_MODE",
              auto_run=False,
          )
          assert queued["ok"] is True
          assert queued["job"]["status"] == "queued"

          tick = request_worker_loop_service.tick(tenant_id="owner-andre", max_jobs=2)
          assert tick["ok"] is True
          assert tick["tick"]["processed_count"] >= 1
          assert tick["tick"]["results"], "tick should return job results"

          run = request_worker_loop_service.run_for_ticks(tenant_id="owner-andre", ticks=3, max_jobs_per_tick=2)
          assert run["ok"] is True
          assert run["run"]["status"] == "completed"
          assert run["run"]["requested_ticks"] == 3

          disabled = request_worker_loop_service.configure(enabled=False)
          assert disabled["settings"]["enabled"] is False
          disabled_tick = request_worker_loop_service.tick(tenant_id="owner-andre", max_jobs=2)
          assert disabled_tick["tick"]["status"] == "disabled"
          request_worker_loop_service.configure(enabled=True)

          dashboard = request_worker_loop_service.build_dashboard(tenant_id="owner-andre")
          assert dashboard["ok"] is True
          assert dashboard["buttons"], "worker dashboard should expose mobile buttons"
          assert dashboard["recent_ticks"], "worker dashboard should record ticks"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "request_worker_loop_frontend.py",
              "request_worker_loop.py",
              "request_worker_loop_service.py",
              "request-worker-loop.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/request_worker_loop_service.py").exists()
          assert Path("backend/app/routes/request_worker_loop.py").exists()
          assert Path("backend/app/routes/request_worker_loop_frontend.py").exists()
          assert Path("docs/frontend/request-worker-loop.md").exists()
          assert Path("data/request_worker_loop.json").exists()
          assert Path("data/request_worker_loop.json.lock").exists()

          print("request worker loop validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Request Worker Loop Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Tick-based backend worker loop was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Queued jobs continue without APK connection until blocked/completed.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Disabled mode, dashboard and Project Tree Autorefresh were validated.' >> "$GITHUB_STEP_SUMMARY"
