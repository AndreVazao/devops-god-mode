name: First Usable Release Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase66-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  first-usable-release-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate First Usable Release
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.first_usable_release_service import first_usable_release_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/first-usable-release/status",
              "/api/first-usable-release/package",
              "/api/first-usable-release/plan",
              "/api/first-usable-release/guide",
              "/api/first-usable-release/dashboard",
              "/app/first-usable-release",
              "/app/first-use",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = first_usable_release_service.get_status()
          assert status["ok"] is True
          assert status["status"] in {"green", "yellow", "red"}
          assert status["release_name"] == "God Mode First Usable Release"

          plan = first_usable_release_service.build_release_plan()
          assert plan["ok"] is True
          assert plan["release_name"] == "God Mode First Usable Release"
          assert plan["install_urls"]["apk_start"] == "/app/apk-start"
          assert plan["install_urls"]["chat"] == "/app/operator-chat-sync-cards"
          assert plan["install_urls"]["drill"] == "/app/e2e-operational-drill"
          assert plan["artifacts"], "release plan should include expected artifacts"
          assert any(item["id"] == "windows_exe" for item in plan["artifacts"])
          assert any(item["id"] == "android_apk" for item in plan["artifacts"])
          assert plan["pc_steps"], "release plan should include PC steps"
          assert plan["mobile_steps"], "release plan should include mobile steps"
          assert plan["first_commands"], "release plan should include first commands"
          assert any("ganhar dinheiro" in item["text"] for item in plan["first_commands"])

          guide = first_usable_release_service.build_operator_guide()
          assert guide["ok"] is True
          assert guide["guide"]["title"] == "God Mode — primeira utilização"
          assert guide["guide"]["short_answer"]
          assert guide["guide"]["when_blocked"]

          dashboard = first_usable_release_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["buttons"], "first usable release dashboard should expose mobile buttons"
          assert any(button["route"] == "/app/install-readiness" for button in dashboard["buttons"])
          assert any(button["route"] == "/app/e2e-operational-drill" for button in dashboard["buttons"])

          package = first_usable_release_service.get_package()
          assert package["ok"] is True
          assert package["package"]["status"]["ok"] is True
          assert package["package"]["dashboard"]["ok"] is True
          assert package["package"]["guide"]["ok"] is True

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "first_usable_release_frontend.py",
              "first_usable_release.py",
              "first_usable_release_service.py",
              "first-usable-release.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/first_usable_release_service.py").exists()
          assert Path("backend/app/routes/first_usable_release.py").exists()
          assert Path("backend/app/routes/first_usable_release_frontend.py").exists()
          assert Path("docs/frontend/first-usable-release.md").exists()

          print("first usable release validation passed")
          PY

      - name: Build summary
        run: |
          echo '## First Usable Release Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- First usable release API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- PC/mobile guide, expected artifacts and first commands were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project Tree Autorefresh was validated for new files.' >> "$GITHUB_STEP_SUMMARY"
