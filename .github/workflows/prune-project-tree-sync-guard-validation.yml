name: APK Home Entry Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase81-*'
    paths:
      - 'android-app/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android-app/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  apk-home-entry-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate APK Home Entry
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          main_activity = Path("android-app/app/src/main/java/pt/andrevazao/godmode/MainActivity.java").read_text(encoding="utf-8")
          docs = Path("docs/frontend/android-webview-shell.md").read_text(encoding="utf-8")

          required_activity = [
              'private static final String ENTRY_ROUTE = "/app/home";',
              'private static final String LEGACY_START_ROUTE = "/app/apk-start";',
              'God Mode APK · Home principal pronta',
              'Rota principal: ',
              'openButton.setText("Home")',
              'addQuickButton(quickButtons, "Home", "/app/home", false, false)',
              'addQuickButton(quickButtons, "OK", "/app/mobile-approval-cockpit-v2", false, false)',
              'addQuickButton(quickButtons, "PC", "/app/pc-autopilot", false, false)',
              'Auto discovery: /health → /app/home',
              'Teste: /health → /app/home',
              'loadRoute(ENTRY_ROUTE)',
          ]
          missing_activity = [marker for marker in required_activity if marker not in main_activity]
          assert not missing_activity, f"MainActivity missing markers: {missing_activity}"

          assert main_activity.count('loadRoute(ENTRY_ROUTE)') >= 4
          assert 'ENTRY_ROUTE = "/app/apk-start"' not in main_activity

          required_docs = [
              "`/app/home`",
              "fallback legado",
              "Entrada principal",
              "Phase 81",
              "se responder, abre `/app/home`",
              "Home, Chat, OK/Aprovações, PC Autopilot",
          ]
          missing_docs = [marker for marker in required_docs if marker not in docs]
          assert not missing_docs, f"Android docs missing markers: {missing_docs}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "android-app",
              "MainActivity.java",
              "android-webview-shell.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("APK home entry validation passed")
          PY

      - name: Build summary
        run: |
          echo '## APK Home Entry Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK now opens /app/home as the primary entry.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Pairing, health checks and auto discovery land on Home.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Legacy /app/apk-start remains as fallback button.' >> "$GITHUB_STEP_SUMMARY"
