name: APK Pair Deeplink Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase75-*'
    paths:
      - 'android-app/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android-app/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  apk-pair-deeplink-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate APK Pair Deeplink
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          manifest = Path("android-app/app/src/main/AndroidManifest.xml").read_text(encoding="utf-8")
          main_activity = Path("android-app/app/src/main/java/pt/andrevazao/godmode/MainActivity.java").read_text(encoding="utf-8")
          docs = Path("docs/frontend/android-webview-shell.md").read_text(encoding="utf-8")

          required_manifest = [
              "android:launchMode=\"singleTask\"",
              "android.intent.action.VIEW",
              "android.intent.category.BROWSABLE",
              "android:scheme=\"godmode\"",
              "android:host=\"pair\"",
          ]
          missing_manifest = [marker for marker in required_manifest if marker not in manifest]
          assert not missing_manifest, f"Manifest missing markers: {missing_manifest}"

          required_activity = [
              "handlePairingIntent",
              "onNewIntent",
              "Uri uri = intent.getData()",
              "godmode",
              "pair",
              "getQueryParameter(\"payload\")",
              "Base64.URL_SAFE",
              "Base64.NO_WRAP",
              "JSONObject payload",
              "contains_secret",
              "god_mode_mobile_pairing",
              "isSafePairingBaseUrl",
              "token=",
              "password=",
              "cookie=",
              "api_key=",
              "authorization=",
              "bearer",
              "preferences.edit().putString(PREF_BASE_URL, baseUrl).apply()",
              "testHealth()",
          ]
          missing_activity = [marker for marker in required_activity if marker not in main_activity]
          assert not missing_activity, f"MainActivity missing markers: {missing_activity}"

          required_docs = [
              "Pairing por deep link",
              "godmode://pair?payload=...",
              "Base64 URL-safe",
              "contains_secret=false",
              "URLs com marcadores sensíveis são recusados",
              "token=",
              "password=",
              "authorization=",
          ]
          missing_docs = [marker for marker in required_docs if marker not in docs]
          assert not missing_docs, f"Android docs missing markers: {missing_docs}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "android-app",
              "AndroidManifest.xml",
              "MainActivity.java",
              "android-webview-shell.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("APK pair deeplink validation passed")
          PY

      - name: Build summary
        run: |
          echo '## APK Pair Deeplink Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK godmode://pair intent filter was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK decodes non-secret pairing payloads.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK rejects sensitive-looking pairing URLs.' >> "$GITHUB_STEP_SUMMARY"
