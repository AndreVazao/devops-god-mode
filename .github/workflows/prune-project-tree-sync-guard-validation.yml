name: Artifacts Center Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase84-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  artifacts-center-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Artifacts Center
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.artifacts_center_service import artifacts_center_service
          from app.services.god_mode_home_service import god_mode_home_service
          from app.services.operator_priority_service import operator_priority_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/artifacts-center/status",
              "/api/artifacts-center/package",
              "/api/artifacts-center/dashboard",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="artifacts center validation order",
          )

          dashboard = artifacts_center_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["mode"] == "artifacts_center_dashboard"
          assert dashboard["status"] == "ready"
          assert dashboard["artifact_count"] if "artifact_count" in dashboard else len(dashboard["artifacts"]) == 2
          assert dashboard["actions_url"].endswith("/actions")
          assert dashboard["latest_artifacts_url"].endswith("branch%3Amain")
          assert any(item["expected_artifact_name"] == "godmode-android-webview-apk" for item in dashboard["artifacts"])
          assert any(item["expected_file"] == "GodModeMobile-debug.apk" for item in dashboard["artifacts"])
          assert any(item["id"] == "exe" for item in dashboard["artifacts"])
          assert any(step["artifact"] == "godmode-android-webview-apk" for step in dashboard["install_order"] if step.get("artifact"))

          status = artifacts_center_service.get_status()
          assert status["ok"] is True
          assert status["artifact_count"] == 2
          assert status["ready_workflow_count"] >= 2

          package = artifacts_center_service.get_package()
          assert package["ok"] is True
          assert package["package"]["dashboard"]["status"] == "ready"

          home = god_mode_home_service.build_dashboard(tenant_id="owner-andre")
          assert home["ok"] is True
          assert "artifacts_center" in home
          assert home["artifacts_center"]["ok"] is True
          assert home["artifacts_center"]["artifact_count"] == 2
          assert any(item.get("endpoint") == "/api/artifacts-center/dashboard" for item in home["quick_actions"])

          driving = god_mode_home_service.driving_mode(tenant_id="owner-andre")
          assert driving["ok"] is True
          assert any("Artifacts" in item for item in driving["speakable"])

          docs = Path("docs/frontend/artifacts-center.md").read_text(encoding="utf-8")
          for marker in ["/api/artifacts-center/dashboard", "GodModeMobile-debug.apk", "godmode-android-webview-apk", "GodMode.exe"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          frontend = Path("backend/app/routes/god_mode_home_frontend.py").read_text(encoding="utf-8")
          for marker in ["APK/EXE", "/api/artifacts-center/dashboard", "artifacts_center"]:
              assert marker in frontend, f"Missing frontend marker: {marker}"

          source = Path("backend/app/services/artifacts_center_service.py").read_text(encoding="utf-8")
          for marker in ["ArtifactsCenterService", "godmode-android-webview-apk", "windows-exe-build.yml", "Android APK Build"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "artifacts_center.py",
              "artifacts_center_service.py",
              "artifacts-center.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("artifacts center validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Artifacts Center Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Artifacts Center API was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home now exposes APK/EXE guidance.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Canonical APK/EXE workflows and expected artifact names are covered.' >> "$GITHUB_STEP_SUMMARY"
