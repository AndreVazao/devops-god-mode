name: APK Connection Diagnostics Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase69-*'
    paths:
      - 'android-app/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android-app/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  apk-connection-diagnostics-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate APK Connection Diagnostics
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          main_activity_path = Path("android-app/app/src/main/java/pt/andrevazao/godmode/MainActivity.java")
          docs_path = Path("docs/frontend/android-webview-shell.md")
          assert main_activity_path.exists()
          assert docs_path.exists()

          main_activity = main_activity_path.read_text(encoding="utf-8")
          docs = docs_path.read_text(encoding="utf-8")

          required_activity_markers = [
              "SharedPreferences",
              "PREF_BASE_URL",
              "testHealth",
              "/health",
              "loadRoute(ENTRY_ROUTE)",
              "/app/first-use",
              "/app/operator-chat-sync-cards",
              "/app/install-readiness",
              "/app/e2e-operational-drill",
              "HttpURLConnection",
              "setConnectTimeout(3500)",
              "preferences.edit().putString",
          ]
          missing_activity = [marker for marker in required_activity_markers if marker not in main_activity]
          assert not missing_activity, f"MainActivity missing markers: {missing_activity}"

          required_doc_markers = [
              "botão “Teste”",
              "base_url + /health",
              "último URL base",
              "IP do PC",
              "porta 8000",
              "preferências Android",
          ]
          missing_docs = [marker for marker in required_doc_markers if marker not in docs]
          assert not missing_docs, f"Android WebView docs missing markers: {missing_docs}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "android-app",
              "MainActivity.java",
              "android-webview-shell.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          print("APK connection diagnostics validation passed")
          PY

      - name: Build summary
        run: |
          echo '## APK Connection Diagnostics Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK stores the PC backend URL locally.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK exposes /health diagnostics and quick routes.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Android WebView documentation was validated.' >> "$GITHUB_STEP_SUMMARY"
