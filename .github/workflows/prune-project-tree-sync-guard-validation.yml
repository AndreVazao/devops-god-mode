name: Install First Run Guide Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase83-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  install-first-run-guide-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Install First Run Guide
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.god_mode_home_service import god_mode_home_service
          from app.services.install_first_run_guide_service import install_first_run_guide_service
          from app.services.operator_priority_service import operator_priority_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/install-first-run/status",
              "/api/install-first-run/package",
              "/api/install-first-run/guide",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="install first run validation order",
          )

          guide = install_first_run_guide_service.build_guide(tenant_id="owner-andre")
          assert guide["ok"] is True
          assert guide["mode"] == "install_first_run_guide"
          assert guide["readiness_score"] >= 75
          assert guide["steps"]
          assert len(guide["steps"]) == 8
          assert guide["current_step"]
          assert any(step["title"] == "Abrir APK" for step in guide["steps"])
          assert any(step["title"] == "Ligar APK ao PC" for step in guide["steps"])
          assert any(step["title"] == "Dar primeiro comando" for step in guide["steps"])
          assert any(item["route"] == "/app/home" for item in guide["primary_routes"] if item.get("route"))
          assert any(item["route"] == "/app/pc-autopilot" for item in guide["primary_routes"] if item.get("route"))
          assert any("Não escrever dados sensíveis" in item for item in guide["safe_operator_rules"])

          status = install_first_run_guide_service.get_status(tenant_id="owner-andre")
          assert status["ok"] is True
          assert status["readiness_score"] == guide["readiness_score"]
          assert status["done_count"] == guide["done_count"]
          assert status["current_step"]

          package = install_first_run_guide_service.get_package(tenant_id="owner-andre")
          assert package["ok"] is True
          assert package["package"]["guide"]["done_count"] == guide["done_count"]

          home = god_mode_home_service.build_dashboard(tenant_id="owner-andre")
          assert home["ok"] is True
          assert "install_first_run" in home
          assert home["install_first_run"]["ok"] is True
          assert home["install_first_run"]["readiness_score"] >= 75
          assert any(item.get("endpoint") == "/api/install-first-run/guide" for item in home["quick_actions"])

          driving = god_mode_home_service.driving_mode(tenant_id="owner-andre")
          assert driving["ok"] is True
          assert any("Instalação" in item for item in driving["speakable"])

          docs = Path("docs/frontend/install-first-run-guide.md").read_text(encoding="utf-8")
          for marker in ["/api/install-first-run/guide", "Instalar/abrir backend no PC", "Ligar APK ao PC", "Dar primeiro comando"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          frontend = Path("backend/app/routes/god_mode_home_frontend.py").read_text(encoding="utf-8")
          for marker in ["Instalar/1º arranque", "/api/install-first-run/guide", "install_first_run"]:
              assert marker in frontend, f"Missing frontend marker: {marker}"

          source = Path("backend/app/services/install_first_run_guide_service.py").read_text(encoding="utf-8")
          for marker in ["InstallFirstRunGuideService", "Confirmar builds", "Ligar PC Autopilot", "safe_operator_rules"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "install_first_run_guide.py",
              "install_first_run_guide_service.py",
              "install-first-run-guide.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("install first run guide validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Install First Run Guide Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Install and first-run guide API was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home now exposes install/first-run status and action.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Guide covers PC, APK, pairing, autopilot, first command and approvals.' >> "$GITHUB_STEP_SUMMARY"
