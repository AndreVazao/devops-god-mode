name: AI Handoff Bridge Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase44-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  ai-handoff-bridge-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate AI Handoff Bridge
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.learning_router_service import learning_router_service
          from app.services.ai_handoff_bridge_service import ai_handoff_bridge_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/ai-handoff/status",
              "/api/ai-handoff/package",
              "/api/ai-handoff/dashboard",
              "/api/ai-handoff/handoffs",
              "/api/ai-handoff/handoffs/{handoff_id}",
              "/api/ai-handoff/from-latest-unknown",
              "/api/ai-handoff/from-unknown",
              "/api/ai-handoff/resolve",
              "/app/ai-handoff",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          unknown = learning_router_service.route_message(
              message="interpreta isto com IA externa porque não sei que comando é",
              project_hint="GOD_MODE",
              tenant_id="owner-andre",
              auto_execute_confident=False,
          )
          assert unknown["ok"] is True
          assert unknown["route"]["status"] == "unknown_needs_ai_or_operator_review"

          created = ai_handoff_bridge_service.create_handoff_from_latest_unknown(provider="chatgpt", tenant_id="owner-andre")
          assert created["ok"] is True
          handoff = created["handoff"]
          assert handoff["provider"] == "chatgpt"
          assert "Mensagem original" in handoff["external_prompt"]
          assert created["approval_card"]["ok"] is True

          fetched = ai_handoff_bridge_service.get_handoff(handoff["handoff_id"])
          assert fetched["ok"] is True

          resolved = ai_handoff_bridge_service.resolve_handoff(
              handoff_id=handoff["handoff_id"],
              provider_response='{"intent":"memory_review","confidence":0.8}',
              learn_phrase="interpreta isto com IA externa",
              intent="memory_review",
              tenant_id="owner-andre",
          )
          assert resolved["ok"] is True
          assert resolved["learn_result"]["ok"] is True
          assert resolved["memory_history"]["ok"] is True

          dashboard = ai_handoff_bridge_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["resolved_count"] >= 1

          assert Path("backend/app/services/ai_handoff_bridge_service.py").exists()
          assert Path("backend/app/routes/ai_handoff_bridge.py").exists()
          assert Path("backend/app/routes/ai_handoff_bridge_frontend.py").exists()
          assert Path("docs/frontend/ai-handoff-bridge.md").exists()
          assert Path("data/ai_handoff_bridge.json").exists()
          assert Path("data/ai_handoff_bridge.json.lock").exists()
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          print("ai handoff bridge validation passed")
          PY

      - name: Build summary
        run: |
          echo '## AI Handoff Bridge Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Unknown message to provider prompt flow was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Provider response resolution and learning feedback were validated.' >> "$GITHUB_STEP_SUMMARY"
