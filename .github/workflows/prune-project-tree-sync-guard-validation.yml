name: Revenue Sprint Planner Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase49-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  revenue-sprint-planner-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Revenue Sprint Planner
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.revenue_sprint_planner_service import revenue_sprint_planner_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/revenue-sprint/status",
              "/api/revenue-sprint/package",
              "/api/revenue-sprint/dashboard",
              "/api/revenue-sprint/create",
              "/api/revenue-sprint/approval-card",
              "/api/revenue-sprint/sprints",
              "/app/revenue-sprint",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = revenue_sprint_planner_service.get_status()
          assert status["ok"] is True
          assert status["atomic_store_enabled"] is True

          created = revenue_sprint_planner_service.create_sprint(max_projects=3, tenant_id="owner-andre")
          assert created["ok"] is True
          assert len(created["sprint"]["project_ids"]) >= 1
          assert len(created["tasks"]) >= 3
          assert any(task["kind"] == "mvp" for task in created["tasks"])
          assert any(task["kind"] == "offer" for task in created["tasks"])

          card = revenue_sprint_planner_service.create_approval_card_for_latest_sprint(tenant_id="owner-andre")
          assert card["ok"] is True
          assert card["approval_card"]["ok"] is True
          assert card["approval_card"]["card"]["requires_approval"] is True

          dashboard = revenue_sprint_planner_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["sprint_count"] >= 1
          assert dashboard["task_count"] >= 3

          sprints = revenue_sprint_planner_service.list_sprints()
          assert sprints["ok"] is True
          assert sprints["sprint_count"] >= 1

          assert Path("backend/app/services/revenue_sprint_planner_service.py").exists()
          assert Path("backend/app/routes/revenue_sprint_planner.py").exists()
          assert Path("backend/app/routes/revenue_sprint_planner_frontend.py").exists()
          assert Path("docs/frontend/revenue-sprint-planner.md").exists()
          assert Path("data/revenue_sprint_planner.json").exists()
          assert Path("data/revenue_sprint_planner.json.lock").exists()
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          print("revenue sprint planner validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Revenue Sprint Planner Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Revenue sprint generation was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile approval card for revenue sprint was validated.' >> "$GITHUB_STEP_SUMMARY"
