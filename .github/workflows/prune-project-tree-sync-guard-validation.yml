name: Operator Priority Real Work Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase76-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  operator-priority-real-work-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Operator Priority Real Work
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.operator_priority_service import operator_priority_service
          from app.services.real_work_command_pipeline_service import real_work_command_pipeline_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/operator-priority/status",
              "/api/operator-priority/package",
              "/api/operator-priority/priorities",
              "/api/operator-priority/resolve",
              "/api/operator-priority/order",
              "/api/operator-priority/active",
              "/api/real-work/status",
              "/api/real-work/package",
              "/api/real-work/latest",
              "/api/real-work/submit",
              "/app/operator-priority",
              "/app/project-priority",
              "/app/real-work",
              "/app/work-command",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = operator_priority_service.get_status()
          assert status["ok"] is True
          assert status["policy"] == "operator_order_first_money_is_consequence"
          assert status["money_priority_enabled"] is False
          assert status["active_project"] == "GOD_MODE"

          order = operator_priority_service.set_order(
              ["PROVENTIL", "GOD_MODE", "BARIBUDOS_STUDIO"],
              active_project="PROVENTIL",
              note="validation order",
          )
          assert order["ok"] is True
          resolved = operator_priority_service.resolve_project()
          assert resolved["project"]["project_id"] == "PROVENTIL"
          explicit = operator_priority_service.resolve_project("GOD_MODE")
          assert explicit["project"]["project_id"] == "GOD_MODE"

          pipeline_status = real_work_command_pipeline_service.get_status()
          assert pipeline_status["ok"] is True
          assert pipeline_status["money_priority_enabled"] is False
          assert pipeline_status["policy"] == "operator_project_order_first"

          result = real_work_command_pipeline_service.submit_command(
              command_text="continua o projeto até precisares do meu OK",
              tenant_id="owner-andre",
              requested_project=None,
              auto_run=True,
          )
          assert result["ok"] is True
          package = result["package"]
          report = result["report"]
          assert package["project"]["project_id"] == "PROVENTIL"
          assert package["intent"] == "continue_project"
          assert "money is consequence" in package["orchestrator_request"]
          assert package["approval_required"] is True
          assert package["execution_actions"], "execution actions should be present"
          assert report["operator_priority_obeyed"] is True
          assert report["money_priority_enabled"] is False
          assert report["job_id"], "real work pipeline should submit durable orchestrator job"

          latest = real_work_command_pipeline_service.latest()
          assert latest["ok"] is True
          assert latest["report"]["command_id"] == report["command_id"]

          docs = Path("docs/frontend/operator-priority-real-work.md").read_text(encoding="utf-8")
          for marker in ["operator_order_first_money_is_consequence", "money_priority_enabled=false", "/api/real-work/submit", "/app/operator-priority"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "operator_priority_frontend.py",
              "operator_priority.py",
              "operator_priority_service.py",
              "real_work_command_pipeline_frontend.py",
              "real_work_command_pipeline.py",
              "real_work_command_pipeline_service.py",
              "operator-priority-real-work.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          assert Path("data/operator_project_priorities.json").exists()
          assert Path("data/real_work_command_pipeline.json").exists()

          print("operator priority real work validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Operator Priority Real Work Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Operator project order is now the planning policy.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Money priority is explicitly disabled.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Natural work command creates an orchestrator job.' >> "$GITHUB_STEP_SUMMARY"
