name: Unified Money Command Center Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase52-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  unified-money-command-center-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Unified Money Command Center
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.money_command_center_service import money_command_center_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/money-command-center/status",
              "/api/money-command-center/package",
              "/api/money-command-center/dashboard",
              "/api/money-command-center/matrix",
              "/api/money-command-center/top-project",
              "/api/money-command-center/blockers",
              "/api/money-command-center/sellable-offers",
              "/api/money-command-center/revenue-sprint",
              "/api/money-command-center/approval-card",
              "/api/money-command-center/prepare-mvp-delivery",
              "/app/money-command-center",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = money_command_center_service.get_status()
          assert status["ok"] is True
          assert status["atomic_store_enabled"] is True

          matrix = money_command_center_service.build_money_matrix()
          assert matrix["ok"] is True
          assert matrix["report"]["rows"], "money matrix should include portfolio rows"
          assert matrix["report"]["top_project"], "top money project should exist"
          assert matrix["report"]["offers"], "sellable offers should exist"

          top = money_command_center_service.top_project()
          assert top["ok"] is True
          assert top["top_project"]["first_sellable_feature"]

          sprint = money_command_center_service.create_revenue_sprint(max_projects=2)
          assert sprint["ok"] is True
          assert sprint["sprint"]["status"] == "needs_operator_approval"
          assert sprint["tasks"], "sprint should create actionable tasks"

          card = money_command_center_service.create_approval_card(max_projects=2)
          assert card["ok"] is True
          assert card["approval_card"]["card"]["status"] == "pending_approval"

          delivery = money_command_center_service.prepare_mvp_delivery()
          assert delivery["ok"] is True
          assert delivery["delivery"]["checklist"], "delivery checklist should exist"

          dashboard = money_command_center_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["summary"]["portfolio_projects"] >= 1
          assert dashboard["quick_buttons"], "mobile buttons should exist"
          assert dashboard["operator_answer"], "operator answer should exist"

          blockers = money_command_center_service.get_blockers()
          assert blockers["ok"] is True

          offers = money_command_center_service.get_sellable_offers()
          assert offers["ok"] is True
          assert offers["offers"], "offers endpoint should return project offers"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "money_command_center_frontend.py",
              "money_command_center.py",
              "money_command_center_service.py",
              "money-command-center.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"
          compare = project_tree_autorefresh_service.compare_tree()
          assert compare["ok"] is True
          assert compare["report"]["generated_line_count"] > 10

          assert Path("backend/app/services/money_command_center_service.py").exists()
          assert Path("backend/app/routes/money_command_center.py").exists()
          assert Path("backend/app/routes/money_command_center_frontend.py").exists()
          assert Path("docs/frontend/money-command-center.md").exists()
          assert Path("data/money_command_center.json").exists()
          assert Path("data/money_command_center.json.lock").exists()

          print("unified money command center validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Unified Money Command Center Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Money Command Center API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Monetization readiness, revenue sprint, approval card and MVP delivery flow were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project Tree Autorefresh generated tree entries for this phase were validated.' >> "$GITHUB_STEP_SUMMARY"
