name: Real Operator Rehearsal Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase91-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  real-operator-rehearsal-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Real Operator Rehearsal
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.real_operator_rehearsal_service import real_operator_rehearsal_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/real-operator-rehearsal/status",
              "/api/real-operator-rehearsal/package",
              "/api/real-operator-rehearsal/run",
              "/api/daily-command-router/route",
              "/api/god-mode-home/dashboard",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          rehearsal = real_operator_rehearsal_service.run(tenant_id="owner-andre", requested_project="GOD_MODE")
          assert rehearsal["ok"] is True
          assert rehearsal["mode"] == "real_operator_rehearsal"
          assert rehearsal["status"] == "ready", rehearsal["failed_checks"]
          assert rehearsal["score"] == 100
          assert not rehearsal["failed_checks"]

          flow = rehearsal["flow"]
          assert flow["home_before"]["ok"] is True
          assert flow["home_after"]["ok"] is True
          assert flow["route_result"]["ok"] is True
          assert flow["route_result"]["command_id"] == "continue_active_project"
          assert flow["route_result"]["project"] == "GOD_MODE"
          assert flow["route_result"]["job_id"]
          assert "autopilot_stop_reason" in flow["route_result"]
          assert flow["chat_latest"]["job_id"] == flow["route_result"]["job_id"]
          assert flow["memory_status"]["status"] == "ready"
          assert flow["memory_status"]["score"] == 100
          assert flow["artifacts_status"]["status"] == "ready"
          assert flow["artifacts_status"]["artifact_count"] == 2
          assert flow["build_probe"]["ok"] is True
          for item in flow["build_probe"]["checks"]:
              assert item["exists"] is True, item
              assert item["mentions_upload_artifact"] is True, item
              assert item["mentions_placeholder"] is False, item
              assert item["size_bytes"] > 200, item

          status = real_operator_rehearsal_service.get_status()
          assert status["ok"] is True
          assert status["status"] == "ready"
          assert status["score"] == 100
          assert status["failed_count"] == 0

          package = real_operator_rehearsal_service.get_package()
          assert package["ok"] is True
          assert package["package"]["rehearsal"]["status"] == "ready"

          docs = Path("docs/frontend/real-operator-rehearsal.md").read_text(encoding="utf-8")
          for marker in ["/api/real-operator-rehearsal/run", "Home → Modo Fácil", "Real Work Pipeline", "Artifacts", "Limite honesto"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          source = Path("backend/app/services/real_operator_rehearsal_service.py").read_text(encoding="utf-8")
          for marker in ["RealOperatorRehearsalService", "chat_bridge_job", "build_workflows_real", "operator_next"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "real_operator_rehearsal.py",
              "real_operator_rehearsal_service.py",
              "real-operator-rehearsal.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("real operator rehearsal validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Real Operator Rehearsal Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home -> router -> chat -> real work -> autopilot was rehearsed.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Feedback, approvals, memory and artifacts were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK/EXE workflows were checked for real upload-artifact usage.' >> "$GITHUB_STEP_SUMMARY"
