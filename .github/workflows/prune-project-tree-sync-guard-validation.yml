name: PC Mobile Pairing Center Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase71-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  pc-mobile-pairing-center-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate PC Mobile Pairing Center
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.pc_mobile_pairing_service import pc_mobile_pairing_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/pc-mobile-pairing/status",
              "/api/pc-mobile-pairing/package",
              "/api/pc-mobile-pairing/pairing",
              "/api/pc-mobile-pairing/dashboard",
              "/app/pc-mobile-pairing",
              "/app/pairing",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = pc_mobile_pairing_service.get_status()
          assert status["ok"] is True
          assert status["status"] == "pairing_ready"
          assert status["secret_storage"] is False
          assert status["requires_credentials"] is False
          assert status["candidate_count"] >= 1

          pairing = pc_mobile_pairing_service.build_pairing_package()
          assert pairing["ok"] is True
          assert pairing["urls"], "pairing package should expose URLs"
          assert pairing["manual_fallback"] is True
          assert "Não introduzir tokens" in pairing["security_note"]
          assert any(item["health_url"].endswith("/health") for item in pairing["urls"])
          assert any(item["apk_start_url"].endswith("/app/apk-start") for item in pairing["urls"])

          dashboard = pc_mobile_pairing_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["buttons"], "pairing dashboard should expose buttons"
          assert any(button["route"] == "/app/apk-start" for button in dashboard["buttons"])

          package = pc_mobile_pairing_service.get_package()
          assert package["ok"] is True
          assert package["package"]["status"]["ok"] is True
          assert package["package"]["dashboard"]["ok"] is True

          docs = Path("docs/frontend/pc-mobile-pairing.md").read_text(encoding="utf-8")
          for marker in ["APK", "Auto", "URL recomendado", "Não introduzir tokens", "firewall"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "pc_mobile_pairing_frontend.py",
              "pc_mobile_pairing.py",
              "pc_mobile_pairing_service.py",
              "pc-mobile-pairing.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/pc_mobile_pairing_service.py").exists()
          assert Path("backend/app/routes/pc_mobile_pairing.py").exists()
          assert Path("backend/app/routes/pc_mobile_pairing_frontend.py").exists()
          assert Path("docs/frontend/pc-mobile-pairing.md").exists()

          print("PC mobile pairing center validation passed")
          PY

      - name: Build summary
        run: |
          echo '## PC Mobile Pairing Center Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- PC-side pairing API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Candidate URLs, health URLs and APK start URLs were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- No secret storage is used for pairing.' >> "$GITHUB_STEP_SUMMARY"
