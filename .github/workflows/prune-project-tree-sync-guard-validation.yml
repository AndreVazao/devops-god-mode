name: Daily Command Router Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase87-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  daily-command-router-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Daily Command Router
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.daily_command_router_service import daily_command_router_service
          from app.services.home_operator_ux_service import home_operator_ux_service
          from app.services.operator_priority_service import operator_priority_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/daily-command-router/status",
              "/api/daily-command-router/package",
              "/api/daily-command-router/commands",
              "/api/daily-command-router/route",
              "/api/home-operator-ux/panel",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="daily command router validation order",
          )

          status = daily_command_router_service.get_status()
          assert status["ok"] is True
          assert status["command_count"] >= 6
          assert "continue_active_project" in status["command_ids"]
          assert "fix_blockers" in status["command_ids"]
          assert "prepare_install" in status["command_ids"]

          commands = daily_command_router_service.available_commands()
          assert commands["ok"] is True
          assert any(cmd["id"] == "show_artifacts" for cmd in commands["commands"])

          panel = home_operator_ux_service.build_panel(tenant_id="owner-andre")
          assert panel["ok"] is True
          assert panel["daily_command_route_endpoint"] == "/api/daily-command-router/route"
          assert panel["primary_action"]["endpoint"] == "/api/daily-command-router/route"
          assert panel["primary_action"]["payload"]["command_id"] == "continue_active_project"
          assert all(cmd["route_endpoint"] == "/api/daily-command-router/route" for cmd in panel["quick_commands"])

          routed = daily_command_router_service.route(
              command_id="continue_active_project",
              tenant_id="owner-andre",
              requested_project=None,
          )
          assert routed["ok"] is True
          assert routed["kind"] == "chat_command"
          assert routed["project"] == "GOD_MODE"
          assert routed["result"]["report"]["job_id"]
          assert routed["operator_next"]["label"]

          blockers = daily_command_router_service.route(
              command_id="fix_blockers",
              tenant_id="owner-andre",
              requested_project="PROVENTIL",
          )
          assert blockers["ok"] is True
          assert blockers["project"] == "PROVENTIL"
          assert "blockers" in blockers["message"]

          install = daily_command_router_service.route(command_id="prepare_install", tenant_id="owner-andre")
          assert install["ok"] is True
          assert install["kind"] == "read_endpoint"
          assert install["endpoint"] == "/api/install-first-run/guide"
          assert install["result"]["steps"]

          health = daily_command_router_service.route(command_id="show_health", tenant_id="owner-andre")
          assert health["ok"] is True
          assert health["result"]["health_score"] >= 70

          artifacts = daily_command_router_service.route(command_id="show_artifacts", tenant_id="owner-andre")
          assert artifacts["ok"] is True
          assert artifacts["result"]["artifact_count"] == 2

          unknown = daily_command_router_service.route(command_id="does_not_exist", tenant_id="owner-andre")
          assert unknown["ok"] is False
          assert unknown["error"] == "unknown_command_id"

          docs = Path("docs/frontend/daily-command-router.md").read_text(encoding="utf-8")
          for marker in ["/api/daily-command-router/route", "continue_active_project", "fix_blockers", "show_artifacts"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          source = Path("backend/app/services/daily_command_router_service.py").read_text(encoding="utf-8")
          for marker in ["DailyCommandRouterService", "COMMANDS", "operator_next", "unknown_command_id"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "daily_command_router.py",
              "daily_command_router_service.py",
              "daily-command-router.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("daily command router validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Daily Command Router Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Daily command router API was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Modo fácil commands now route through stable command IDs.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Continue, blockers, install, health and artifacts commands are covered.' >> "$GITHUB_STEP_SUMMARY"
