name: Mission Control Cockpit Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase41-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  mission-control-cockpit-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Mission Control Cockpit
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.mission_control_cockpit_service import mission_control_cockpit_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/mission-control/status",
              "/api/mission-control/package",
              "/api/mission-control/dashboard",
              "/api/mission-control/command",
              "/app/mission-control",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = mission_control_cockpit_service.get_status()
          assert status["ok"] is True
          assert status["memory_core_enabled"] is True

          dashboard = mission_control_cockpit_service.build_dashboard(tenant_id="owner-andre")
          assert dashboard["ok"] is True
          assert dashboard["summary"]["project_count"] >= 6
          assert dashboard["readiness"] in {"green", "yellow", "red"}
          assert any(project["project"] == "GOD_MODE" for project in dashboard["projects"])

          command = mission_control_cockpit_service.submit_mobile_command(
              command_text="Audita o God Mode pelo Mission Control e prepara o próximo passo seguro.",
              project_hint="GOD_MODE",
              tenant_id="owner-andre",
          )
          assert command["ok"] is True
          assert command["command"]["ok"] is True
          assert command["approval_card"]["ok"] is True
          assert command["dashboard"]["ok"] is True

          assert Path("backend/app/services/mission_control_cockpit_service.py").exists()
          assert Path("backend/app/routes/mission_control_cockpit.py").exists()
          assert Path("backend/app/routes/mission_control_cockpit_frontend.py").exists()
          assert Path("docs/frontend/mission-control-cockpit.md").exists()
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          print("mission control cockpit validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Mission Control Cockpit Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mission Control API and cockpit route were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Dashboard aggregation and command-to-approval flow were validated.' >> "$GITHUB_STEP_SUMMARY"
