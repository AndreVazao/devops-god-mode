name: Artifact Download Shortcuts Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase96-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  artifact-download-shortcuts-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Artifact Download Shortcuts
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.artifacts_center_service import artifacts_center_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          assert "/api/artifacts-center/dashboard" in route_paths

          dashboard = artifacts_center_service.build_dashboard()
          assert dashboard["status"] == "ready"
          assert dashboard["artifact_count"] == 2
          assert len(dashboard["download_shortcuts"]) == 3
          assert len(dashboard["mobile_download_steps"]) == 5

          shortcuts = {item["id"]: item for item in dashboard["download_shortcuts"]}
          assert shortcuts["latest_main_runs"]["url"].endswith("actions?query=branch%3Amain")
          assert shortcuts["apk_workflow_runs"]["artifact_name"] == "godmode-android-webview-apk"
          assert shortcuts["apk_workflow_runs"]["expected_file"] == "GodModeMobile-debug.apk"
          assert shortcuts["exe_workflow_runs"]["artifact_name"] == "godmode-windows-exe"
          assert shortcuts["exe_workflow_runs"]["expected_file"] == "GodModeDesktop.exe"

          artifacts = {item["id"]: item for item in dashboard["artifacts"]}
          assert artifacts["apk"]["workflow_runs_url"].endswith("android-real-build-progressive.yml?query=branch%3Amain")
          assert artifacts["exe"]["workflow_runs_url"].endswith("windows-exe-real-build.yml?query=branch%3Amain")

          docs = Path("docs/frontend/artifact-download-shortcuts.md").read_text(encoding="utf-8")
          for marker in ["download_shortcuts", "GodModeMobile-debug.apk", "GodModeDesktop.exe"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          assert "artifact-download-shortcuts.md" in generated_tree

          workflow = Path(".github/workflows/prune-project-tree-sync-guard-validation.yml").read_text(encoding="utf-8")
          assert workflow.startswith("name: Artifact Download Shortcuts Validation")
          assert "phase96-*" in workflow

          print("artifact download shortcuts validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Artifact Download Shortcuts Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '- Artifact download shortcuts were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK and EXE workflow links were checked.' >> "$GITHUB_STEP_SUMMARY"
