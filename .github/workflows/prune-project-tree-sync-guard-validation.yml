name: Project Portfolio Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase45-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  project-portfolio-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Project Portfolio
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.project_portfolio_service import project_portfolio_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/project-portfolio/status",
              "/api/project-portfolio/package",
              "/api/project-portfolio/dashboard",
              "/api/project-portfolio/seed",
              "/api/project-portfolio/projects",
              "/api/project-portfolio/repositories/link",
              "/app/project-portfolio",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          seed = project_portfolio_service.seed_defaults()
          assert seed["ok"] is True
          assert "BARIBUDOS_STUDIO" in seed["projects"]
          assert "AndreVazao/baribudos-studio" in seed["repositories"]
          assert "AndreVazao/baribudos-studio-website" in seed["repositories"]

          linked = project_portfolio_service.link_repository(
              project_id="BARIBUDOS_STUDIO",
              repository_full_name="AndreVazao/baribudos-admin",
              role="backend",
          )
          assert linked["ok"] is True

          dashboard = project_portfolio_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["summary"]["project_count"] >= 8
          assert dashboard["summary"]["repository_count"] >= 3
          assert any(item["project_id"] == "BARIBUDOS_STUDIO" for item in dashboard["projects"])
          assert any(item["repository_full_name"] == "AndreVazao/baribudos-studio-website" for item in dashboard["repositories"])

          assert Path("backend/app/services/project_portfolio_service.py").exists()
          assert Path("backend/app/routes/project_portfolio.py").exists()
          assert Path("backend/app/routes/project_portfolio_frontend.py").exists()
          assert Path("docs/frontend/project-portfolio.md").exists()
          assert Path("data/project_portfolio.json").exists()
          assert Path("data/project_portfolio.json.lock").exists()
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          print("project portfolio validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Project Portfolio Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project portfolio seeded with core and monetization projects.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Baribudos Studio and website repository links were validated.' >> "$GITHUB_STEP_SUMMARY"
