name: PR Checks Visibility Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase93-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  pr-checks-visibility-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate PR Checks Visibility
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.pr_checks_visibility_service import pr_checks_visibility_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/pr-checks-visibility/status",
              "/api/pr-checks-visibility/package",
              "/api/pr-checks-visibility/demo",
              "/api/pr-checks-visibility/classify",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          base_pr = {"number": 231, "state": "open", "mergeable": True, "head_sha": "demo", "title": "Demo"}
          green = pr_checks_visibility_service.classify(base_pr, workflow_runs=[{"name": "Universal", "conclusion": "success"}], statuses=[])
          assert green["classification"] == "green"
          assert green["merge_allowed"] is True

          red = pr_checks_visibility_service.classify(base_pr, workflow_runs=[{"name": "APK", "conclusion": "failure"}], statuses=[])
          assert red["classification"] == "red"
          assert red["merge_allowed"] is False

          pending = pr_checks_visibility_service.classify(base_pr, workflow_runs=[{"name": "EXE", "status": "in_progress"}], statuses=[])
          assert pending["classification"] == "pending"
          assert pending["merge_allowed"] is False

          missing_checks = pr_checks_visibility_service.classify(base_pr, workflow_runs=[], statuses=[])
          assert missing_checks["classification"] == "no_checks_reported"
          assert missing_checks["merge_allowed"] is False
          assert missing_checks["operator_next"]["kind"] == "checks_missing"

          status = pr_checks_visibility_service.get_status()
          assert status["ok"] is True
          assert status["no_checks_blocks_merge"] is True
          assert status["green_allows_merge"] is True

          demo = pr_checks_visibility_service.demo_scenarios()
          assert set(demo["scenarios"].keys()) == {"green", "red", "pending", "no_checks_reported"}

          docs = Path("docs/frontend/pr-checks-visibility.md").read_text(encoding="utf-8")
          for marker in ["no_checks_reported", "/api/pr-checks-visibility/classify", "green", "red", "pending"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          source = Path("backend/app/services/pr_checks_visibility_service.py").read_text(encoding="utf-8")
          for marker in ["PRChecksVisibilityService", "no_checks_reported", "merge_allowed", "checks_missing"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "pr_checks_visibility.py",
              "pr_checks_visibility_service.py",
              "pr-checks-visibility.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("pr checks visibility validation passed")
          PY

      - name: Build summary
        run: |
          echo '## PR Checks Visibility Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- PR check visibility classifications were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Missing checks are not treated as green.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Green, red, pending and no-check scenarios are covered.' >> "$GITHUB_STEP_SUMMARY"
