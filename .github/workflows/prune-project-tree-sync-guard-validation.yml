name: Repository Discovery Scout Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase47-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  repository-discovery-scout-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Repository Discovery Scout
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.repository_discovery_scout_service import repository_discovery_scout_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/repository-discovery/status",
              "/api/repository-discovery/package",
              "/api/repository-discovery/dashboard",
              "/api/repository-discovery/plan/{project_id}",
              "/api/repository-discovery/candidates",
              "/api/repository-discovery/candidates/confirm",
              "/api/repository-discovery/proposal",
              "/api/repository-discovery/audit/{project_id}",
              "/app/repository-discovery",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = repository_discovery_scout_service.get_status()
          assert status["ok"] is True
          assert status["atomic_store_enabled"] is True

          plan = repository_discovery_scout_service.build_search_plan("BOT_FACTORY")
          assert plan["ok"] is True
          assert "bot-factory" in plan["plan"]["search_terms"]
          assert plan["plan"]["decision_needed"] in {"find_or_create_repo", "link_existing_repo"}

          candidate = repository_discovery_scout_service.add_candidate(
              project_id="BOT_FACTORY",
              repository_full_name="AndreVazao/bot-factory",
              confidence=0.9,
              source="ci",
              note="candidate for validation",
          )
          assert candidate["ok"] is True
          assert candidate["candidate"]["project_id"] == "BOT_FACTORY"

          confirmed = repository_discovery_scout_service.confirm_candidate(candidate["candidate"]["candidate_id"], role="backend")
          assert confirmed["ok"] is True
          assert confirmed["portfolio_link"]["ok"] is True

          audit = repository_discovery_scout_service.audit_project_repository_state("BOT_FACTORY")
          assert audit["ok"] is True
          assert audit["audit"]["candidate_count"] >= 1

          dashboard = repository_discovery_scout_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["project_count"] >= 1

          assert Path("backend/app/services/repository_discovery_scout_service.py").exists()
          assert Path("backend/app/routes/repository_discovery_scout.py").exists()
          assert Path("backend/app/routes/repository_discovery_scout_frontend.py").exists()
          assert Path("docs/frontend/repository-discovery-scout.md").exists()
          assert Path("data/repository_discovery_scout.json").exists()
          assert Path("data/repository_discovery_scout.json.lock").exists()
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          print("repository discovery scout validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Repository Discovery Scout Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Repository discovery search plan was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Candidate repository confirmation and portfolio linking were validated.' >> "$GITHUB_STEP_SUMMARY"
