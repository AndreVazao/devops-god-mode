name: Home Operator UX Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase86-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  home-operator-ux-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Home Operator UX
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.home_operator_ux_service import home_operator_ux_service
          from app.services.god_mode_home_service import god_mode_home_service
          from app.services.operator_priority_service import operator_priority_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/home-operator-ux/status",
              "/api/home-operator-ux/package",
              "/api/home-operator-ux/panel",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="home operator ux validation order",
          )

          panel = home_operator_ux_service.build_panel(tenant_id="owner-andre")
          assert panel["ok"] is True
          assert panel["mode"] == "home_operator_ux_panel"
          assert panel["active_project"] == "GOD_MODE"
          assert panel["headline"]
          assert panel["primary_action"]["label"]
          assert panel["safe_buttons"]
          assert len(panel["safe_buttons"]) >= 4
          assert panel["quick_commands"]
          assert len(panel["quick_commands"]) >= 4
          assert panel["driving_safe"] is True
          assert panel["signals"]["money_priority_enabled"] is False
          assert any(cmd["id"] == "continue_active_project" for cmd in panel["quick_commands"])
          assert any("dados sensíveis" in rule for rule in panel["operator_rules"])

          status = home_operator_ux_service.get_status(tenant_id="owner-andre")
          assert status["ok"] is True
          assert status["active_project"] == "GOD_MODE"
          assert status["safe_button_count"] >= 4
          assert status["quick_command_count"] >= 4
          assert status["driving_safe"] is True

          package = home_operator_ux_service.get_package(tenant_id="owner-andre")
          assert package["ok"] is True
          assert package["package"]["panel"]["active_project"] == "GOD_MODE"

          home = god_mode_home_service.build_dashboard(tenant_id="owner-andre")
          assert home["ok"] is True
          assert any(item.get("endpoint") == "/api/home-operator-ux/panel" for item in home["quick_actions"])

          frontend = Path("backend/app/routes/god_mode_home_frontend.py").read_text(encoding="utf-8")
          for marker in ["Modo fácil", "/api/home-operator-ux/panel", "easy"]:
              assert marker in frontend, f"Missing frontend marker: {marker}"

          docs = Path("docs/frontend/home-operator-ux.md").read_text(encoding="utf-8")
          for marker in ["/api/home-operator-ux/panel", "Modo fácil", "comandos rápidos", "money_priority_enabled=false"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          source = Path("backend/app/services/home_operator_ux_service.py").read_text(encoding="utf-8")
          for marker in ["HomeOperatorUxService", "primary_action", "safe_buttons", "quick_commands", "driving_safe"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "home_operator_ux.py",
              "home_operator_ux_service.py",
              "home-operator-ux.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("home operator ux validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Home Operator UX Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home operator UX API was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home now exposes Modo fácil.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Panel includes primary action, safe buttons and quick commands.' >> "$GITHUB_STEP_SUMMARY"
