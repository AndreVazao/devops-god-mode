name: God Mode Home Chat First Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase53-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  god-mode-home-chat-first-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate God Mode Home Chat First
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.god_mode_home_service import god_mode_home_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/god-mode-home/status",
              "/api/god-mode-home/package",
              "/api/god-mode-home/dashboard",
              "/api/god-mode-home/driving-mode",
              "/api/god-mode-home/one-tap",
              "/api/god-mode-home/chat",
              "/app/god-mode-home",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = god_mode_home_service.get_status()
          assert status["ok"] is True
          assert status["chat_first"] is True
          assert status["apk_ready_surface"] is True

          dashboard = god_mode_home_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["next_action"], "home should choose one next action"
          assert dashboard["open_buttons"], "home should expose large open buttons"
          assert dashboard["one_tap_buttons"], "home should expose one-tap actions"
          assert dashboard["chat_contract"]["primary_apk_mode"] == "continuous_chat_like_chatgpt"
          assert dashboard["chat_contract"]["preferred_url"] == "/app/operator-chat-sync"

          chat = god_mode_home_service.chat(message="quero ganhar dinheiro", tenant_id="owner-andre")
          assert chat["ok"] is True
          assert chat["thread_id"]
          assert chat["reply"]
          assert chat["suggested_next_steps"], "chat should return suggested actions"

          blocked = god_mode_home_service.chat(message="token abc123", tenant_id="owner-andre")
          assert blocked["ok"] is True
          assert blocked["event"]["blocked"] is True
          assert "Bloqueei" in blocked["reply"]

          one_tap = god_mode_home_service.run_one_tap(action_id="one-tap-continue-god-mode", tenant_id="owner-andre")
          assert one_tap["ok"] is True
          assert one_tap["event"]["action_id"] == "one-tap-continue-god-mode"

          driving = god_mode_home_service.driving_mode()
          assert driving["ok"] is True
          assert driving["speakable"], "driving mode should provide speakable lines"
          assert driving["safe_buttons"], "driving mode should provide safe buttons"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "god_mode_home_frontend.py",
              "god_mode_home.py",
              "god_mode_home_service.py",
              "god-mode-home.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/god_mode_home_service.py").exists()
          assert Path("backend/app/routes/god_mode_home.py").exists()
          assert Path("backend/app/routes/god_mode_home_frontend.py").exists()
          assert Path("docs/frontend/god-mode-home.md").exists()
          assert Path("data/god_mode_home.json").exists()
          assert Path("data/god_mode_home.json.lock").exists()

          print("god mode home chat first validation passed")
          PY

      - name: Build summary
        run: |
          echo '## God Mode Home Chat First Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- God Mode Home API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK chat-first continuous conversation contract was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- One-tap, driving mode and secret-like chat blocking were validated.' >> "$GITHUB_STEP_SUMMARY"
