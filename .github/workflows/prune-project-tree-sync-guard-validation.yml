name: AndreOS Memory Core Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  andreos-memory-core-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate AndreOS Memory Core
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.memory_core_service import memory_core_service, BASE_PROJECTS, PROJECT_FILES

          route_paths = {route.path for route in app.routes}
          required_routes = {
              "/api/memory-core/status",
              "/api/memory-core/package",
              "/api/memory-core/initialize",
              "/api/memory-core/projects",
              "/api/memory-core/projects/{project_name}",
              "/api/memory-core/decisions",
              "/api/memory-core/history",
              "/api/memory-core/last-session",
              "/api/memory-core/backlog",
              "/api/memory-core/context/{project_name}",
              "/api/memory-core/obsidian/{project_name}/{file_name}",
              "/app/memory-core",
          }
          missing = sorted(required_routes - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = memory_core_service.get_status()
          assert status["ok"] is True
          assert status["memory_name"] == "AndreOS Memory Core"

          init = memory_core_service.initialize()
          assert init["ok"] is True

          for project in BASE_PROJECTS:
              project_dir = Path("memory/vault/AndreOS/02_PROJETOS") / project
              assert project_dir.exists(), project_dir
              for file_name in PROJECT_FILES:
                  assert (project_dir / file_name).exists(), project_dir / file_name

          god_master = Path("memory/vault/AndreOS/02_PROJETOS/GOD_MODE/MEMORIA_MESTRE.md").read_text(encoding="utf-8")
          assert "GOD MODE - MEMÓRIA MESTRE" in god_master
          assert "Botões flutuantes" in god_master or "botões flutuantes" in god_master

          decision = memory_core_service.write_decision("GOD_MODE", "Usar AndreOS Memory Core como memória externa persistente.", "Validação CI")
          assert decision["ok"] is True
          history = memory_core_service.write_history("GOD_MODE", "Validação do Memory Core", "Aprovado pelo workflow")
          assert history["ok"] is True
          backlog = memory_core_service.add_backlog_task("GOD_MODE", "Ligar contexto compacto aos fluxos de IA", "high")
          assert backlog["ok"] is True
          session = memory_core_service.update_last_session("GOD_MODE", "Workflow validou o Memory Core.", "Continuar integração no God Mode.")
          assert session["ok"] is True
          blocked = memory_core_service.write_decision("GOD_MODE", "authorization", "CI")
          assert blocked["ok"] is False
          assert blocked["error"] == "blocked_secret_keyword"

          context = memory_core_service.compact_context("GOD_MODE", max_chars=6000)
          assert context["ok"] is True
          assert context["chars"] > 100
          link = memory_core_service.obsidian_link("GOD_MODE", "MEMORIA_MESTRE.md")
          assert link["ok"] is True
          assert link["open_uri"].startswith("obsidian://open?")

          for path in [
              Path("memory/config/memory.config.json"),
              Path("memory/schemas/memory_event.schema.json"),
              Path("memory/schemas/project_memory.schema.json"),
              Path("memory/schemas/decision.schema.json"),
              Path("docs/MEMORY_CORE.md"),
              Path("docs/OBSIDIAN_INTEGRATION.md"),
              Path("docs/GOD_MODE_MEMORY_FLOW.md"),
          ]:
              assert path.exists(), path

          print("AndreOS Memory Core validation passed")
          PY

      - name: Build summary
        run: |
          echo '## AndreOS Memory Core Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Memory structure, templates, schemas and base projects were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Memory Core API and cockpit route were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Decision, history, backlog, last session, context and Obsidian URI flows were validated.' >> "$GITHUB_STEP_SUMMARY"
