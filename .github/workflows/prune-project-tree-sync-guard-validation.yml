name: Phase Atomic JSON Migration Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase36-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  atomic-json-migration-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate operator command intake atomic migration
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.operator_command_intake_service import operator_command_intake_service
          from app.utils.atomic_json_store import AtomicJsonStore

          route_paths = {route.path for route in app.routes}
          assert "/api/operator-command-intake/status" in route_paths
          assert "/api/operator-command-intake/submit" in route_paths
          assert "/app/operator-command-intake" in route_paths

          status = operator_command_intake_service.get_status()
          assert status["ok"] is True
          assert status["atomic_store_enabled"] is True

          result = operator_command_intake_service.submit_command(
              command_text="Audita o God Mode e valida a migração AtomicJsonStore.",
              tenant_id="owner-andre",
              project_hint="devops-god-mode",
              source_channel="ci_validation",
          )
          assert result["ok"] is True
          assert result["command"]["project"]["project_id"] == "devops-god-mode"

          listed = operator_command_intake_service.list_commands(tenant_id="owner-andre", project_id="devops-god-mode")
          projects = operator_command_intake_service.list_project_memory(tenant_id="owner-andre")
          assert listed["command_count"] >= 1
          assert projects["project_count"] >= 1

          memory_path = Path("data/operator_command_intake_memory.json")
          assert memory_path.exists()
          assert memory_path.with_suffix(memory_path.suffix + ".lock").exists()
          assert Path("backend/app/utils/atomic_json_store.py").exists()
          assert Path("PROJECT_TREE.txt").exists()
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          store = AtomicJsonStore(memory_path, default_factory=lambda: {"projects": {}, "commands": []})
          loaded = store.load()
          assert "projects" in loaded
          assert "commands" in loaded

          print("operator command intake atomic migration validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Atomic JSON Migration Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Operator command memory now uses AtomicJsonStore.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Atomic persistence, route import and PROJECT_TREE presence were validated.' >> "$GITHUB_STEP_SUMMARY"
