name: Chat Autopilot Supervisor Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase78-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  chat-autopilot-supervisor-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Chat Autopilot Supervisor
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.operator_priority_service import operator_priority_service
          from app.services.operator_chat_real_work_bridge_service import operator_chat_real_work_bridge_service
          from app.services.chat_autopilot_supervisor_service import chat_autopilot_supervisor_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/operator-chat-real-work/status",
              "/api/operator-chat-real-work/package",
              "/api/operator-chat-real-work/latest",
              "/api/operator-chat-real-work/submit",
              "/api/chat-autopilot/status",
              "/api/chat-autopilot/package",
              "/api/chat-autopilot/latest",
              "/api/chat-autopilot/run",
              "/app/operator-chat-sync-cards",
              "/app/chat",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="chat autopilot validation order",
          )

          autopilot_status = chat_autopilot_supervisor_service.get_status()
          assert autopilot_status["ok"] is True
          assert autopilot_status["status"] == "ready"
          assert autopilot_status["policy"] == "continue_until_idle_blocked_or_budget"
          assert autopilot_status["approval_bypass"] is False
          assert autopilot_status["max_rounds_default"] == 6

          run = chat_autopilot_supervisor_service.run_until_blocked_or_idle(
              tenant_id="owner-andre",
              job_id="validation-job",
              reason="validation",
              max_rounds=2,
              max_jobs_per_round=2,
          )
          assert run["ok"] is True
          assert run["report"]["round_count"] >= 1
          assert run["report"]["stop_reason"] in {"idle_no_jobs_processed", "blocked_waiting_operator", "failed_needs_review", "budget_exhausted"}
          assert run["report"]["approval_bypass"] is False

          status = operator_chat_real_work_bridge_service.get_status()
          assert status["ok"] is True
          assert status["status"] == "chat_to_real_work_ready"
          assert status["autopilot_endpoint"] == "/api/chat-autopilot/run"
          assert status["money_priority_enabled"] is False

          result = operator_chat_real_work_bridge_service.submit_chat_command(
              message="continua o God Mode até precisares do meu OK",
              tenant_id="owner-andre",
              requested_project=None,
              auto_run=True,
          )
          assert result["ok"] is True
          assert result["thread_id"], "chat bridge should create or use a thread"
          assert result["autopilot"] is not None
          report = result["report"]
          assert report["resolved_project_id"] == "GOD_MODE"
          assert report["intent"] == "continue_project"
          assert report["job_id"], "chat bridge should create a durable orchestrator job"
          assert report["autopilot_run_id"], "chat bridge should run autopilot supervisor"
          assert report["autopilot_round_count"] >= 1
          assert report["autopilot_stop_reason"] in {"idle_no_jobs_processed", "blocked_waiting_operator", "failed_needs_review", "budget_exhausted"}
          assert report["operator_priority_obeyed"] is True
          assert report["money_priority_enabled"] is False
          assert any(item["route"] == "/app/mobile-approval-cockpit-v2" for item in report["next_actions"])

          latest = chat_autopilot_supervisor_service.latest()
          assert latest["ok"] is True
          assert latest["report"]["run_id"] == report["autopilot_run_id"]

          docs = Path("docs/frontend/chat-autopilot-supervisor.md").read_text(encoding="utf-8")
          for marker in ["continue_until_idle_blocked_or_budget", "/api/chat-autopilot/run", "max_rounds_default=6", "não contorna aprovações"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          bridge_source = Path("backend/app/services/operator_chat_real_work_bridge_service.py").read_text(encoding="utf-8")
          for marker in ["chat_autopilot_supervisor_service", "run_until_blocked_or_idle", "autopilot_stop_reason", "autopilot_round_count"]:
              assert marker in bridge_source, f"Missing bridge marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "chat_autopilot_supervisor.py",
              "chat_autopilot_supervisor_service.py",
              "operator_chat_real_work_bridge_service.py",
              "chat-autopilot-supervisor.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          assert Path("data/chat_autopilot_supervisor.json").exists()
          print("chat autopilot supervisor validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Chat Autopilot Supervisor Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Chat commands now run controlled autopilot rounds.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Autopilot stops on idle, blocked, failure or budget.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Approval bypass is explicitly disabled.' >> "$GITHUB_STEP_SUMMARY"
