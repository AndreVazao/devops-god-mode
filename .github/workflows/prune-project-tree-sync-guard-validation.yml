name: First Real Install Launcher Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase95-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  first-real-install-launcher-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate First Real Install Launcher
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.first_real_install_launcher_service import first_real_install_launcher_service
          from app.services.god_mode_home_service import god_mode_home_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required_routes = {
              "/api/first-real-install-launcher/status",
              "/api/first-real-install-launcher/plan",
              "/api/first-real-install-launcher/package",
              "/api/install-readiness-final/check",
              "/api/artifacts-center/dashboard",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing_routes = sorted(required_routes - route_paths)
          assert not missing_routes, f"Missing routes: {missing_routes}"

          home = god_mode_home_service.build_dashboard(tenant_id="owner-andre")
          actions = {item["id"]: item for item in home["quick_actions"]}
          assert actions["first_real_install_launcher"]["label"] == "Instalar agora"
          assert actions["first_real_install_launcher"]["endpoint"] == "/api/first-real-install-launcher/plan"

          plan = first_real_install_launcher_service.build_plan(tenant_id="owner-andre", requested_project="GOD_MODE")
          assert plan["mode"] == "first_real_install_launcher"
          assert plan["status"] == "ready_to_launch", plan["blockers"]
          assert plan["primary_button"]["endpoint"] == "/api/artifacts-center/dashboard"

          card_ids = {item["id"] for item in plan["install_cards"]}
          assert {"pc_exe", "apk", "first_command"}.issubset(card_ids)

          downloads = {item["label"]: item for item in plan["download_targets"]}
          assert downloads["GodModeDesktop.exe"]["artifact_name"] == "godmode-windows-exe"
          assert downloads["GodModeMobile-debug.apk"]["artifact_name"] == "godmode-android-webview-apk"

          docs = Path("docs/frontend/first-real-install-launcher.md").read_text(encoding="utf-8")
          for marker in ["/api/first-real-install-launcher/plan", "Instalar agora", "GodModeDesktop.exe", "GodModeMobile-debug.apk"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          for entry in ["first_real_install_launcher.py", "first_real_install_launcher_service.py", "first-real-install-launcher.md"]:
              assert entry in generated_tree, f"Generated tree missing {entry}"

          workflow = Path(".github/workflows/prune-project-tree-sync-guard-validation.yml").read_text(encoding="utf-8")
          assert workflow.startswith("name: First Real Install Launcher Validation")
          assert "phase95-*" in workflow
          assert "first-real-install-launcher-validation" in workflow

          print("first real install launcher validation passed")
          PY

      - name: Build summary
        run: |
          echo '## First Real Install Launcher Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '- First real install launcher endpoints were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home exposes Instalar agora as a quick action.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK and EXE targets were checked.' >> "$GITHUB_STEP_SUMMARY"
