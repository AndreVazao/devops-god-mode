name: Memory Runtime Integration Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase40-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  memory-runtime-integration-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Memory Core runtime integration
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.memory_core_service import memory_core_service
          from app.services.operator_command_intake_service import operator_command_intake_service
          from app.services.mobile_approval_cockpit_v2_service import mobile_approval_cockpit_v2_service

          route_paths = {route.path for route in app.routes}
          assert "/api/operator-command-intake/submit" in route_paths
          assert "/api/mobile-approval-cockpit-v2/decide" in route_paths
          assert "/api/memory-core/context/{project_name}" in route_paths

          memory_core_service.initialize()
          operator_status = operator_command_intake_service.get_status()
          mobile_status = mobile_approval_cockpit_v2_service.get_status()
          assert operator_status["memory_core_enabled"] is True
          assert mobile_status["memory_core_enabled"] is True

          command_result = operator_command_intake_service.submit_command(
              command_text="Audita o God Mode usando a memória AndreOS e prepara plano seguro.",
              tenant_id="owner-andre",
              project_hint="devops-god-mode",
              source_channel="ci_memory_runtime",
          )
          assert command_result["ok"] is True
          command = command_result["command"]
          assert command["memory_core"]["memory_project"] == "GOD_MODE"
          assert command["memory_core"]["context_available"] is True
          assert command["memory_core"]["obsidian"]["open_uri"].startswith("obsidian://open?")
          assert any(step["step_id"] == "load-andreos-project-memory" for step in command["execution_plan"])
          assert any(step["step_id"] == "persist-session-memory" for step in command["execution_plan"])
          assert command_result["memory_history"]["ok"] is True

          card_result = mobile_approval_cockpit_v2_service.seed_from_latest_operator_command(tenant_id="owner-andre")
          assert card_result["ok"] is True
          card = card_result["card"]
          assert card["metadata"]["memory_core"]["memory_project"] == "GOD_MODE"
          decision = mobile_approval_cockpit_v2_service.decide_card(
              card_id=card["card_id"],
              decision="approved",
              operator_note="CI aprovou o plano com memória AndreOS.",
              tenant_id="owner-andre",
          )
          assert decision["ok"] is True
          assert decision["memory_log"]["memory_project"] == "GOD_MODE"
          assert decision["memory_log"]["decision_result"]["ok"] is True
          assert decision["memory_log"]["history_result"]["ok"] is True

          decisions = Path("memory/vault/AndreOS/02_PROJETOS/GOD_MODE/DECISOES.md").read_text(encoding="utf-8")
          history = Path("memory/vault/AndreOS/02_PROJETOS/GOD_MODE/HISTORICO.md").read_text(encoding="utf-8")
          assert "Cartão operator_command decidido como approved" in decisions
          assert "Comando recebido no Operator Command Intake" in history
          assert "Decisão recebida no Mobile Approval Cockpit" in history
          assert "prune-project-tree-sync-guard-validation.yml" in Path("PROJECT_TREE.txt").read_text(encoding="utf-8")

          print("memory runtime integration validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Memory Runtime Integration Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Operator Command Intake now loads AndreOS Memory Core context.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile Approval Cockpit decisions are persisted to Obsidian Markdown memory.' >> "$GITHUB_STEP_SUMMARY"
          echo '- PROJECT_TREE workflow policy remains valid.' >> "$GITHUB_STEP_SUMMARY"
