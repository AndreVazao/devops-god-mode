name: Chat Inline Card Renderer Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase55-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  chat-inline-card-renderer-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Chat Inline Card Renderer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.chat_inline_card_renderer_service import chat_inline_card_renderer_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/chat-inline-card-renderer/status",
              "/api/chat-inline-card-renderer/package",
              "/api/chat-inline-card-renderer/dashboard",
              "/api/chat-inline-card-renderer/manifest",
              "/api/chat-inline-card-renderer/open-session",
              "/api/chat-inline-card-renderer/send",
              "/app/operator-chat-sync-cards",
              "/app/chat-inline-cards",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = chat_inline_card_renderer_service.get_status()
          assert status["ok"] is True
          assert status["inline_cards_enabled"] is True
          assert status["apk_chat_first"] is True

          manifest = chat_inline_card_renderer_service.build_manifest()
          assert manifest["ok"] is True
          assert manifest["manifest"]["frontend_routes"]["primary"] == "/app/operator-chat-sync-cards"
          assert manifest["manifest"]["render_contract"]["render_inline"] is True
          assert manifest["manifest"]["render_contract"]["message_mode"] == "continuous_chat_like_chatgpt"

          opened = chat_inline_card_renderer_service.open_session(title="Renderer validation")
          assert opened["ok"] is True
          thread_id = opened["session"]["thread_id"]

          sent = chat_inline_card_renderer_service.send_message(
              message="quero ganhar dinheiro",
              thread_id=thread_id,
              tenant_id="owner-andre",
          )
          assert sent["ok"] is True
          assert sent["thread_id"] == thread_id
          assert sent["open_cards"], "inline renderer should return open cards for UI rendering"
          assert sent["event"]["card_count"] >= 1

          dashboard = chat_inline_card_renderer_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["manifest"]["frontend_routes"]["alias"] == "/app/chat-inline-cards"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "chat_inline_card_renderer_frontend.py",
              "chat_inline_card_renderer.py",
              "chat_inline_card_renderer_service.py",
              "chat-inline-card-renderer.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/chat_inline_card_renderer_service.py").exists()
          assert Path("backend/app/routes/chat_inline_card_renderer.py").exists()
          assert Path("backend/app/routes/chat_inline_card_renderer_frontend.py").exists()
          assert Path("docs/frontend/chat-inline-card-renderer.md").exists()
          assert Path("data/chat_inline_card_renderer.json").exists()
          assert Path("data/chat_inline_card_renderer.json.lock").exists()

          print("chat inline card renderer validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Chat Inline Card Renderer Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Chat inline card renderer API and frontend were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK chat-first inline render contract was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Renderer send flow returns open cards ready for mobile UI.' >> "$GITHUB_STEP_SUMMARY"
