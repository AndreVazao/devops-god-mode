name: Mobile First Run Wizard Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase59-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  mobile-first-run-wizard-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Mobile First Run Wizard
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.mobile_first_run_wizard_service import mobile_first_run_wizard_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/mobile-first-run/status",
              "/api/mobile-first-run/package",
              "/api/mobile-first-run/check",
              "/api/mobile-first-run/start",
              "/api/mobile-first-run/dashboard",
              "/app/mobile-first-run",
              "/app/first-run",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = mobile_first_run_wizard_service.get_status()
          assert status["ok"] is True
          assert status["atomic_store_enabled"] is True

          check = mobile_first_run_wizard_service.run_check(tenant_id="owner-andre", device_id="validation-apk")
          assert check["ok"] is True
          assert check["check"]["status"] in {"green", "yellow", "red"}
          assert check["check"]["recommended_route"]
          assert check["check"]["fallback_route"] == "/app/operator-chat-sync"
          assert check["check"]["safe_home_route"] == "/app/home"
          assert check["check"]["checks"], "wizard should include component checks"

          start = mobile_first_run_wizard_service.start(tenant_id="owner-andre", device_id="validation-apk")
          assert start["ok"] is True
          assert start["start"]["open_route"]
          assert start["start"]["fallback_route"] == "/app/operator-chat-sync"

          dashboard = mobile_first_run_wizard_service.build_dashboard(tenant_id="owner-andre", device_id="validation-apk")
          assert dashboard["ok"] is True
          assert dashboard["buttons"], "wizard should expose mobile buttons"
          assert any(button["id"] == "start" for button in dashboard["buttons"])
          assert dashboard["check"]["operator_message"]

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "mobile_first_run_wizard_frontend.py",
              "mobile_first_run_wizard.py",
              "mobile_first_run_wizard_service.py",
              "mobile-first-run-wizard.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/mobile_first_run_wizard_service.py").exists()
          assert Path("backend/app/routes/mobile_first_run_wizard.py").exists()
          assert Path("backend/app/routes/mobile_first_run_wizard_frontend.py").exists()
          assert Path("docs/frontend/mobile-first-run-wizard.md").exists()
          assert Path("data/mobile_first_run_wizard.json").exists()
          assert Path("data/mobile_first_run_wizard.json.lock").exists()

          print("mobile first run wizard validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Mobile First Run Wizard Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile first run wizard API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Component checks, start route and fallback were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile buttons and operator message were validated.' >> "$GITHUB_STEP_SUMMARY"
