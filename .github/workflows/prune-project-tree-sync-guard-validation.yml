name: Install Run Readiness Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase64-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  install-run-readiness-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Install Run Readiness
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.install_run_readiness_service import install_run_readiness_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/install-run-readiness/status",
              "/api/install-run-readiness/package",
              "/api/install-run-readiness/report",
              "/api/install-run-readiness/checklist",
              "/api/install-run-readiness/dashboard",
              "/app/install-run-readiness",
              "/app/install-readiness",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = install_run_readiness_service.get_status()
          assert status["ok"] is True
          assert status["status"] in {"green", "yellow", "red"}
          assert 0 <= status["score"] <= 100

          report = install_run_readiness_service.build_report()
          assert report["ok"] is True
          assert report["checks_count"] >= 20
          assert report["critical_count"] > 0
          assert report["install_decision"] in {"ready_for_local_install_and_mobile_use", "usable_with_warnings", "not_ready"}
          assert report["install_paths"]["mobile_apk"]["entry_route"] == "/app/apk-start"
          assert report["install_paths"]["mobile_apk"]["preferred_chat"] == "/app/operator-chat-sync-cards"
          assert any(item.get("endpoint") == "/api/chat-inline-card-renderer/send-orchestrated" for item in report["end_to_end_path"])
          assert any(item.get("route") == "/app/offline-buffer" for item in report["end_to_end_path"])

          checklist = install_run_readiness_service.build_checklist()
          assert checklist["ok"] is True
          assert checklist["items"], "readiness checklist should expose next actions"
          assert checklist["install_paths"]["pc_local"]["launcher"] == "desktop/godmode_desktop_launcher.py"

          dashboard = install_run_readiness_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["buttons"], "readiness dashboard should expose mobile buttons"
          assert any(button["route"] == "/app/mobile-first-run" for button in dashboard["buttons"])

          package = install_run_readiness_service.get_package()
          assert package["ok"] is True
          assert package["package"]["status"]["ok"] is True
          assert package["package"]["dashboard"]["ok"] is True

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "install_run_readiness_frontend.py",
              "install_run_readiness.py",
              "install_run_readiness_service.py",
              "install-run-readiness.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/install_run_readiness_service.py").exists()
          assert Path("backend/app/routes/install_run_readiness.py").exists()
          assert Path("backend/app/routes/install_run_readiness_frontend.py").exists()
          assert Path("docs/frontend/install-run-readiness.md").exists()

          print("install run readiness validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Install Run Readiness Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Install/readiness cockpit and API were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- PC/APK/build paths and end-to-end flow were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project Tree Autorefresh was validated for new files.' >> "$GITHUB_STEP_SUMMARY"
