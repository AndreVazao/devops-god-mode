name: Easy Mode Result Cards Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase89-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  easy-mode-result-cards-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Easy Mode Result Cards
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.daily_command_router_service import daily_command_router_service
          from app.services.operator_priority_service import operator_priority_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/home-operator-ux/panel",
              "/api/daily-command-router/route",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="easy mode result cards validation order",
          )

          install = daily_command_router_service.route("prepare_install", tenant_id="owner-andre", requested_project="GOD_MODE")
          assert install["ok"] is True
          assert install["kind"] == "read_endpoint"
          assert install["result"]["steps"]

          health = daily_command_router_service.route("show_health", tenant_id="owner-andre", requested_project="GOD_MODE")
          assert health["ok"] is True
          assert health["result"]["health_score"] >= 70

          artifacts = daily_command_router_service.route("show_artifacts", tenant_id="owner-andre", requested_project="GOD_MODE")
          assert artifacts["ok"] is True
          assert artifacts["result"]["artifact_count"] == 2

          frontend = Path("backend/app/routes/god_mode_home_frontend.py").read_text(encoding="utf-8")
          frontend_markers = [
              "easyResult",
              "resultCard",
              "resultTitle",
              "renderResultCard(r)",
              "window.__lastEasyResult",
              "Ver JSON",
              "Próxima ação",
              "operator_next",
              "health_score",
              "artifact_count",
              "steps.length",
          ]
          for marker in frontend_markers:
              assert marker in frontend, f"Missing frontend marker: {marker}"

          docs = Path("docs/frontend/easy-mode-result-cards.md").read_text(encoding="utf-8")
          for marker in ["Easy Mode Result Cards", "command_id", "job", "stop reason", "Ver JSON"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "god_mode_home_frontend.py",
              "easy-mode-result-cards.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("easy mode result cards validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Easy Mode Result Cards Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Easy Mode now renders readable result cards.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Result cards cover jobs, next action, scores, steps and artifacts.' >> "$GITHUB_STEP_SUMMARY"
          echo '- JSON remains available for diagnostics.' >> "$GITHUB_STEP_SUMMARY"
