name: APK Launch Manifest Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase56-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  apk-launch-manifest-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate APK Launch Manifest
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.apk_launch_manifest_service import apk_launch_manifest_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/apk-launch/status",
              "/api/apk-launch/package",
              "/api/apk-launch/manifest",
              "/api/apk-launch/health",
              "/api/apk-launch/dashboard",
              "/api/apk-launch/launch",
              "/app/apk-launch",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = apk_launch_manifest_service.get_status()
          assert status["ok"] is True
          assert status["preferred_chat_surface"] == "/app/operator-chat-sync-cards"
          assert status["fallback_chat_surface"] == "/app/operator-chat-sync"

          manifest_result = apk_launch_manifest_service.build_manifest(tenant_id="owner-andre", device_id="validation-apk")
          assert manifest_result["ok"] is True
          manifest = manifest_result["manifest"]
          assert manifest["launch_policy"]["default_route"] == "/app/operator-chat-sync-cards"
          assert manifest["launch_policy"]["fallback_route"] == "/app/operator-chat-sync"
          assert manifest["capabilities"]["continuous_chat"] is True
          assert manifest["capabilities"]["inline_action_cards"] is True
          assert manifest["capabilities"]["destructive_actions_require_approval"] is True
          assert manifest["safe_buttons"], "manifest should provide safe APK buttons"

          health_result = apk_launch_manifest_service.health(tenant_id="owner-andre", device_id="validation-apk")
          assert health_result["ok"] is True
          assert health_result["health"]["default_route"] == "/app/operator-chat-sync-cards"
          assert health_result["health"]["fallback_route"] == "/app/operator-chat-sync"
          assert health_result["health"]["status"] in {"green", "yellow"}

          dashboard = apk_launch_manifest_service.build_dashboard(tenant_id="owner-andre", device_id="validation-apk")
          assert dashboard["ok"] is True
          assert dashboard["manifest"]["launch_policy"]["default_api"] == "/api/chat-inline-card-renderer/send"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "apk_launch_manifest_frontend.py",
              "apk_launch_manifest.py",
              "apk_launch_manifest_service.py",
              "apk-launch-manifest.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/apk_launch_manifest_service.py").exists()
          assert Path("backend/app/routes/apk_launch_manifest.py").exists()
          assert Path("backend/app/routes/apk_launch_manifest_frontend.py").exists()
          assert Path("docs/frontend/apk-launch-manifest.md").exists()
          assert Path("data/apk_launch_manifest.json").exists()
          assert Path("data/apk_launch_manifest.json.lock").exists()

          print("apk launch manifest validation passed")
          PY

      - name: Build summary
        run: |
          echo '## APK Launch Manifest Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK launch manifest API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Default APK route points to chat inline cards.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Legacy chat fallback and safe buttons were validated.' >> "$GITHUB_STEP_SUMMARY"
