name: Home System Health Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase85-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  home-system-health-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Home System Health
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.home_system_health_service import home_system_health_service
          from app.services.god_mode_home_service import god_mode_home_service
          from app.services.operator_priority_service import operator_priority_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/home-system-health/status",
              "/api/home-system-health/package",
              "/api/home-system-health/snapshot",
              "/api/god-mode-home/dashboard",
              "/app/home",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          operator_priority_service.set_order(
              ["GOD_MODE", "PROVENTIL", "BARIBUDOS_STUDIO"],
              active_project="GOD_MODE",
              note="home system health validation order",
          )

          snapshot = home_system_health_service.build_snapshot(tenant_id="owner-andre")
          assert snapshot["ok"] is True
          assert snapshot["mode"] == "home_system_health_snapshot"
          assert snapshot["health_score"] >= 70
          assert snapshot["status"] in {"healthy", "attention", "blocked"}
          assert snapshot["traffic_light"]["color"] in {"green", "yellow", "red", "blue"}
          assert snapshot["next_action"]["label"]
          assert len(snapshot["signals"]) >= 7
          assert "home" in snapshot["subsystems"]
          assert "artifacts_center" in snapshot["subsystems"]
          assert any(item["id"] == "home" and item["ok"] for item in snapshot["signals"])
          assert any(item["id"] == "artifacts" and item["ok"] for item in snapshot["signals"])
          assert any(item["id"] == "priority" and item["ok"] for item in snapshot["signals"])

          status = home_system_health_service.get_status(tenant_id="owner-andre")
          assert status["ok"] is True
          assert status["health_score"] == snapshot["health_score"]
          assert status["blocker_count"] == len(snapshot["blockers"])

          package = home_system_health_service.get_package(tenant_id="owner-andre")
          assert package["ok"] is True
          assert package["package"]["snapshot"]["health_score"] == snapshot["health_score"]

          home = god_mode_home_service.build_dashboard(tenant_id="owner-andre")
          assert home["ok"] is True
          assert "home_system_health" in home
          assert home["home_system_health"]["ok"] is True
          assert home["home_system_health"]["health_score"] >= 70
          assert any(item.get("endpoint") == "/api/home-system-health/snapshot" for item in home["quick_actions"])

          driving = god_mode_home_service.driving_mode(tenant_id="owner-andre")
          assert driving["ok"] is True
          assert any("Saúde" in item for item in driving["speakable"])

          docs = Path("docs/frontend/home-system-health.md").read_text(encoding="utf-8")
          for marker in ["/api/home-system-health/snapshot", "healthy", "attention", "blocked", "score de saúde"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          source = Path("backend/app/services/home_system_health_service.py").read_text(encoding="utf-8")
          for marker in ["HomeSystemHealthService", "health_score", "traffic_light", "next_action", "artifacts"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "home_system_health.py",
              "home_system_health_service.py",
              "home-system-health.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("home system health validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Home System Health Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home system health snapshot API was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Home now exposes health score and action.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Health covers Home, readiness, install guide, artifacts, PC autopilot, chat and priority.' >> "$GITHUB_STEP_SUMMARY"
