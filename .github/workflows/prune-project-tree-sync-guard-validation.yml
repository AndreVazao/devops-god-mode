name: AndreOS Memory Audit Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase90-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  andreos-memory-audit-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate AndreOS Memory Audit
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.andreos_memory_audit_service import andreos_memory_audit_service
          from app.services.memory_core_service import PROJECT_FILES, memory_core_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/andreos-memory-audit/status",
              "/api/andreos-memory-audit/package",
              "/api/andreos-memory-audit/audit",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          audit = andreos_memory_audit_service.build_audit(run_rehearsal=True)
          assert audit["ok"] is True
          assert audit["mode"] == "andreos_memory_audit"
          assert audit["status"] == "ready", audit["failed_checks"]
          assert audit["score"] == 100
          assert not audit["failed_checks"]
          assert len(audit["projects"]) >= 9
          assert audit["secret_probe"]["blocked"] is True
          assert audit["secret_probe"]["safe_write_ok"] is True
          assert audit["context_probe"]["ok"] is True
          assert audit["context_probe"]["chars"] > 0
          assert audit["obsidian_probe"]["ok"] is True
          assert audit["obsidian_probe"]["open_uri"].startswith("obsidian://open?")
          assert audit["rehearsal"]["ok"] is True
          assert audit["rehearsal"]["context_chars"] > 0
          assert audit["operator_next"]["route"] == "/app/home"

          project_names = {project["project"] for project in audit["projects"]}
          for expected in ["GOD_MODE", "PROVENTIL", "BOT_FACTORY", "BARIBUDOS_STUDIO", "BARIBUDOS_STUDIO_WEBSITE"]:
              assert expected in project_names, f"Missing project audit: {expected}"
          for project in audit["projects"]:
              assert project["file_count"] == len(PROJECT_FILES), project
              assert not project["missing_files"], project
              assert project["obsidian_master"].startswith("obsidian://open?")

          status = andreos_memory_audit_service.get_status()
          assert status["ok"] is True
          assert status["status"] == "ready"
          assert status["score"] == 100
          assert status["failed_count"] == 0

          package = andreos_memory_audit_service.get_package()
          assert package["ok"] is True
          assert package["package"]["audit"]["status"] == "ready"

          memory_status = memory_core_service.get_status()
          assert memory_status["ok"] is True
          assert memory_status["vault_root"].endswith("AndreOS")

          docs = Path("docs/frontend/andreos-memory-audit.md").read_text(encoding="utf-8")
          for marker in ["/api/andreos-memory-audit/audit", "BOT_FACTORY", "ULTIMA_SESSAO.md", "segredos", "ready"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          source = Path("backend/app/services/andreos_memory_audit_service.py").read_text(encoding="utf-8")
          for marker in ["AndreOSMemoryAuditService", "EXPECTED_PROJECTS", "_secret_guard_probe", "_rehearsal", "obsidian://open"]:
              assert marker in source, f"Missing source marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "andreos_memory_audit.py",
              "andreos_memory_audit_service.py",
              "andreos-memory-audit.md",
          ]
          missing_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_tree, f"Autorefresh generated tree missing entries: {missing_tree}"

          print("andreos memory audit validation passed")
          PY

      - name: Build summary
        run: |
          echo '## AndreOS Memory Audit Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- AndreOS structure and project files were audited.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Secret guard, compact context and Obsidian links were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Safe rehearsal wrote decision, history, backlog and last session.' >> "$GITHUB_STEP_SUMMARY"
