name: First Release Artifact Center Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase67-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  first-release-artifact-center-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate First Release Artifact Center
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.first_release_artifact_center_service import first_release_artifact_center_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/first-release-artifacts/status",
              "/api/first-release-artifacts/package",
              "/api/first-release-artifacts/report",
              "/api/first-release-artifacts/dashboard",
              "/app/first-release-artifacts",
              "/app/release-artifacts",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = first_release_artifact_center_service.get_status()
          assert status["ok"] is True
          assert status["status"] in {"green", "yellow", "red"}
          assert "release_truth" in status

          report = first_release_artifact_center_service.build_artifact_report()
          assert report["ok"] is True
          assert report["repo_url"].endswith("AndreVazao/devops-god-mode")
          assert report["actions_url"].endswith("/actions")
          assert report["artifacts"], "artifact report should include artifacts"

          windows = next(item for item in report["artifacts"] if item["artifact_id"] == "windows_exe")
          android = next(item for item in report["artifacts"] if item["artifact_id"] == "android_apk")
          universal = next(item for item in report["artifacts"] if item["artifact_id"] == "universal_test")

          assert windows["workflow_present"] is True
          assert windows["artifact_name"] == "godmode-windows-exe"
          assert windows["installable_now"] is True
          assert windows["placeholder"] is False

          assert android["workflow_present"] is True
          assert android["artifact_name"] == "godmode-android-apk-placeholder"
          assert android["placeholder"] is True
          assert android["installable_now"] is False
          assert any(blocker["id"] == "android_apk:placeholder" for blocker in report["blockers"])

          assert universal["workflow_present"] is True
          assert universal["artifact_name"] == "test_report"

          assert report["download_steps"], "artifact center should expose download steps"
          assert report["next_actions"], "artifact center should expose next actions"
          assert any("APK real" in action["label"] or "APK real" in action.get("detail", "") for action in report["next_actions"])

          dashboard = first_release_artifact_center_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["buttons"], "artifact dashboard should expose buttons"
          assert any(button.get("url", "").endswith("/actions") for button in dashboard["buttons"])

          package = first_release_artifact_center_service.get_package()
          assert package["ok"] is True
          assert package["package"]["status"]["ok"] is True
          assert package["package"]["dashboard"]["ok"] is True

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "first_release_artifact_center_frontend.py",
              "first_release_artifact_center.py",
              "first_release_artifact_center_service.py",
              "first-release-artifacts.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/first_release_artifact_center_service.py").exists()
          assert Path("backend/app/routes/first_release_artifact_center.py").exists()
          assert Path("backend/app/routes/first_release_artifact_center_frontend.py").exists()
          assert Path("docs/frontend/first-release-artifacts.md").exists()

          print("first release artifact center validation passed")
          PY

      - name: Build summary
        run: |
          echo '## First Release Artifact Center Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Artifact center API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Windows EXE real path and Android placeholder truth were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project Tree Autorefresh was validated for new files.' >> "$GITHUB_STEP_SUMMARY"
