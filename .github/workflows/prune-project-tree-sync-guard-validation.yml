name: APK Manifest Router Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase57-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'memory/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  apk-manifest-router-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate APK Manifest Router
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.apk_manifest_router_service import apk_manifest_router_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/apk-router/status",
              "/api/apk-router/package",
              "/api/apk-router/resolve",
              "/api/apk-router/dashboard",
              "/app/apk-start",
              "/app/start",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = apk_manifest_router_service.get_status()
          assert status["ok"] is True
          assert status["default_chat_route"] == "/app/operator-chat-sync-cards"
          assert status["legacy_chat_route"] == "/app/operator-chat-sync"
          assert status["safe_fallback_route"] == "/app/home"

          auto = apk_manifest_router_service.resolve(tenant_id="owner-andre", device_id="validation-apk", prefer="auto")
          assert auto["ok"] is True
          assert auto["resolution"]["route"] == "/app/operator-chat-sync-cards"
          assert auto["resolution"]["fallback_route"] == "/app/operator-chat-sync"

          legacy = apk_manifest_router_service.resolve(tenant_id="owner-andre", device_id="validation-apk", prefer="legacy")
          assert legacy["ok"] is True
          assert legacy["resolution"]["route"] == "/app/operator-chat-sync"

          home = apk_manifest_router_service.resolve(tenant_id="owner-andre", device_id="validation-apk", prefer="home")
          assert home["ok"] is True
          assert home["resolution"]["route"] in {"/app/god-mode-home", "/app/home"}

          dashboard = apk_manifest_router_service.dashboard(tenant_id="owner-andre", device_id="validation-apk")
          assert dashboard["ok"] is True
          assert dashboard["latest_resolution"]["route"] == "/app/operator-chat-sync-cards"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "apk_manifest_router_frontend.py",
              "apk_manifest_router.py",
              "apk_manifest_router_service.py",
              "apk-manifest-router.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/apk_manifest_router_service.py").exists()
          assert Path("backend/app/routes/apk_manifest_router.py").exists()
          assert Path("backend/app/routes/apk_manifest_router_frontend.py").exists()
          assert Path("docs/frontend/apk-manifest-router.md").exists()
          assert Path("data/apk_manifest_router.json").exists()
          assert Path("data/apk_manifest_router.json.lock").exists()

          print("apk manifest router validation passed")
          PY

      - name: Build summary
        run: |
          echo '## APK Manifest Router Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK manifest router API and start page were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Auto route opens chat inline cards.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Legacy and home fallback preferences were validated.' >> "$GITHUB_STEP_SUMMARY"
