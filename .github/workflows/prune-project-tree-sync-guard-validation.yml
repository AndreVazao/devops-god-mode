name: Private Tunnel Center Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase72-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'PROJECT_TREE.txt'
      - '.github/workflows/prune-project-tree-sync-guard-validation.yml'

jobs:
  private-tunnel-center-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Private Tunnel Center
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.private_tunnel_center_service import private_tunnel_center_service
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/private-tunnel/status",
              "/api/private-tunnel/package",
              "/api/private-tunnel/report",
              "/api/private-tunnel/dashboard",
              "/app/private-tunnel",
              "/app/street-mode",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing routes: {missing}"

          status = private_tunnel_center_service.get_status()
          assert status["ok"] is True
          assert status["status"] in {"green", "yellow", "red"}
          assert status["recommended_provider"] == "tailscale"
          assert status["stores_secrets"] is False

          report = private_tunnel_center_service.build_tunnel_report()
          assert report["ok"] is True
          assert report["recommended_provider"] == "tailscale"
          assert report["security"]["stores_tokens"] is False
          assert report["security"]["stores_passwords"] is False
          assert report["security"]["stores_cookies"] is False
          assert report["security"]["manual_login_required"] is True
          assert report["providers"], "tunnel report should expose providers"
          assert any(item["provider_id"] == "tailscale" and item["recommended"] is True for item in report["providers"])
          assert any(item["provider_id"] == "cloudflare_tunnel" for item in report["providers"])
          assert any(item["provider_id"] == "ngrok" for item in report["providers"])
          assert report["street_mode_steps"], "street mode steps must be present"
          assert report["apk_instruction"], "APK tunnel instruction must be present"

          dashboard = private_tunnel_center_service.build_dashboard()
          assert dashboard["ok"] is True
          assert dashboard["buttons"], "tunnel dashboard should expose buttons"
          assert any(button["route"] == "/app/pairing" for button in dashboard["buttons"])

          package = private_tunnel_center_service.get_package()
          assert package["ok"] is True
          assert package["package"]["status"]["ok"] is True
          assert package["package"]["dashboard"]["ok"] is True

          docs = Path("docs/frontend/private-tunnel-center.md").read_text(encoding="utf-8")
          for marker in ["Tailscale", "não guarda", "tokens", "APK", "rua", "Cloudflare", "ngrok"]:
              assert marker in docs, f"Missing doc marker: {marker}"

          generated_tree = project_tree_autorefresh_service.build_tree_text()
          required_tree_entries = [
              "private_tunnel_center_frontend.py",
              "private_tunnel_center.py",
              "private_tunnel_center_service.py",
              "private-tunnel-center.md",
          ]
          missing_generated_tree = [entry for entry in required_tree_entries if entry not in generated_tree]
          assert not missing_generated_tree, f"Autorefresh generated tree missing entries: {missing_generated_tree}"

          assert Path("backend/app/services/private_tunnel_center_service.py").exists()
          assert Path("backend/app/routes/private_tunnel_center.py").exists()
          assert Path("backend/app/routes/private_tunnel_center_frontend.py").exists()
          assert Path("docs/frontend/private-tunnel-center.md").exists()

          print("private tunnel center validation passed")
          PY

      - name: Build summary
        run: |
          echo '## Private Tunnel Center Validation Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Private tunnel API and cockpit were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Tailscale is the recommended private provider.' >> "$GITHUB_STEP_SUMMARY"
          echo '- No secret storage is used.' >> "$GITHUB_STEP_SUMMARY"
