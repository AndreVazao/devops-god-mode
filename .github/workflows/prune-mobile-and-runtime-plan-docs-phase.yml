name: Prune Mobile And Runtime Plan Docs Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/prune-mobile-and-runtime-plan-docs-plan.md'
      - '.github/workflows/prune-mobile-and-runtime-plan-docs-phase.yml'

jobs:
  prune-mobile-and-runtime-plan-docs-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate removed mobile and runtime plan docs
        run: |
          test ! -f docs/driving-mode-voice-first-plan.md
          test ! -f docs/mobile-cockpit-command-surface-plan.md
          test ! -f docs/local-pc-runtime-orchestrator-plan.md
          test ! -f docs/local-runtime-dominance-plan.md
          test ! -f docs/prune-browser-and-conversation-plan-docs-plan.md
          test ! -f .github/workflows/prune-browser-and-conversation-plan-docs-phase.yml

      - name: Build summary
        run: |
          echo '## Prune Mobile And Runtime Plan Docs Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed another mobile and local runtime planning batch.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed merged browser and conversation prune scaffolding.' >> "$GITHUB_STEP_SUMMARY"
