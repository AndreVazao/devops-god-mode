name: Mobile Shell Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/mobile-shell-artifact-phase'
    paths:
      - 'frontend/mobile-shell/**'
      - '.github/workflows/mobile-shell-smoke.yml'

jobs:
  smoke-mobile-shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f frontend/mobile-shell/index.html
          test -f frontend/mobile-shell/app.js
          test -f frontend/mobile-shell/styles.css
          test -f frontend/mobile-shell/manifest.json
          test -f frontend/mobile-shell/vercel.json
          test -f frontend/mobile-shell/README.md

      - name: Lightweight content checks
        run: |
          grep -q "Mobile Shell" frontend/mobile-shell/index.html
          grep -q "BACKEND_BASE_URL" frontend/mobile-shell/app.js
          grep -q "mobile-cockpit" frontend/mobile-shell/app.js
          grep -q "execution-pipeline" frontend/mobile-shell/app.js
          grep -q "God Mode Mobile Shell" frontend/mobile-shell/manifest.json
