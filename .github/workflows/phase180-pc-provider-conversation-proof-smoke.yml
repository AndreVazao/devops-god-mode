name: Phase 180 PC Provider Conversation Proof Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/pc_provider_conversation_proof.py'
      - 'backend/app/services/pc_provider_conversation_proof_service.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'tools/pc_provider_conversation_probe.py'
      - 'docs/orchestration/pc-provider-conversation-proof.md'
      - '.github/workflows/phase180-pc-provider-conversation-proof-smoke.yml'

jobs:
  phase180-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 180 PC provider proof contracts
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from main import app
          from app.services.god_mode_global_state_service import god_mode_global_state_service
          from app.services.pc_provider_conversation_proof_service import pc_provider_conversation_proof_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/pc-provider-conversation-proof/status",
              "/api/pc-provider-conversation-proof/install-plan",
              "/api/pc-provider-conversation-proof/command",
              "/api/pc-provider-conversation-proof/proofs",
              "/api/pc-provider-conversation-proof/import-proof",
              "/api/pc-provider-conversation-proof/import-latest",
              "/api/pc-provider-conversation-proof/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 180 routes: {missing}"

          status = pc_provider_conversation_proof_service.status()
          assert status["ok"] is True
          assert status["requires_real_pc"] is True
          assert status["stores_credentials"] is False
          assert status["probe_tool"] == "tools/pc_provider_conversation_probe.py"

          plan = pc_provider_conversation_proof_service.install_plan()
          assert plan["ok"] is True
          assert any("python -m pip install playwright" in step for step in plan["steps"])
          assert "chatgpt" in plan["safe_command_examples"]

          command = pc_provider_conversation_proof_service.provider_proof_command("chatgpt", wait_login_seconds=90)
          assert command["ok"] is True
          assert "tools/pc_provider_conversation_probe.py" in command["command"]
          assert "--provider chatgpt" in command["command"]

          proof_dir = Path("data/provider_proofs")
          proof_dir.mkdir(parents=True, exist_ok=True)
          proof_file = proof_dir / "chatgpt_proof_20990101_000000.json"
          proof_file.write_text(json.dumps({
              "ok": True,
              "provider": "chatgpt",
              "created_at": "2099-01-01T00:00:00+00:00",
              "target_url": "https://chat.openai.com/",
              "final_url": "https://chat.openai.com/c/test",
              "title": "God Mode proof conversation",
              "message_count": 2,
              "conversation_link_count": 1,
              "messages": [
                  {"role": "user", "text": "God Mode tree and project context", "text_hash": "a", "source_selector": "test", "visible": True},
                  {"role": "assistant", "text": "Use the real repo tree first", "text_hash": "b", "source_selector": "test", "visible": True}
              ],
              "conversation_links": [{"title": "Conversation", "href": "https://chat.openai.com/c/test"}],
              "summary": {"can_open_provider": True, "can_read_visible_messages": True}
          }), encoding="utf-8")

          imported = pc_provider_conversation_proof_service.import_proof_file(str(proof_file), project_hint="GOD_MODE")
          assert imported["ok"] is True
          assert imported["proof_summary"]["provider"] == "chatgpt"
          assert imported["staged"]["ok"] is True
          assert imported["staged"]["conversation"]["provider"] == "chatgpt"

          listed = pc_provider_conversation_proof_service.list_proofs(limit=5)
          assert listed["ok"] is True
          assert listed["proof_count"] >= 1

          package = pc_provider_conversation_proof_service.first_pc_proof_package()
          assert package["status"]["ok"] is True
          assert package["proof_goal"]["strong_success"].startswith("visible messages")

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 179
          assert global_status["current_phase"] == 180
          assert global_status["pc_provider_proof_endpoint"] == "/api/pc-provider-conversation-proof/package"

          global_package = god_mode_global_state_service.package()
          assert global_package["pc_provider_proof_model"]["endpoint"] == "/api/pc-provider-conversation-proof/package"
          assert any(item["phase"] == 180 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          tool = Path("tools/pc_provider_conversation_probe.py").read_text(encoding="utf-8")
          assert "launch_persistent_context" in tool
          assert "exports_cookies" in tool
          assert "exports_tokens" in tool
          assert "wait-login-seconds" in tool

          docs = Path("docs/orchestration/pc-provider-conversation-proof.md").read_text(encoding="utf-8")
          assert "/api/pc-provider-conversation-proof/package" in docs
          assert "Sucesso forte" in docs
          assert "não grava passwords" in docs

          print("phase 180 pc provider conversation proof smoke passed")
          PY
