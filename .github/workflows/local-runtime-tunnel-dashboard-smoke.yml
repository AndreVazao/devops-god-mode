name: Local Runtime Tunnel Dashboard Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/local-runtime-tunnel-dashboard'
    paths:
      - 'docs/local-runtime-tunnel-dashboard-plan.md'
      - 'docs/approval-broker-local-intelligence-plan.md'
      - 'backend/contracts/approval_broker_request.example.json'
      - 'backend/app/services/approval_broker_service.py'
      - 'backend/app/routes/approval_broker.py'
      - 'backend/main.py'
      - '.github/workflows/local-runtime-tunnel-dashboard-smoke.yml'

jobs:
  smoke-local-runtime-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate approval broker files
        run: |
          test -f docs/local-runtime-tunnel-dashboard-plan.md
          test -f docs/approval-broker-local-intelligence-plan.md
          test -f backend/contracts/approval_broker_request.example.json
          test -f backend/app/services/approval_broker_service.py
          test -f backend/app/routes/approval_broker.py
          test -f backend/main.py

      - name: Validate route wiring and approval markers
        run: |
          grep -q "approval_broker_router" backend/main.py
          grep -q "include_router(approval_broker_router)" backend/main.py
          grep -q "request_id" backend/contracts/approval_broker_request.example.json
          grep -q "risk_level" backend/contracts/approval_broker_request.example.json
          grep -q "ApprovalBrokerService" backend/app/services/approval_broker_service.py
          grep -q "/api/approval-broker" backend/app/routes/approval_broker.py
          grep -q "OK" backend/app/routes/approval_broker.py
