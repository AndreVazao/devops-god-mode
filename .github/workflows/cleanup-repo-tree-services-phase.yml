name: Cleanup Repo Tree Services Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/cleanup-repo-tree-services-plan.md'
      - '.github/workflows/cleanup-repo-tree-services-phase.yml'

jobs:
  cleanup-repo-tree-services-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate removed repo tree services
        run: |
          test ! -f backend/app/services/repo_tree_engine.py
          test ! -f backend/app/services/repo_tree_engine_v2.py
          test ! -f backend/app/services/repo_tree_engine_v3.py
          test ! -f backend/app/services/repo_tree_engine_v4.py
          test ! -f backend/app/services/repo_tree_action_plan_v1.py
          test ! -f backend/app/services/repo_tree_action_plan_v2.py
          test ! -f backend/app/services/repo_tree_action_plan_v3.py
          test ! -f backend/app/services/repo_tree_advice_v1.py
          test ! -f backend/app/services/repo_tree_cockpit_v1.py
          test ! -f backend/app/services/repo_tree_drift_v1.py
          test ! -f backend/app/services/repo_tree_snapshot_reader_v1.py

      - name: Build summary
        run: |
          echo '## Cleanup Repo Tree Services Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed legacy repo tree services after removing the route surface.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Next cleanup should target repo_tree caches, analyses, and provider internals.' >> "$GITHUB_STEP_SUMMARY"
