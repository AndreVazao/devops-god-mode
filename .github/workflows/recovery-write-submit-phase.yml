name: Recovery Write Submit Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-recovery-write-submit-plan.md'
      - 'backend/contracts/recovery_write_submit.example.json'
      - 'backend/contracts/recovery_write_submit_target.example.json'
      - 'backend/app/services/project_recovery_write_submit_service.py'
      - 'backend/app/routes/project_recovery_write_submit.py'
      - 'backend/main.py'
      - '.github/workflows/recovery-write-submit-phase.yml'

jobs:
  recovery-write-submit-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate recovery write submit layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_recovery_write_submit_service import project_recovery_write_submit_service

          submissions = project_recovery_write_submit_service.get_submissions()["submissions"]
          targets = project_recovery_write_submit_service.get_submit_targets()["targets"]
          next_action = project_recovery_write_submit_service.get_next_submit_action()["next_submit_action"]
          route_paths = {route.path for route in app.routes}

          assert submissions, "Expected at least one recovery write submission"
          assert targets, "Expected at least one recovery write submit target"
          assert next_action is not None
          assert "/api/project-recovery-write-submit/status" in route_paths
          assert "/api/project-recovery-write-submit/submissions" in route_paths
          assert "/api/project-recovery-write-submit/targets" in route_paths
          assert "/api/project-recovery-write-submit/next-submit-action" in route_paths
          print("recovery write submit phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Recovery Write Submit Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for recovery write submit validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
