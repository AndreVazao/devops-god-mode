name: Project Bootstrap Cockpit Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/project-bootstrap-cockpit-test.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/project-bootstrap-cockpit-test.yml'

jobs:
  project-bootstrap-cockpit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate project bootstrap cockpit routes and dashboard
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.project_bootstrap_cockpit_service import project_bootstrap_cockpit_service
          from app.services.tenant_partition_service import tenant_partition_service

          route_paths = {route.path for route in app.routes}
          required_routes = {
              "/api/project-bootstrap-cockpit/status",
              "/api/project-bootstrap-cockpit/package",
              "/api/project-bootstrap-cockpit/dashboard",
              "/app/project-bootstrap",
          }
          missing = sorted(required_routes - route_paths)
          assert not missing, f"Missing routes: {missing}"

          tenant_partition_service.upsert_tenant(
              tenant_id="owner-andre",
              owner_type="self",
              display_name="André",
              repo_scope_mode="private_default",
              provider_scope_mode="private_default",
              vault_namespace="vault/owner-andre",
              notes="project bootstrap validation tenant",
          )

          dashboard = project_bootstrap_cockpit_service.build_dashboard(
              tenant_id="owner-andre",
              project_name="baribudos-studio",
              providers=["github", "vercel", "supabase", "render"],
              multirepo_mode=True,
          )

          assert project_bootstrap_cockpit_service.get_status()["ok"] is True
          assert dashboard["ok"] is True
          assert dashboard["onboarding"]["provider_count"] == 4
          assert isinstance(dashboard["launch_ready"], bool)
          assert dashboard["readiness_score"] >= 0
          assert len(dashboard["launch_phases"]) == 4
          assert Path("backend/app/services/project_bootstrap_cockpit_service.py").exists()
          assert Path("backend/app/routes/project_bootstrap_cockpit.py").exists()
          assert Path("backend/app/routes/project_bootstrap_cockpit_frontend.py").exists()
          assert Path("docs/frontend/project-bootstrap-cockpit.md").exists()

          print("project bootstrap cockpit test passed")
          PY

      - name: Build summary
        run: |
          echo '## Project Bootstrap Cockpit Test Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project bootstrap cockpit routes were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Combined launch readiness dashboard was validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project bootstrap cockpit frontend route and documentation were validated.' >> "$GITHUB_STEP_SUMMARY"
