name: Multi File Parsing Placement Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/multi-file-parsing-placement-plan.md'
      - 'backend/contracts/multi_file_parsing_batch.example.json'
      - 'backend/contracts/automatic_placement_decision.example.json'
      - 'backend/app/services/multi_file_parsing_placement_service.py'
      - 'backend/app/routes/multi_file_parsing_placement.py'
      - 'backend/main.py'
      - '.github/workflows/multi-file-parsing-placement-phase.yml'

jobs:
  multi-file-parsing-placement-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate multi file parsing placement layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.multi_file_parsing_placement_service import multi_file_parsing_placement_service
          batches = multi_file_parsing_placement_service.get_parsing_batches()["batches"]
          decisions = multi_file_parsing_placement_service.get_placement_decisions()["decisions"]
          package = multi_file_parsing_placement_service.get_parsing_package()["package"]
          next_action = multi_file_parsing_placement_service.get_next_parsing_action()["next_parsing_action"]
          route_paths = {route.path for route in app.routes}
          assert batches
          assert decisions
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/multi-file-parsing-placement/status" in route_paths
          assert "/api/multi-file-parsing-placement/batches" in route_paths
          assert "/api/multi-file-parsing-placement/decisions" in route_paths
          assert "/api/multi-file-parsing-placement/next-parsing-action" in route_paths
          print("multi file parsing placement phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Multi File Parsing Placement Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Workflow for multi file parsing placement validation.' >> "$GITHUB_STEP_SUMMARY"
