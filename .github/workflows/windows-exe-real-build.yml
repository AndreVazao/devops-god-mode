# Canonical desktop build workflow.
# Keep this as the single main Windows EXE build pipeline.
name: Windows EXE Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'desktop/**'
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'desktop/**'
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/**'

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build tooling and backend dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Build desktop launcher
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm desktop/GodModeDesktop.spec
          Get-Item dist/GodModeDesktop.exe | Format-List FullName,Length,LastWriteTime

      - name: Prepare desktop helper bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/support | Out-Null
          New-Item -ItemType Directory -Force -Path dist/onboarding | Out-Null
          Copy-Item desktop/windows_shortcut_bootstrap.ps1 dist/support/windows_shortcut_bootstrap.ps1
          Copy-Item desktop/windows_autostart_bootstrap.ps1 dist/support/windows_autostart_bootstrap.ps1
          Copy-Item desktop/windows_autostart_remove.ps1 dist/support/windows_autostart_remove.ps1
          Copy-Item desktop/godmode_update_helper.py dist/support/godmode_update_helper.py

          $manifest = @{
            package_name = 'GodModeDesktopBundle'
            primary_executable = 'GodModeDesktop.exe'
            support_scripts = @(
              'windows_shortcut_bootstrap.ps1',
              'windows_autostart_bootstrap.ps1',
              'windows_autostart_remove.ps1',
              'godmode_update_helper.py'
            )
            onboarding_assets = @(
              'desktop_first_run_payload.json',
              'desktop_shortcut_payload.json',
              'desktop_autostart_payload.json',
              'godmode-mobile-pairing.json'
            )
            update_assets = @(
              'godmode_update_helper.py',
              'desktop_update_manifest.json',
              'desktop_pending_update.json'
            )
            install_mode = 'desktop_bundle_local_actions'
            installer_status = 'installer_manifest_ready'
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path dist/onboarding/desktop-installer-manifest.json

          $onboarding = @{
            runtime_mode = 'pc_backend_primary_mobile_remote_cockpit'
            steps = @(
              'launch_desktop_bundle',
              'start_backend_runtime',
              'wait_for_health',
              'open_home',
              'open_mobile_pairing'
            )
            updater = @{
              bootstrap_available = $true
              helper_file = 'support/godmode_update_helper.py'
              first_updater_install_is_manual = $true
            }
            pairing_required = $true
            backend_port = 8000
            onboarding_status = 'onboarding_bundle_ready'
          }
          $onboarding | ConvertTo-Json -Depth 6 | Set-Content -Path dist/onboarding/desktop-onboarding.json

          $bundleIndex = @{
            package_name = 'GodModeDesktopBundle'
            primary_executable = 'GodModeDesktop.exe'
            support_files = @(
              'windows_shortcut_bootstrap.ps1',
              'windows_autostart_bootstrap.ps1',
              'windows_autostart_remove.ps1',
              'godmode_update_helper.py'
            )
            onboarding_files = @(
              'desktop-installer-manifest.json',
              'desktop-onboarding.json',
              'desktop-bundle-index.json'
            )
            mobile_linked_assets = @(
              'godmode-mobile-bootstrap.json',
              'godmode-mobile-pairing.json',
              'godmode-mobile-runtime-shell.json'
            )
            delivery_mode = 'local_bundle_artifact'
            inventory_status = 'bundle_inventory_ready'
          }
          $bundleIndex | ConvertTo-Json -Depth 5 | Set-Content -Path dist/onboarding/desktop-bundle-index.json

          $handoff = @{
            runtime_mode = 'pc_backend_primary_mobile_remote_cockpit'
            desktop_bundle_assets = @(
              'GodModeDesktop.exe',
              'desktop-installer-manifest.json',
              'desktop-onboarding.json',
              'desktop-bundle-index.json',
              'godmode_update_helper.py'
            )
            mobile_bundle_assets = @(
              'GodModeMobile.apk',
              'godmode-mobile-bootstrap.json',
              'godmode-mobile-pairing.json',
              'godmode-mobile-runtime-shell.json'
            )
            pairing_asset = 'godmode-mobile-pairing.json'
            backend_port = 8000
            updater = @{
              bootstrap_available = $true
              future_updates_can_use_package_update = $true
              first_updater_install_is_manual = $true
            }
            install_sequence = @(
              'download_desktop_bundle',
              'launch_desktop',
              'wait_for_health',
              'open_mobile_pairing',
              'start_working'
            )
            handoff_status = 'handoff_package_ready'
          }
          $handoff | ConvertTo-Json -Depth 6 | Set-Content -Path dist/onboarding/desktop-mobile-handoff.json

      - name: Verify built files exist
        shell: pwsh
        run: |
          if (-not (Test-Path dist/GodModeDesktop.exe)) { throw 'dist/GodModeDesktop.exe was not created.' }
          if (-not (Test-Path dist/support/windows_shortcut_bootstrap.ps1)) { throw 'Desktop shortcut helper was not created.' }
          if (-not (Test-Path dist/support/windows_autostart_bootstrap.ps1)) { throw 'Desktop autostart helper was not created.' }
          if (-not (Test-Path dist/support/godmode_update_helper.py)) { throw 'Desktop update helper was not created.' }
          if (-not (Test-Path dist/onboarding/desktop-installer-manifest.json)) { throw 'Desktop installer manifest was not created.' }
          if (-not (Test-Path dist/onboarding/desktop-onboarding.json)) { throw 'Desktop onboarding file was not created.' }
          if (-not (Test-Path dist/onboarding/desktop-bundle-index.json)) { throw 'Desktop bundle index file was not created.' }
          if (-not (Test-Path dist/onboarding/desktop-mobile-handoff.json)) { throw 'Desktop mobile handoff file was not created.' }

      - name: Upload artifact if quota allows
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: godmode-windows-exe
          path: |
            dist/GodModeDesktop.exe
            dist/support/windows_shortcut_bootstrap.ps1
            dist/support/windows_autostart_bootstrap.ps1
            dist/support/windows_autostart_remove.ps1
            dist/support/godmode_update_helper.py
            dist/onboarding/desktop-installer-manifest.json
            dist/onboarding/desktop-onboarding.json
            dist/onboarding/desktop-bundle-index.json
            dist/onboarding/desktop-mobile-handoff.json

      - name: Build summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Windows EXE Build Summary'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- This is the canonical desktop EXE build workflow for the local-first PC brain.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Desktop launcher now starts the FastAPI backend on port 8000.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Backend dependencies are installed before PyInstaller packaging.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Desktop self-update helper is included in the support bundle.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Desktop launcher EXE was built from `desktop/godmode_desktop_launcher.py` using PyInstaller.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Support scripts for desktop shortcut, autostart and package update were added to `dist/support`.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Desktop installer manifest, onboarding, bundle index, and handoff files were added to `dist/onboarding`.'
