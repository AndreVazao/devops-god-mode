name: Phase 182 Local Vault Contract Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/local_encrypted_vault_contract.py'
      - 'backend/app/services/local_encrypted_vault_contract_service.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/local-encrypted-vault-contract.md'
      - '.github/workflows/phase182-local-vault-contract-smoke.yml'

jobs:
  phase182-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 182 local vault contract
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.god_mode_global_state_service import god_mode_global_state_service
          from app.services.local_encrypted_vault_contract_service import local_encrypted_vault_contract_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/local-encrypted-vault-contract/status",
              "/api/local-encrypted-vault-contract/policy",
              "/api/local-encrypted-vault-contract/register-project",
              "/api/local-encrypted-vault-contract/classify-env-text",
              "/api/local-encrypted-vault-contract/intake-env-text",
              "/api/local-encrypted-vault-contract/first-credential-flow",
              "/api/local-encrypted-vault-contract/bootstrap-project-mapping",
              "/api/local-encrypted-vault-contract/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 182 routes: {missing}"

          status = local_encrypted_vault_contract_service.status()
          assert status["ok"] is True
          assert status["stores_secret_values"] is False
          assert status["github_memory_allowed"] == "references_only"

          policy = local_encrypted_vault_contract_service.policy()
          assert policy["ok"] is True
          assert "secret reference IDs" in policy["policy"]["allowed"]

          raw_secret = "real_super_secret_value_123456"
          env_text = f"""
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY={raw_secret}
          NEXT_PUBLIC_SITE_URL=https://barbudo.example.com
          OPENAI_API_KEY=sk-example-placeholder
          VERCEL_TOKEN=CHANGE_ME
          """
          intake = local_encrypted_vault_contract_service.intake_env_text(
              env_text=env_text,
              source_name="phone_uploaded_env_test",
              project_hint="BARBUDO_WEBSITE",
              environment_name="production",
          )
          assert intake["ok"] is True
          report = intake["report"]
          assert report["item_count"] >= 5
          assert report["stores_secret_values"] is False
          assert report["safe_summary"]["example_value"] >= 1
          assert report["safe_summary"]["secret_candidate"] >= 1
          assert any(item["provider_guess"] == "SUPABASE" for item in report["items"])
          assert any(item["classification"] == "example_value" for item in report["items"])
          assert all(raw_secret not in str(item) for item in report["items"])
          assert raw_secret not in str(intake)
          assert intake["placement_plan"]["target_count"] >= 1
          assert all(target["requires_operator_approval"] is True for target in intake["placement_plan"]["targets"])

          bootstrap = local_encrypted_vault_contract_service.project_mapping_bootstrap()
          assert bootstrap["ok"] is True
          project_ids = {item["project_id"] for item in bootstrap["projects"]}
          assert {"GOD_MODE", "BARBUDO_STUDIO", "BARBUDO_WEBSITE"}.issubset(project_ids)

          flow = local_encrypted_vault_contract_service.first_credential_flow(project_id="BARBUDO_STUDIO", provider="SUPABASE")
          assert flow["ok"] is True
          assert any(step.get("approval_required") is True for step in flow["steps"])

          package = local_encrypted_vault_contract_service.package()
          assert package["status"]["stores_secret_values"] is False
          assert package["project_mapping_hint"]["barbudo_studio"]

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 181
          assert global_status["current_phase"] == 182
          assert global_status["local_vault_contract_endpoint"] == "/api/local-encrypted-vault-contract/package"

          global_package = god_mode_global_state_service.package()
          assert global_package["local_vault_contract_model"]["stores_secret_values"] is False
          assert any(item["phase"] == 182 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          docs = Path("docs/orchestration/local-encrypted-vault-contract.md").read_text(encoding="utf-8")
          assert "BARBUDO_STUDIO" in docs
          assert "BARBUDO_WEBSITE" in docs
          assert "/api/local-encrypted-vault-contract/package" in docs

          print("phase 182 local vault contract smoke passed")
          PY
