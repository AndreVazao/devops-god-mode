name: Recovery Real Write Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-recovery-real-write-link-plan.md'
      - 'backend/contracts/recovery_real_write_handoff.example.json'
      - 'backend/contracts/recovery_real_write_target.example.json'
      - 'backend/app/services/project_recovery_real_write_link_service.py'
      - 'backend/app/routes/project_recovery_real_write_link.py'
      - 'backend/main.py'
      - '.github/workflows/recovery-real-write-phase.yml'

jobs:
  recovery-real-write-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate recovery real write handoff layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_recovery_real_write_link_service import project_recovery_real_write_link_service

          handoffs = project_recovery_real_write_link_service.get_handoffs()["handoffs"]
          targets = project_recovery_real_write_link_service.get_handoff_targets()["targets"]
          next_action = project_recovery_real_write_link_service.get_next_handoff_action()["next_handoff_action"]
          route_paths = {route.path for route in app.routes}

          assert handoffs, "Expected at least one recovery real write handoff"
          assert targets, "Expected at least one recovery real write target"
          assert next_action is not None
          assert "/api/project-recovery-real-write/status" in route_paths
          assert "/api/project-recovery-real-write/handoffs" in route_paths
          assert "/api/project-recovery-real-write/targets" in route_paths
          assert "/api/project-recovery-real-write/next-handoff-action" in route_paths
          print("recovery real write phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Recovery Real Write Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for recovery real write handoff validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
