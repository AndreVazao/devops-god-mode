name: Continuous Remote Execution Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/continuous-remote-execution-plan.md'
      - 'backend/contracts/continuous_remote_execution.example.json'
      - 'backend/contracts/continuous_execution_action.example.json'
      - 'backend/app/services/continuous_remote_execution_service.py'
      - 'backend/app/routes/continuous_remote_execution.py'
      - 'backend/main.py'
      - '.github/workflows/continuous-remote-execution-phase.yml'

jobs:
  continuous-remote-execution-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate continuous remote execution layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.continuous_remote_execution_service import continuous_remote_execution_service
          loops = continuous_remote_execution_service.get_execution_loops()["loops"]
          actions = continuous_remote_execution_service.get_execution_actions()["actions"]
          package = continuous_remote_execution_service.get_execution_package()["package"]
          next_action = continuous_remote_execution_service.get_next_execution_action()["next_execution_action"]
          route_paths = {route.path for route in app.routes}
          assert loops
          assert actions
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/continuous-remote-execution/status" in route_paths
          assert "/api/continuous-remote-execution/loops" in route_paths
          assert "/api/continuous-remote-execution/actions" in route_paths
          assert "/api/continuous-remote-execution/next-execution-action" in route_paths
          print("continuous remote execution phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Continuous Remote Execution Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Workflow for continuous remote execution validation.' >> "$GITHUB_STEP_SUMMARY"
