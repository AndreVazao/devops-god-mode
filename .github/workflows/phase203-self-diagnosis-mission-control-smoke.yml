name: Phase 203 Self Diagnosis Mission Control Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/god_mode_self_diagnosis_mission_control_service.py'
      - 'backend/app/routes/god_mode_self_diagnosis_mission_control.py'
      - 'backend/app/routes/god_mode_self_diagnosis_mission_control_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/god-mode-self-diagnosis-mission-control.md'
      - '.github/workflows/phase203-self-diagnosis-mission-control-smoke.yml'

jobs:
  phase203-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 203 file contract
        run: |
          python - <<'PY'
          from pathlib import Path

          files = {
              'service': Path('backend/app/services/god_mode_self_diagnosis_mission_control_service.py'),
              'route': Path('backend/app/routes/god_mode_self_diagnosis_mission_control.py'),
              'frontend': Path('backend/app/routes/god_mode_self_diagnosis_mission_control_frontend.py'),
              'global_state': Path('backend/app/services/god_mode_global_state_service.py'),
              'docs': Path('docs/orchestration/god-mode-self-diagnosis-mission-control.md'),
          }
          for label, path in files.items():
              assert path.exists(), f'Missing {label}: {path}'

          service = files['service'].read_text(encoding='utf-8')
          for marker in [
              'class GodModeSelfDiagnosisMissionControlService',
              'run_diagnosis',
              'self_fix_queue_item',
              'create_pr_planning_brief',
              'can_apply_fix_without_gate',
              'can_merge_without_oner_approval',
              'first_pc_install_ready_pack_service',
              'native_skills_adoption_queue_service',
              'module_registry_snapshot_service',
          ]:
              assert marker in service, marker

          route = files['route'].read_text(encoding='utf-8')
          for endpoint in ['/status', '/policy', '/run', '/queue', '/update-queue-item', '/create-pr-planning-brief', '/dashboard', '/package']:
              assert endpoint in route, f'Missing endpoint {endpoint}'
          assert 'prefix="/api/god-mode-self-diagnosis"' in route

          frontend = files['frontend'].read_text(encoding='utf-8')
          for marker in ['God Mode Self Diagnosis', '/api/god-mode-self-diagnosis/run', '/api/god-mode-self-diagnosis/create-pr-planning-brief', '/app/god-mode-self-diagnosis', '/app/self-fix-mission-control']:
              assert marker in frontend, marker

          global_state = files['global_state'].read_text(encoding='utf-8')
          for marker in ['current_phase": 203', 'latest_merged_phase": 202', 'god_mode_self_diagnosis_model', '/api/god-mode-self-diagnosis/package', 'self_diagnosis_route']:
              assert marker in global_state, marker

          docs = files['docs'].read_text(encoding='utf-8')
          for marker in ['/api/god-mode-self-diagnosis/package', 'self_fix_queue_item', 'can_apply_fix_without_gate=false', 'PR planning brief']:
              assert marker in docs, marker

          workflow_dir = Path('.github/workflows')
          phase_workflows = sorted(path.name for path in workflow_dir.glob('phase*-*.yml'))
          assert phase_workflows == ['phase203-self-diagnosis-mission-control-smoke.yml'], phase_workflows

          print('phase 203 self diagnosis mission control file contract passed')
          PY
