name: Phase 194 Repo Scanner Real Work Map Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/repo_scanner_real_work_map_service.py'
      - 'backend/app/routes/repo_scanner_real_work_map.py'
      - 'backend/app/routes/repo_scanner_real_work_map_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/repo-scanner-real-work-map.md'
      - '.github/workflows/phase194-repo-scanner-real-work-map-smoke.yml'

jobs:
  phase194-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate Phase 194 repo scanner real work map
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          from main import app
          from app.services.god_mode_global_state_service import god_mode_global_state_service
          from app.services.repo_scanner_real_work_map_service import repo_scanner_real_work_map_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/repo-scanner-real-work-map/status",
              "/api/repo-scanner-real-work-map/policy",
              "/api/repo-scanner-real-work-map/scan",
              "/api/repo-scanner-real-work-map/suggest-repo",
              "/api/repo-scanner-real-work-map/apply-suggestion",
              "/api/repo-scanner-real-work-map/create-review-cards",
              "/api/repo-scanner-real-work-map/dashboard",
              "/api/repo-scanner-real-work-map/package",
              "/app/repo-scanner-real-work-map",
              "/app/repo-scanner",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 194 routes: {missing}"

          status = repo_scanner_real_work_map_service.status()
          assert status["ok"] is True
          assert status["auto_destructive_actions"] is False
          assert status["review_required_for_low_confidence"] is True

          policy = repo_scanner_real_work_map_service.policy()
          assert "delete repos" in policy["policy"]["blocked"]
          assert "store secrets" in policy["policy"]["blocked"]

          single = repo_scanner_real_work_map_service.suggest_repo("AndreVazao/baribudos-website")
          assert single["ok"] is True
          assert single["suggestion"]["project_group_id"] == "baribudos_platform"
          assert single["suggestion"]["front"] in {"website", "unknown"}
          assert single["suggestion"]["confidence"] in {"high", "medium"}

          scan = repo_scanner_real_work_map_service.scan_repos(
              repo_full_names=[
                  "AndreVazao/baribudos-website",
                  "AndreVazao/baribudos-studio",
                  "AndreVazao/devops-god-mode",
                  "AndreVazao/random-unknown-tool",
              ],
              auto_apply_high_confidence=True,
          )
          assert scan["ok"] is True
          assert scan["scan"]["repo_count"] == 4
          assert scan["scan"]["suggestion_count"] == 4
          suggestions = {item["repo_full_name"]: item for item in scan["suggestions"]}
          assert suggestions["AndreVazao/baribudos-website"]["project_group_id"] == "baribudos_platform"
          assert suggestions["AndreVazao/baribudos-studio"]["project_group_id"] == "baribudos_platform"
          assert suggestions["AndreVazao/devops-god-mode"]["project_group_id"] == "god_mode"
          assert suggestions["AndreVazao/random-unknown-tool"]["needs_operator_review"] is True
          assert any(item.get("safe_to_auto_apply") for item in scan["suggestions"])

          low_id = suggestions["AndreVazao/random-unknown-tool"]["suggestion_id"]
          low_apply = repo_scanner_real_work_map_service.apply_suggestion(low_id)
          assert low_apply["ok"] is False
          assert low_apply["error"] == "operator_review_required"

          cards = repo_scanner_real_work_map_service.create_review_cards(scan["scan"]["scan_id"])
          assert cards["ok"] is True
          assert cards["card_count"] >= 1
          assert all(card["card_type"] == "repo_link_review" for card in cards["cards"])

          dashboard = repo_scanner_real_work_map_service.dashboard()
          assert dashboard["ok"] is True
          assert dashboard["suggestions"]

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 193
          assert global_status["current_phase"] == 194
          assert global_status["repo_scanner_route"] == "/app/repo-scanner-real-work-map"

          global_package = god_mode_global_state_service.package()
          model = global_package["repo_scanner_real_work_map_model"]
          assert model["route"] == "/app/repo-scanner-real-work-map"
          assert "delete repos" in model["blocked"]
          assert any(item["phase"] == 194 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          frontend = Path("backend/app/routes/repo_scanner_real_work_map_frontend.py").read_text(encoding="utf-8")
          assert "Repo Scanner" in frontend
          assert "/api/repo-scanner-real-work-map/scan" in frontend
          assert "Scan + aplicar high-confidence" in frontend

          workflow_dir = Path(".github/workflows")
          phase_workflows = sorted(path.name for path in workflow_dir.glob("phase*-*.yml"))
          assert phase_workflows == ["phase194-repo-scanner-real-work-map-smoke.yml"], phase_workflows

          docs = Path("docs/orchestration/repo-scanner-real-work-map.md").read_text(encoding="utf-8")
          assert "/api/repo-scanner-real-work-map/package" in docs
          assert "website + studio" in docs
          assert "Não apaga repos" in docs

          print("phase 194 repo scanner real work map smoke passed")
          PY
