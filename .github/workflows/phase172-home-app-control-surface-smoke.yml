name: Phase 172 Home App Control Surface Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/orchestration/home-app-control-surface.md'
      - '.github/workflows/phase172-home-app-control-surface-smoke.yml'

jobs:
  phase172-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 172 import, routes, modules and manifests
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.home_app_control_surface_service import home_app_control_surface_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/home-control-surface/status",
              "/api/home-control-surface/panel",
              "/api/home-control-surface/policy",
              "/api/home-control-surface/rules",
              "/api/home-control-surface/modules",
              "/api/home-control-surface/buttons",
              "/api/home-control-surface/quick-start",
              "/api/home-control-surface/mobile-shell",
              "/api/home-control-surface/desktop-shell",
              "/api/home-control-surface/latest",
              "/api/home-control-surface/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 172 routes: {missing}"

          status = home_app_control_surface_service.status()
          assert status["ok"] is True
          assert status["dangerous_actions_exposed"] is False
          assert status["owner_approval_required_for_high_risk"] is True
          assert status["module_count"] >= 7
          assert status["button_count"] >= 15

          panel = home_app_control_surface_service.panel()
          assert panel["ok"] is True
          assert panel["traffic_light"] in {"green", "yellow", "red"}
          module_ids = {module["id"] for module in panel["modules"]}
          expected_modules = {
              "playbook_templates",
              "pipeline_store_low_risk",
              "memory_sync_runtime",
              "github_approved_actions",
              "local_knowledge_rag",
              "provider_outcome_learning",
              "history_and_audit",
          }
          assert expected_modules.issubset(module_ids)

          buttons = home_app_control_surface_service.button_manifest()
          assert buttons["ok"] is True
          assert buttons["button_count"] == status["button_count"]
          risky = [button for button in buttons["buttons"] if button["risk"] == "approval_required"]
          assert risky, "Expected approval-required buttons"
          assert all(button["requires_confirmation"] is True for button in risky)
          blocked_words = {"merge", "release", "delete", "payment", "license"}
          for button in buttons["buttons"]:
              lowered = f"{button['id']} {button['endpoint']} {button['label']}".lower()
              assert not any(word in lowered for word in blocked_words), f"Blocked action exposed: {button}"

          mobile = home_app_control_surface_service.mobile_shell_manifest()
          assert mobile["ok"] is True
          assert mobile["target"] == "android_apk_webview"
          assert mobile["cards"]

          desktop = home_app_control_surface_service.desktop_shell_manifest()
          assert desktop["ok"] is True
          assert desktop["target"] == "pc_desktop_launcher"
          assert desktop["window"]["auto_start_backend"] is True

          package = home_app_control_surface_service.package()
          assert package["status"]["ok"] is True
          assert package["buttons"]["button_count"] >= 15
          assert package["mobile_shell"]["ok"] is True
          assert package["desktop_shell"]["ok"] is True

          assert Path("docs/orchestration/home-app-control-surface.md").exists()
          print("phase 172 home app control surface smoke passed")
          PY
