name: Desktop Mobile Handoff Package Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/desktop-mobile-handoff-package'
    paths:
      - 'docs/desktop-mobile-handoff-package-plan.md'
      - 'backend/contracts/desktop_mobile_handoff.example.json'
      - 'backend/app/services/desktop_mobile_handoff_service.py'
      - 'backend/app/routes/desktop_mobile_handoff.py'
      - 'backend/main.py'
      - '.github/workflows/windows-exe-real-build.yml'
      - '.github/workflows/desktop-mobile-handoff-package-smoke.yml'

jobs:
  smoke-desktop-mobile-handoff-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate desktop mobile handoff files
        run: |
          test -f docs/desktop-mobile-handoff-package-plan.md
          test -f backend/contracts/desktop_mobile_handoff.example.json
          test -f backend/app/services/desktop_mobile_handoff_service.py
          test -f backend/app/routes/desktop_mobile_handoff.py
          test -f backend/main.py
          test -f .github/workflows/windows-exe-real-build.yml

      - name: Validate desktop mobile handoff markers
        run: |
          grep -q '"handoff_id": "handoff_0001"' backend/contracts/desktop_mobile_handoff.example.json
          grep -q 'desktop_mobile_handoff_package' backend/app/services/desktop_mobile_handoff_service.py
          grep -q '/api/desktop-mobile-handoff' backend/app/routes/desktop_mobile_handoff.py
          grep -q 'desktop_mobile_handoff_router' backend/main.py
          grep -q 'desktop-mobile-handoff.json' .github/workflows/windows-exe-real-build.yml
