name: Phase 196 Conversation Source Import Feed Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/conversation_source_import_feed_service.py'
      - 'backend/app/routes/conversation_source_import_feed.py'
      - 'backend/app/routes/conversation_source_import_feed_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/conversation-source-import-feed.md'
      - '.github/workflows/phase196-conversation-source-import-feed-smoke.yml'

jobs:
  phase196-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 196 file contract
        run: |
          python - <<'PY'
          from pathlib import Path

          files = {
              "service": Path("backend/app/services/conversation_source_import_feed_service.py"),
              "route": Path("backend/app/routes/conversation_source_import_feed.py"),
              "frontend": Path("backend/app/routes/conversation_source_import_feed_frontend.py"),
              "global_state": Path("backend/app/services/god_mode_global_state_service.py"),
              "docs": Path("docs/orchestration/conversation-source-import-feed.md"),
          }
          for label, path in files.items():
              assert path.exists(), f"Missing {label}: {path}"

          service = files["service"].read_text(encoding="utf-8")
          assert "class ConversationSourceImportFeedService" in service
          assert "def import_text" in service
          assert "def import_messages" in service
          assert "conversation_requirement_ledger_service.analyze_text" in service
          assert "real_work_fast_path_service.link_conversation" in service
          assert "conversation_import_review" in service
          assert "REDACTED_SECRET_LINE" in service
          assert "treat AI response as decision" in service

          route = files["route"].read_text(encoding="utf-8")
          for endpoint in ["/status", "/policy", "/import-text", "/import-messages", "/create-review-cards", "/dashboard", "/package"]:
              assert endpoint in route, f"Missing endpoint {endpoint}"
          assert "prefix=\"/api/conversation-source-import-feed\"" in route

          frontend = files["frontend"].read_text(encoding="utf-8")
          assert "Conversation Source Import" in frontend
          assert "/api/conversation-source-import-feed/import-text" in frontend
          assert "/app/conversation-source-import-feed" in frontend
          assert "/app/conversation-import" in frontend
          assert "Oner:" in frontend and "Assistant:" in frontend

          global_state = files["global_state"].read_text(encoding="utf-8")
          assert "current_phase\": 196" in global_state
          assert "latest_merged_phase\": 195" in global_state
          assert "conversation_source_import_feed_model" in global_state
          assert "/api/conversation-source-import-feed/package" in global_state

          docs = files["docs"].read_text(encoding="utf-8")
          assert "/api/conversation-source-import-feed/package" in docs
          assert "Oner:" in docs
          assert "Assistant:" in docs
          assert "Não guarda passwords" in docs
          assert "Resposta de IA é proposta" in docs or "resposta de IA é proposta" in docs

          workflow_dir = Path(".github/workflows")
          phase_workflows = sorted(path.name for path in workflow_dir.glob("phase*-*.yml"))
          assert phase_workflows == ["phase196-conversation-source-import-feed-smoke.yml"], phase_workflows

          print("phase 196 conversation source import feed file contract passed")
          PY
