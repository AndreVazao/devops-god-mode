name: Operation Queue And Intents Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/operation-queue-and-intents'
    paths:
      - 'docs/operation-queue-and-intents-plan.md'
      - 'backend/contracts/operation_intent.example.json'
      - 'backend/app/services/operation_queue_service.py'
      - 'backend/app/routes/operation_queue.py'
      - 'backend/main.py'
      - '.github/workflows/operation-queue-and-intents-smoke.yml'

jobs:
  smoke-operation-queue-and-intents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate operation queue files
        run: |
          test -f docs/operation-queue-and-intents-plan.md
          test -f backend/contracts/operation_intent.example.json
          test -f backend/app/services/operation_queue_service.py
          test -f backend/app/routes/operation_queue.py
          test -f backend/main.py

      - name: Validate operation queue markers
        run: |
          grep -q '"intent_id": "intent_0001"' backend/contracts/operation_intent.example.json
          grep -q 'operation_queue' backend/app/services/operation_queue_service.py
          grep -q 'operation_intent_preview' backend/app/services/operation_queue_service.py
          grep -q '/api/operation-queue' backend/app/routes/operation_queue.py
          grep -q 'operation_queue_router' backend/main.py
