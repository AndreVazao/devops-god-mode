name: Write Verify And Rollback Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/write-verify-and-rollback'
    paths:
      - 'docs/write-verify-and-rollback-plan.md'
      - 'backend/contracts/write_verify_rollback.example.json'
      - 'backend/app/services/write_verify_rollback_service.py'
      - 'backend/app/routes/write_verify_rollback.py'
      - 'backend/main.py'
      - '.github/workflows/write-verify-and-rollback-smoke.yml'

jobs:
  smoke-write-verify-and-rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate verify rollback files
        run: |
          test -f docs/write-verify-and-rollback-plan.md
          test -f backend/contracts/write_verify_rollback.example.json
          test -f backend/app/services/write_verify_rollback_service.py
          test -f backend/app/routes/write_verify_rollback.py
          test -f backend/main.py

      - name: Validate verify rollback markers
        run: |
          grep -q '"verify_run_id": "verify_0001"' backend/contracts/write_verify_rollback.example.json
          grep -q '"final_status": "rolled_back_after_failed_verification"' backend/contracts/write_verify_rollback.example.json
          grep -q "create_verify_run" backend/app/services/write_verify_rollback_service.py
          grep -q "execute_rollback" backend/app/services/write_verify_rollback_service.py
          grep -q "/api/write-verify-rollback" backend/app/routes/write_verify_rollback.py
          grep -q "write_verify_rollback_router" backend/main.py
