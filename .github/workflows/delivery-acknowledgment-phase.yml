name: Delivery Acknowledgment Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/delivery-acknowledgment-plan.md'
      - 'backend/contracts/delivery_acknowledgment.example.json'
      - 'backend/contracts/delivery_ack_event.example.json'
      - 'backend/app/services/delivery_acknowledgment_service.py'
      - 'backend/app/routes/delivery_acknowledgment.py'
      - 'backend/main.py'
      - '.github/workflows/delivery-acknowledgment-phase.yml'

jobs:
  delivery-acknowledgment-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate delivery acknowledgment layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.delivery_acknowledgment_service import delivery_acknowledgment_service

          acknowledgments = delivery_acknowledgment_service.get_acknowledgments()["acknowledgments"]
          first_project_id = acknowledgments[0]["recovery_project_id"]
          events = delivery_acknowledgment_service.get_ack_events(first_project_id)["events"]
          package = delivery_acknowledgment_service.get_ack_package(first_project_id)["package"]
          next_action = delivery_acknowledgment_service.get_next_ack_action()["next_ack_action"]
          route_paths = {route.path for route in app.routes}

          assert acknowledgments, "Expected at least one delivery acknowledgment session"
          assert events, "Expected at least one delivery acknowledgment event"
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/delivery-acknowledgment/status" in route_paths
          assert "/api/delivery-acknowledgment/acknowledgments" in route_paths
          assert "/api/delivery-acknowledgment/events" in route_paths
          assert "/api/delivery-acknowledgment/next-ack-action" in route_paths
          print("delivery acknowledgment phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Delivery Acknowledgment Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for delivery acknowledgment validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
