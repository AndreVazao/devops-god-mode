name: Browser Continuation Execution Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/browser-continuation-execution-plan.md'
      - 'backend/contracts/browser_continuation_execution.example.json'
      - 'backend/contracts/browser_continuation_prompt.example.json'
      - 'backend/app/services/browser_continuation_execution_service.py'
      - 'backend/app/routes/browser_continuation_execution.py'
      - 'backend/main.py'
      - '.github/workflows/browser-continuation-execution-phase.yml'

jobs:
  browser-continuation-execution-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate browser continuation execution layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.browser_continuation_execution_service import browser_continuation_execution_service
          executions = browser_continuation_execution_service.get_executions()["executions"]
          prompts = browser_continuation_execution_service.get_prompts()["prompts"]
          package = browser_continuation_execution_service.get_execution_package()["package"]
          next_action = browser_continuation_execution_service.get_next_execution_action()["next_execution_action"]
          route_paths = {route.path for route in app.routes}
          assert executions
          assert prompts
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/browser-continuation-execution/status" in route_paths
          assert "/api/browser-continuation-execution/executions" in route_paths
          assert "/api/browser-continuation-execution/prompts" in route_paths
          assert "/api/browser-continuation-execution/next-execution-action" in route_paths
          print("browser continuation execution phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Browser Continuation Execution Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Added browser continuation execution sessions and prepared prompt layer.' >> "$GITHUB_STEP_SUMMARY"
