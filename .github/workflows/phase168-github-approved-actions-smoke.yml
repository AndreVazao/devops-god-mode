name: Phase 168 GitHub Approved Actions Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/orchestration/github-approved-actions-executor.md'
      - '.github/workflows/phase168-github-approved-actions-smoke.yml'

jobs:
  phase168-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 168 import, routes and dry-run gates
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          import asyncio
          from pathlib import Path

          from main import app
          from app.services.github_approved_actions_executor_service import github_approved_actions_executor_service
          from app.services.repo_file_patch_hub_service import repo_file_patch_hub_service

          async def main() -> None:
              route_paths = {route.path for route in app.routes}
              required = {
                  "/api/github-approved-actions/status",
                  "/api/github-approved-actions/panel",
                  "/api/github-approved-actions/policy",
                  "/api/github-approved-actions/rules",
                  "/api/github-approved-actions/execute",
                  "/api/github-approved-actions/latest",
                  "/api/github-approved-actions/package",
              }
              missing = sorted(required - route_paths)
              assert not missing, f"Missing Phase 168 routes: {missing}"

              status = github_approved_actions_executor_service.status()
              assert status["ok"] is True
              assert status["merge_allowed"] is False
              assert status["release_allowed"] is False
              assert github_approved_actions_executor_service.PLAYBOOK_ID == "approved_github_patch"

              plan_result = repo_file_patch_hub_service.create_plan(
                  project_id="GOD_MODE",
                  goal="Phase 168 smoke patch",
                  target_repo="AndreVazao/devops-god-mode",
                  base_branch="main",
                  target_branch="phase168-smoke-test-branch",
                  files=[
                      {
                          "path": "docs/orchestration/phase168-smoke.md",
                          "change_type": "create",
                          "new_content": "# Phase 168 Smoke\n\nDry-run only.\n",
                      }
                  ],
                  validation_commands=["documentation review"],
              )
              assert plan_result["ok"] is True
              plan_id = plan_result["plan"]["plan_id"]

              wrong = await github_approved_actions_executor_service.execute(
                  plan_id=plan_id,
                  approval_phrase="WRONG",
                  dry_run=True,
              )
              assert wrong["ok"] is False
              assert wrong["error"] == "approval_phrase_required"

              dry = await github_approved_actions_executor_service.execute(
                  plan_id=plan_id,
                  approval_phrase="APPLY REPO PATCH",
                  dry_run=True,
              )
              assert dry["ok"] is True
              execution = dry["execution"]
              assert execution["dry_run"] is True
              assert execution["status"] == "dry_run_completed"
              assert execution["merge_performed"] is False
              assert execution["release_performed"] is False
              actions = [item["action"] for item in execution["planned_actions"]]
              assert actions == ["ensure_branch", "write_approved_files", "open_pull_request", "wait_for_github_actions"]

              assert Path("docs/orchestration/github-approved-actions-executor.md").exists()
              print("phase 168 github approved actions smoke passed")

          asyncio.run(main())
          PY
