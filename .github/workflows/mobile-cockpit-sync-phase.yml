name: Mobile Cockpit Sync Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/mobile-cockpit-sync-plan.md'
      - 'backend/contracts/mobile_command_sync.example.json'
      - 'backend/contracts/mobile_result_sync.example.json'
      - 'backend/app/services/mobile_cockpit_sync_service.py'
      - 'backend/app/routes/mobile_cockpit_sync.py'
      - 'backend/main.py'
      - '.github/workflows/mobile-cockpit-sync-phase.yml'

jobs:
  mobile-cockpit-sync-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate mobile cockpit sync layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.mobile_cockpit_sync_service import mobile_cockpit_sync_service
          commands = mobile_cockpit_sync_service.get_mobile_commands()["commands"]
          results = mobile_cockpit_sync_service.get_mobile_results()["results"]
          package = mobile_cockpit_sync_service.get_sync_package()["package"]
          next_action = mobile_cockpit_sync_service.get_next_sync_action()["next_sync_action"]
          route_paths = {route.path for route in app.routes}
          assert commands
          assert results
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/mobile-cockpit-sync/status" in route_paths
          assert "/api/mobile-cockpit-sync/commands" in route_paths
          assert "/api/mobile-cockpit-sync/results" in route_paths
          assert "/api/mobile-cockpit-sync/next-sync-action" in route_paths
          print("mobile cockpit sync phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Mobile Cockpit Sync Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Added mobile command intake and result sync layer for the local first runtime.' >> "$GITHUB_STEP_SUMMARY"
