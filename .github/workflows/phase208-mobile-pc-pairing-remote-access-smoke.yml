name: Phase 208 Mobile PC Pairing Remote Access Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/mobile_pc_pairing_remote_access_service.py'
      - 'backend/app/routes/mobile_pc_pairing_remote_access.py'
      - 'backend/app/routes/mobile_pc_pairing_remote_access_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/mobile-pc-pairing-remote-access.md'
      - '.github/workflows/phase208-mobile-pc-pairing-remote-access-smoke.yml'

jobs:
  phase208-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 208 file contract
        run: |
          python - <<'PY'
          from pathlib import Path
          files={
            'service':Path('backend/app/services/mobile_pc_pairing_remote_access_service.py'),
            'route':Path('backend/app/routes/mobile_pc_pairing_remote_access.py'),
            'frontend':Path('backend/app/routes/mobile_pc_pairing_remote_access_frontend.py'),
            'global_state':Path('backend/app/services/god_mode_global_state_service.py'),
            'docs':Path('docs/orchestration/mobile-pc-pairing-remote-access.md'),
          }
          for label,path in files.items():
            assert path.exists(), f'Missing {label}: {path}'
          service=files['service'].read_text(encoding='utf-8')
          for marker in ['class MobilePcPairingRemoteAccessService','create_pairing_session','create_remote_access_plan','connection_manifest','home_urls','remote_access_requires_provider_or_public_url','stores_remote_secrets_in_vault','god_mode_local_vault_service.store_secret','mobile_permission_relay_driver_voice_service.create_permission_request']:
            assert marker in service, marker
          route=files['route'].read_text(encoding='utf-8')
          for endpoint in ['/status','/create-pairing-session','/create-remote-access-plan','/store-remote-material','/connection-manifest','/dashboard','/package']:
            assert endpoint in route, f'Missing endpoint {endpoint}'
          assert 'prefix="/api/mobile-pc-pairing"' in route
          frontend=files['frontend'].read_text(encoding='utf-8')
          for marker in ['Mobile ↔ PC Pairing','/api/mobile-pc-pairing/connection-manifest','/api/mobile-pc-pairing/create-pairing-session','/api/mobile-pc-pairing/create-remote-access-plan','/app/mobile-pc-pairing','/app/connect-phone']:
            assert marker in frontend, marker
          global_state=files['global_state'].read_text(encoding='utf-8')
          for marker in ['current_phase": 208','latest_merged_phase": 207','mobile_pc_pairing_model','/api/mobile-pc-pairing/package','mobile_pc_pairing_route']:
            assert marker in global_state, marker
          docs=files['docs'].read_text(encoding='utf-8')
          for marker in ['/api/mobile-pc-pairing/package','/app/mobile-pc-pairing','Cloudflare Tunnel','Tailscale','connection-manifest','URL HTTPS remoto']:
            assert marker in docs, marker
          phase_workflows=sorted(p.name for p in Path('.github/workflows').glob('phase*-*.yml'))
          assert phase_workflows == ['phase208-mobile-pc-pairing-remote-access-smoke.yml'], phase_workflows
          print('phase 208 mobile pc pairing remote access file contract passed')
          PY
