name: Inter Provider Handoff Adaptation Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/inter-provider-handoff-adaptation-plan.md'
      - 'backend/contracts/inter_provider_handoff.example.json'
      - 'backend/contracts/fragment_adaptation.example.json'
      - 'backend/app/services/inter_provider_handoff_adaptation_service.py'
      - 'backend/app/routes/inter_provider_handoff_adaptation.py'
      - 'backend/main.py'
      - '.github/workflows/inter-provider-handoff-adaptation-phase.yml'

jobs:
  inter-provider-handoff-adaptation-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate inter provider handoff adaptation layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.inter_provider_handoff_adaptation_service import inter_provider_handoff_adaptation_service
          handoffs = inter_provider_handoff_adaptation_service.get_handoffs()["handoffs"]
          adaptations = inter_provider_handoff_adaptation_service.get_fragment_adaptations()["adaptations"]
          package = inter_provider_handoff_adaptation_service.get_handoff_package()["package"]
          next_action = inter_provider_handoff_adaptation_service.get_next_handoff_action()["next_handoff_action"]
          route_paths = {route.path for route in app.routes}
          assert handoffs
          assert adaptations
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/inter-provider-handoff-adaptation/status" in route_paths
          assert "/api/inter-provider-handoff-adaptation/handoffs" in route_paths
          assert "/api/inter-provider-handoff-adaptation/adaptations" in route_paths
          assert "/api/inter-provider-handoff-adaptation/next-handoff-action" in route_paths
          print("inter provider handoff adaptation phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Inter Provider Handoff Adaptation Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Workflow for inter provider handoff adaptation validation.' >> "$GITHUB_STEP_SUMMARY"
