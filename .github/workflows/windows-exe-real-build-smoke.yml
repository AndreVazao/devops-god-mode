name: Windows EXE Real Build Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/windows-exe-real-build'
    paths:
      - 'docs/windows-exe-real-build-plan.md'
      - 'backend/contracts/windows_exe_real_build_profile.example.json'
      - 'desktop/godmode_desktop_launcher.py'
      - 'desktop/GodModeDesktop.spec'
      - '.github/workflows/windows-exe-real-build.yml'
      - '.github/workflows/windows-exe-real-build-smoke.yml'

jobs:
  smoke-windows-exe-real-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Windows EXE real build files
        run: |
          test -f docs/windows-exe-real-build-plan.md
          test -f backend/contracts/windows_exe_real_build_profile.example.json
          test -f desktop/godmode_desktop_launcher.py
          test -f desktop/GodModeDesktop.spec
          test -f .github/workflows/windows-exe-real-build.yml

      - name: Validate Windows EXE real build markers
        run: |
          grep -q '"entry_script": "desktop/godmode_desktop_launcher.py"' backend/contracts/windows_exe_real_build_profile.example.json
          grep -q '"packaging_tool": "pyinstaller_onefile_windowed"' backend/contracts/windows_exe_real_build_profile.example.json
          grep -q "desktop_runtime_config.json" desktop/godmode_desktop_launcher.py
          grep -q "webbrowser.open" desktop/godmode_desktop_launcher.py
          grep -q "GodModeDesktop.spec" .github/workflows/windows-exe-real-build.yml
          grep -q "pyinstaller --clean --noconfirm" .github/workflows/windows-exe-real-build.yml
