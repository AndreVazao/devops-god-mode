name: Autonomous Project Continuation Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/autonomous-project-continuation-plan.md'
      - 'backend/contracts/autonomous_continuation.example.json'
      - 'backend/contracts/continuation_action.example.json'
      - 'backend/app/services/autonomous_project_continuation_service.py'
      - 'backend/app/routes/autonomous_project_continuation.py'
      - 'backend/main.py'
      - '.github/workflows/autonomous-project-continuation-phase.yml'

jobs:
  autonomous-project-continuation-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate autonomous project continuation layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.autonomous_project_continuation_service import autonomous_project_continuation_service
          continuations = autonomous_project_continuation_service.get_continuations()["continuations"]
          actions = autonomous_project_continuation_service.get_continuation_actions()["actions"]
          package = autonomous_project_continuation_service.get_continuation_package()["package"]
          next_action = autonomous_project_continuation_service.get_next_continuation_action()["next_continuation_action"]
          route_paths = {route.path for route in app.routes}
          assert continuations
          assert actions
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/autonomous-project-continuation/status" in route_paths
          assert "/api/autonomous-project-continuation/continuations" in route_paths
          assert "/api/autonomous-project-continuation/actions" in route_paths
          assert "/api/autonomous-project-continuation/next-continuation-action" in route_paths
          print("autonomous project continuation phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Autonomous Project Continuation Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Added autonomous continuation sessions and continuation action layer.' >> "$GITHUB_STEP_SUMMARY"
