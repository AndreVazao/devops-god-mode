name: Prune Old Artifacts Across Repos

on:
  workflow_dispatch:
    inputs:
      owner:
        description: GitHub owner/org to scan
        required: false
        default: AndreVazao
      older_than_days:
        description: Delete artifacts older than this many days
        required: false
        default: '3'
      keep_newest:
        description: Keep at least this many newest artifacts per repo
        required: false
        default: '5'
      repo_visibility:
        description: all, public, private
        required: false
        default: all
  schedule:
    - cron: '43 3 * * *'

jobs:
  prune-across-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Validate token secret
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          if [ -z "$GH_ADMIN_TOKEN" ]; then
            echo "Missing secret GH_ADMIN_TOKEN"
            exit 1
          fi

      - name: Prune old artifacts across repositories
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          OWNER: ${{ inputs.owner || 'AndreVazao' }}
          OLDER_THAN_DAYS: ${{ inputs.older_than_days || '2' }}
          KEEP_NEWEST: ${{ inputs.keep_newest || '2' }}
          REPO_VISIBILITY: ${{ inputs.repo_visibility || 'all' }}
        run: |
          set -euo pipefail

          api() {
            local method="$1"
            local url="$2"
            curl -sS -L \
              -X "$method" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_ADMIN_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url"
          }

          cutoff_epoch=$(date -u -d "-${OLDER_THAN_DAYS} days" +%s)
          page=1
          repos_json="[]"

          while true; do
            batch=$(api GET "https://api.github.com/user/repos?affiliation=owner,collaborator,organization_member&per_page=100&page=${page}")
            count=$(echo "$batch" | jq 'length')
            if [ "$count" -eq 0 ]; then
              break
            fi
            filtered=$(echo "$batch" | jq --arg owner "$OWNER" --arg visibility "$REPO_VISIBILITY" '
              map(select(.owner.login == $owner))
              | if $visibility == "public" then map(select(.private == false))
                elif $visibility == "private" then map(select(.private == true))
                else . end
            ')
            repos_json=$(jq -s '.[0] + .[1]' <(echo "$repos_json") <(echo "$filtered"))
            page=$((page + 1))
          done

          repo_count=$(echo "$repos_json" | jq 'length')
          echo "Repositories selected: $repo_count"

          if [ "$repo_count" -eq 0 ]; then
            echo "No repositories matched filters."
            exit 0
          fi

          deleted_total=0

          for full_name in $(echo "$repos_json" | jq -r '.[].full_name'); do
            echo "---"
            echo "Processing $full_name"

            artifact_page=1
            repo_artifacts='[]'

            while true; do
              artifact_batch=$(api GET "https://api.github.com/repos/${full_name}/actions/artifacts?per_page=100&page=${artifact_page}")
              batch_count=$(echo "$artifact_batch" | jq '.artifacts | length')
              if [ "$batch_count" -eq 0 ]; then
                break
              fi
              repo_artifacts=$(jq -s '.[0] + .[1]' <(echo "$repo_artifacts") <(echo "$artifact_batch" | jq '.artifacts'))
              artifact_page=$((artifact_page + 1))
            done

            total=$(echo "$repo_artifacts" | jq 'length')
            echo "Artifacts found: $total"

            if [ "$total" -eq 0 ]; then
              continue
            fi

            to_delete=$(echo "$repo_artifacts" | jq --argjson cutoff "$cutoff_epoch" --argjson keep "$KEEP_NEWEST" '
              map(select(.expired == false))
              | sort_by(.created_at) | reverse
              | to_entries
              | map(select(.key >= $keep))
              | map(.value)
              | map(select((.created_at | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601) < $cutoff))
            ')

            delete_count=$(echo "$to_delete" | jq 'length')
            echo "Artifacts selected for deletion: $delete_count"

            if [ "$delete_count" -eq 0 ]; then
              continue
            fi

            for artifact_id in $(echo "$to_delete" | jq -r '.[].id'); do
              echo "Deleting artifact $artifact_id from $full_name"
              api DELETE "https://api.github.com/repos/${full_name}/actions/artifacts/${artifact_id}" > /dev/null
              deleted_total=$((deleted_total + 1))
            done
          done

          echo "Deleted artifacts total: $deleted_total"
