name: Local Runtime Dominance Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/local-runtime-dominance-plan.md'
      - 'backend/contracts/local_runtime_dominance.example.json'
      - 'backend/contracts/local_runtime_action.example.json'
      - 'backend/app/services/local_runtime_dominance_service.py'
      - 'backend/app/routes/local_runtime_dominance.py'
      - 'backend/main.py'
      - '.github/workflows/local-runtime-dominance-phase.yml'

jobs:
  local-runtime-dominance-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate local runtime dominance layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.local_runtime_dominance_service import local_runtime_dominance_service
          surfaces = local_runtime_dominance_service.get_dominance_surfaces()["surfaces"]
          actions = local_runtime_dominance_service.get_runtime_actions()["actions"]
          package = local_runtime_dominance_service.get_dominance_package()["package"]
          next_action = local_runtime_dominance_service.get_next_runtime_action()["next_runtime_action"]
          route_paths = {route.path for route in app.routes}
          assert surfaces
          assert actions
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/local-runtime-dominance/status" in route_paths
          assert "/api/local-runtime-dominance/surfaces" in route_paths
          assert "/api/local-runtime-dominance/actions" in route_paths
          assert "/api/local-runtime-dominance/next-runtime-action" in route_paths
          print("local runtime dominance phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Local Runtime Dominance Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Workflow for local runtime dominance validation.' >> "$GITHUB_STEP_SUMMARY"
