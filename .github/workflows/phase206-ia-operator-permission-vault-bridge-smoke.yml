name: Phase 206 IA Operator Permission Vault Bridge Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/ia_operator_permission_vault_bridge_service.py'
      - 'backend/app/routes/ia_operator_permission_vault_bridge.py'
      - 'backend/app/routes/ia_operator_permission_vault_bridge_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/ia-operator-permission-vault-bridge.md'
      - '.github/workflows/phase206-ia-operator-permission-vault-bridge-smoke.yml'

jobs:
  phase206-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 206 file contract
        run: |
          python - <<'PY'
          from pathlib import Path
          files={
            'service':Path('backend/app/services/ia_operator_permission_vault_bridge_service.py'),
            'route':Path('backend/app/routes/ia_operator_permission_vault_bridge.py'),
            'frontend':Path('backend/app/routes/ia_operator_permission_vault_bridge_frontend.py'),
            'global_state':Path('backend/app/services/god_mode_global_state_service.py'),
            'docs':Path('docs/orchestration/ia-operator-permission-vault-bridge.md'),
          }
          for label,path in files.items():
            assert path.exists(), f'Missing {label}: {path}'
          service=files['service'].read_text(encoding='utf-8')
          for marker in ['class IaOperatorPermissionVaultBridgeService','start_first_autonomous_work_loop','bind_packet_to_vault_or_permission','ingest_provider_response_and_continue','can_start_first_autonomous_work_loop','can_use_vault_references','can_request_mobile_permission','god_mode_local_vault_service.list_references','mobile_permission_relay_driver_voice_service.create_permission_request']:
            assert marker in service, marker
          route=files['route'].read_text(encoding='utf-8')
          for endpoint in ['/status','/policy','/start-loop','/bind-packet','/continue-with-note','/dashboard','/package']:
            assert endpoint in route, f'Missing endpoint {endpoint}'
          assert 'prefix="/api/ia-operator-bridge"' in route
          frontend=files['frontend'].read_text(encoding='utf-8')
          for marker in ['IA Operator Bridge','/api/ia-operator-bridge/start-loop','/api/ia-operator-bridge/continue-with-note','/app/ia-operator-bridge','/app/first-autonomous-work-loop']:
            assert marker in frontend, marker
          global_state=files['global_state'].read_text(encoding='utf-8')
          for marker in ['current_phase": 206','latest_merged_phase": 205','ia_operator_bridge_model','/api/ia-operator-bridge/package','ia_operator_bridge_route']:
            assert marker in global_state, marker
          docs=files['docs'].read_text(encoding='utf-8')
          for marker in ['/api/ia-operator-bridge/package','/app/ia-operator-bridge','Vault reference binding','Mobile permission','First Autonomous Work Loop']:
            assert marker in docs, marker
          phase_workflows=sorted(p.name for p in Path('.github/workflows').glob('phase*-*.yml'))
          assert phase_workflows == ['phase206-ia-operator-permission-vault-bridge-smoke.yml'], phase_workflows
          print('phase 206 bridge file contract passed')
          PY
