name: Adaptation Planner And Target Fit Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/adaptation-planner-and-target-fit-plan.md'
      - 'backend/contracts/adaptation_plan_item.example.json'
      - 'backend/contracts/target_fit_item.example.json'
      - 'backend/app/services/adaptation_planner_service.py'
      - 'backend/app/routes/adaptation_planner.py'
      - 'backend/app/services/script_extraction_reuse_service.py'
      - 'backend/main.py'
      - '.github/workflows/adaptation-planner-and-target-fit-smoke.yml'

jobs:
  adaptation-planner-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Smoke import adaptation planner
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from app.services.adaptation_planner_service import adaptation_planner_service
          from main import app

          plans = adaptation_planner_service.get_adaptation_plans()["adaptation_plans"]
          best_plans = adaptation_planner_service.get_best_plans()["best_plans"]
          target_fits = adaptation_planner_service.get_target_fit()["target_fits"]
          blockers = adaptation_planner_service.get_blockers()["blockers"]
          route_paths = {route.path for route in app.routes}

          assert plans, "Adaptation plans should not be empty"
          assert best_plans, "Best adaptation plans should not be empty"
          assert target_fits, "Target fit summaries should not be empty"
          assert blockers, "Adaptation blockers should not be empty"
          assert "/api/adaptation-planner/status" in route_paths
          assert "/api/adaptation-planner/plans" in route_paths
          assert "/api/adaptation-planner/target-fit" in route_paths
          assert "/api/adaptation-planner/best-plans" in route_paths
          assert "/api/adaptation-planner/blockers" in route_paths
          assert all("source_script_id" in plan for plan in plans)
          print("adaptation planner smoke passed")
          PY

      - name: Build summary
        run: |
          echo '## Adaptation Planner Smoke Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Adaptation planner service imported successfully.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Route registration was verified in FastAPI app.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Plans, best plans, target fit, and blockers returned non-empty payloads.' >> "$GITHUB_STEP_SUMMARY"
