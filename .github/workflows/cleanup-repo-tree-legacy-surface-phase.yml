name: Cleanup Repo Tree Legacy Surface Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/cleanup-repo-tree-legacy-surface-plan.md'
      - '.github/workflows/cleanup-repo-tree-legacy-surface-phase.yml'

jobs:
  cleanup-repo-tree-legacy-surface-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate removed repo tree legacy routes
        run: |
          test ! -f backend/app/routes/repo_tree.py
          test ! -f backend/app/routes/repo_tree_v2.py
          test ! -f backend/app/routes/repo_tree_v3.py
          test ! -f backend/app/routes/repo_tree_v4.py
          test ! -f backend/app/routes/repo_tree_v5.py

      - name: Build summary
        run: |
          echo '## Cleanup Repo Tree Legacy Surface Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed legacy repo tree HTTP route surfaces no longer wired into backend/main.py.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Next cleanup should sweep repo_tree services and helpers before deleting deeper versioned internals.' >> "$GITHUB_STEP_SUMMARY"
