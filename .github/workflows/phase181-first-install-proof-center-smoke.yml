name: Phase 181 First Install PC Proof Center Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/first_install_pc_proof_center.py'
      - 'backend/app/services/first_install_pc_proof_center_service.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/first-install-pc-proof-center.md'
      - '.github/workflows/phase181-first-install-proof-center-smoke.yml'

jobs:
  phase181-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 181 first install PC proof center
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.first_install_pc_proof_center_service import first_install_pc_proof_center_service
          from app.services.god_mode_global_state_service import god_mode_global_state_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/first-install-pc-proof-center/status",
              "/api/first-install-pc-proof-center/artifacts",
              "/api/first-install-pc-proof-center/commands",
              "/api/first-install-pc-proof-center/checklist",
              "/api/first-install-pc-proof-center/cards",
              "/api/first-install-pc-proof-center/package",
              "/api/first-install-pc-proof-center/app",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 181 routes: {missing}"

          status = first_install_pc_proof_center_service.status()
          assert status["ok"] is True
          assert status["primary_route"] == "/api/first-install-pc-proof-center/package"
          assert status["total_items"] >= 10

          package = first_install_pc_proof_center_service.package(include_verbose=False)
          assert package["ok"] is True
          assert package["mission"]["id"] == "first_real_install_pc_provider_proof"
          assert len(package["checklist"]) >= 10
          assert any(item["id"] == "download_artifacts" for item in package["checklist"])
          assert any(item["id"] == "pc_provider_proof" for item in package["operator_cards"])
          assert package["artifacts"]["windows_workflow_url"].endswith("windows-exe-real-build.yml")
          assert package["artifacts"]["android_workflow_url"].endswith("android-real-build-progressive.yml")
          assert len(package["pc_provider_commands"]["commands"]) >= 4
          assert any(cmd["provider"] == "chatgpt" for cmd in package["pc_provider_commands"]["commands"])

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 180
          assert global_status["current_phase"] == 181
          assert global_status["first_install_pc_proof_endpoint"] == "/api/first-install-pc-proof-center/package"
          assert global_status["first_install_pc_proof_page"] == "/api/first-install-pc-proof-center/app"

          global_package = god_mode_global_state_service.package()
          assert global_package["first_install_pc_proof_model"]["page"] == "/api/first-install-pc-proof-center/app"
          assert any(item["phase"] == 181 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          docs = Path("docs/orchestration/first-install-pc-proof-center.md").read_text(encoding="utf-8")
          assert "/api/first-install-pc-proof-center/app" in docs
          assert "Fluxo amanhã no PC" in docs
          assert "Não guarda credenciais" in docs

          print("phase 181 first install pc proof center smoke passed")
          PY
