name: Phase 170 Local Knowledge RAG Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/orchestration/local-knowledge-rag-decision-v1.md'
      - '.github/workflows/phase170-local-knowledge-rag-smoke.yml'

jobs:
  phase170-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 170 import, routes, index, search and decision
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.local_knowledge_rag_decision_service import local_knowledge_rag_decision_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/local-knowledge-rag/status",
              "/api/local-knowledge-rag/panel",
              "/api/local-knowledge-rag/policy",
              "/api/local-knowledge-rag/rules",
              "/api/local-knowledge-rag/build-index",
              "/api/local-knowledge-rag/search",
              "/api/local-knowledge-rag/reuse-check",
              "/api/local-knowledge-rag/decision",
              "/api/local-knowledge-rag/latest",
              "/api/local-knowledge-rag/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 170 routes: {missing}"

          status = local_knowledge_rag_decision_service.status()
          assert status["ok"] is True
          assert status["index_mode"] == "lexical_local_first_v1"
          assert status["embedding_required"] is False

          index = local_knowledge_rag_decision_service.build_index(
              project_name="GOD_MODE",
              roots=[
                  {"root": "backend/app/services", "source_type": "repo_backend_code", "priority": 4},
                  {"root": "docs/orchestration", "source_type": "repo_docs", "priority": 4},
              ],
              max_items=200,
          )
          assert index["ok"] is True
          assert index["index"]["item_count"] > 0

          search = local_knowledge_rag_decision_service.search(
              query="memory sync runtime",
              project_name="GOD_MODE",
              index_id=index["index"]["index_id"],
              build_if_missing=False,
              limit=8,
          )
          assert search["ok"] is True
          assert search["search"]["result_count"] > 0

          blocked = local_knowledge_rag_decision_service.search(
              query="OPENAI_API_KEY=should_not_leak",
              project_name="GOD_MODE",
              index_id=index["index"]["index_id"],
              build_if_missing=False,
              limit=3,
          )
          assert blocked["ok"] is True
          assert "should_not_leak" not in blocked["search"]["query"]

          reuse = local_knowledge_rag_decision_service.reuse_check(
              capability_name="fastapi",
              target_project="GOD_MODE",
              limit=5,
          )
          assert reuse["ok"] is True
          assert reuse["candidate_count"] >= 1
          assert reuse["recommendation"] == "reuse_or_adapt_existing"

          decision = local_knowledge_rag_decision_service.decision(
              goal="Create a memory aware FastAPI route without duplicating existing services",
              project_name="GOD_MODE",
              capability_name="fastapi",
              limit=5,
          )
          assert decision["ok"] is True
          payload = decision["decision"]
          assert payload["decision_status"] in {"reuse_first", "new_code_allowed_after_no_reuse_found"}
          assert payload["safe_for_external_ai"] is False
          assert payload["context_pack_id"]
          assert payload["next_actions"]

          assert Path("docs/orchestration/local-knowledge-rag-decision-v1.md").exists()
          print("phase 170 local knowledge rag smoke passed")
          PY
