name: Prune Old Artifacts

on:
  workflow_dispatch:
    inputs:
      older_than_days:
        description: Delete artifacts older than this many days
        required: false
        default: '3'
      keep_newest:
        description: Keep at least this many newest artifacts regardless of age
        required: false
        default: '5'
  schedule:
    - cron: '17 3 * * *'

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const olderThanDays = Number(core.getInput('older_than_days') || '3');
            const keepNewest = Number(core.getInput('keep_newest') || '5');
            const now = Date.now();
            const cutoff = now - (olderThanDays * 24 * 60 * 60 * 1000);

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            const activeArtifacts = artifacts
              .filter(a => !a.expired)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const protectedIds = new Set(activeArtifacts.slice(0, keepNewest).map(a => a.id));
            const toDelete = activeArtifacts.filter(a => {
              if (protectedIds.has(a.id)) return false;
              return new Date(a.created_at).getTime() < cutoff;
            });

            core.info(`Total active artifacts: ${activeArtifacts.length}`);
            core.info(`Protected newest artifacts: ${protectedIds.size}`);
            core.info(`Artifacts selected for deletion: ${toDelete.length}`);

            for (const artifact of toDelete) {
              core.info(`Deleting artifact #${artifact.id} ${artifact.name} created at ${artifact.created_at}`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }

            core.setOutput('deleted_count', String(toDelete.length));

      - name: Summary
        run: echo "Artifact cleanup finished."
