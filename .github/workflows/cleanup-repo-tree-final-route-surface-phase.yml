name: Cleanup Repo Tree Final Route Surface Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/cleanup-repo-tree-final-route-surface-plan.md'
      - '.github/workflows/cleanup-repo-tree-final-route-surface-phase.yml'

jobs:
  cleanup-repo-tree-final-route-surface-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate removed repo tree final legacy routes
        run: |
          test ! -f backend/app/routes/repo_tree_v6.py
          test ! -f backend/app/routes/repo_tree_v7.py
          test ! -f backend/app/routes/repo_tree_v8.py
          test ! -f backend/app/routes/repo_tree_v9.py
          test ! -f backend/app/routes/repo_tree_v10.py
          test ! -f backend/app/routes/repo_tree_v11.py
          test ! -f backend/app/routes/repo_tree_v12.py
          test ! -f backend/app/routes/repo_tree_v13.py

      - name: Build summary
        run: |
          echo '## Cleanup Repo Tree Final Route Surface Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed remaining legacy repo tree HTTP route surfaces no longer wired into backend/main.py.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Next cleanup should sweep repo_tree services and helper families before deleting deeper versioned internals.' >> "$GITHUB_STEP_SUMMARY"
