name: Browser Conversation Intake Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/browser-conversation-intake'
    paths:
      - 'docs/browser-conversation-intake-plan.md'
      - 'backend/contracts/browser_conversation_intake.example.json'
      - 'backend/app/services/browser_conversation_intake_service.py'
      - 'backend/app/routes/browser_conversation_intake.py'
      - 'backend/main.py'
      - '.github/workflows/browser-conversation-intake-smoke.yml'

jobs:
  smoke-browser-conversation-intake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate intake files
        run: |
          test -f docs/browser-conversation-intake-plan.md
          test -f backend/contracts/browser_conversation_intake.example.json
          test -f backend/app/services/browser_conversation_intake_service.py
          test -f backend/app/routes/browser_conversation_intake.py
          test -f backend/main.py

      - name: Validate intake markers
        run: |
          grep -q '"session_id": "intake_0001"' backend/contracts/browser_conversation_intake.example.json
          grep -q '"capture_status": "capturing"' backend/contracts/browser_conversation_intake.example.json
          grep -q "create_session" backend/app/services/browser_conversation_intake_service.py
          grep -q "append_capture" backend/app/services/browser_conversation_intake_service.py
          grep -q "/api/browser-intake" backend/app/routes/browser_conversation_intake.py
          grep -q "browser_conversation_intake_router" backend/main.py
