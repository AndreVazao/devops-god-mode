name: Desktop APK Packaging Foundation Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/desktop-apk-packaging-foundation'
    paths:
      - 'docs/desktop-apk-packaging-foundation-plan.md'
      - 'backend/contracts/packaging_build_profile.example.json'
      - 'backend/contracts/runtime_topology_profile.example.json'
      - 'backend/app/services/packaging_foundation_service.py'
      - 'backend/app/routes/packaging_foundation.py'
      - 'backend/main.py'
      - '.github/workflows/desktop-apk-packaging-foundation-smoke.yml'
      - '.github/workflows/god-mode-unified-validation.yml'

jobs:
  smoke-desktop-apk-packaging-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate packaging foundation files
        run: |
          test -f docs/desktop-apk-packaging-foundation-plan.md
          test -f backend/contracts/packaging_build_profile.example.json
          test -f backend/contracts/runtime_topology_profile.example.json
          test -f backend/app/services/packaging_foundation_service.py
          test -f backend/app/routes/packaging_foundation.py
          test -f backend/main.py

      - name: Validate packaging foundation markers
        run: |
          grep -q '"target_platform": "windows_desktop"' backend/contracts/packaging_build_profile.example.json
          grep -q '"artifact_type": ".exe"' backend/contracts/packaging_build_profile.example.json
          grep -q '"remote_client": "android_phone"' backend/contracts/runtime_topology_profile.example.json
          grep -q '"render_role": "temporary_test_only"' backend/contracts/runtime_topology_profile.example.json
          grep -q "pkg_windows_desktop" backend/app/services/packaging_foundation_service.py
          grep -q "pkg_android_cockpit" backend/app/services/packaging_foundation_service.py
          grep -q "/api/packaging-foundation" backend/app/routes/packaging_foundation.py
          grep -q "packaging_foundation_router" backend/main.py
