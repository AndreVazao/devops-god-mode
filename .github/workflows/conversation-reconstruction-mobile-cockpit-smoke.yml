name: Conversation Reconstruction Mobile Cockpit Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/conversation-to-repo-reconstruction'
    paths:
      - 'frontend/mobile-shell/index.html'
      - 'frontend/mobile-shell/app.js'
      - 'frontend/mobile-shell/styles.css'
      - '.github/workflows/conversation-reconstruction-mobile-cockpit-smoke.yml'

jobs:
  smoke-conversation-reconstruction-mobile-cockpit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate reconstruction cockpit markers
        run: |
          grep -q "Reconstruções" frontend/mobile-shell/index.html
          grep -q "refreshReconstructionsBtn" frontend/mobile-shell/index.html
          grep -q "reconstructionCards" frontend/mobile-shell/index.html
          grep -q "refreshReconstructions" frontend/mobile-shell/app.js
          grep -q "syncReconstruction" frontend/mobile-shell/app.js
          grep -q "/api/conversation-reconstruction/proposals" frontend/mobile-shell/app.js
          grep -q "reconstruction-card" frontend/mobile-shell/styles.css
          grep -q "reconstruction-card-top" frontend/mobile-shell/styles.css
