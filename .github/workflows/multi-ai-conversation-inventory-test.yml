name: Multi-AI Conversation Inventory Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase27-*'
    paths:
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/multi-ai-conversation-inventory-test.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/**'
      - '.github/workflows/multi-ai-conversation-inventory-test.yml'

jobs:
  multi-ai-conversation-inventory-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate multi-AI inventory routes and project mapping
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.multi_ai_conversation_inventory_service import multi_ai_conversation_inventory_service
          from app.services.operator_command_intake_service import operator_command_intake_service
          from app.services.tenant_partition_service import tenant_partition_service

          route_paths = {route.path for route in app.routes}
          required_routes = {
              "/api/multi-ai-conversation-inventory/status",
              "/api/multi-ai-conversation-inventory/package",
              "/api/multi-ai-conversation-inventory/stage",
              "/api/multi-ai-conversation-inventory/seed-from-command",
              "/api/multi-ai-conversation-inventory/conversations",
              "/api/multi-ai-conversation-inventory/project-map",
              "/api/multi-ai-conversation-inventory/dashboard",
              "/app/multi-ai-conversation-inventory",
          }
          missing = sorted(required_routes - route_paths)
          assert not missing, f"Missing routes: {missing}"

          tenant_partition_service.upsert_tenant(
              tenant_id="owner-andre",
              owner_type="self",
              display_name="André",
              repo_scope_mode="private_default",
              provider_scope_mode="private_default",
              vault_namespace="vault/owner-andre",
              notes="multi ai inventory validation tenant",
          )

          command_result = operator_command_intake_service.submit_command(
              tenant_id="owner-andre",
              project_hint="baribudos-studio",
              source_channel="mobile_chat",
              command_text="Audita o Baribudos Studio e o Website e cruza conversas do ChatGPT e Claude.",
          )
          assert command_result["ok"] is True

          staged = multi_ai_conversation_inventory_service.stage_conversation(
              provider="chatgpt",
              title="Baribudos Studio Website cockpit backend audit",
              snippet="Projeto Next.js com FastAPI backend, website, studio cockpit, GitHub Actions build e Supabase secrets.",
              project_hint=None,
              tenant_id="owner-andre",
          )
          assert staged["ok"] is True
          conversation = staged["conversation"]
          assert conversation["provider"] == "chatgpt"
          assert conversation["project"]["project_id"] == "baribudos-studio"
          assert "website" in conversation["repo_roles"]
          assert "studio" in conversation["repo_roles"]
          assert "backend" in conversation["repo_roles"]
          assert "workflow" in conversation["repo_roles"]
          assert "vault" in conversation["repo_roles"]
          assert "python" in conversation["languages"]
          assert "typescript" in conversation["languages"]

          seeded = multi_ai_conversation_inventory_service.seed_from_operator_command(
              command_id=command_result["command"]["command_id"],
              tenant_id="owner-andre",
          )
          assert seeded["ok"] is True

          conversations = multi_ai_conversation_inventory_service.list_conversations(
              tenant_id="owner-andre",
              project_id="baribudos-studio",
          )
          project_map = multi_ai_conversation_inventory_service.build_project_map(tenant_id="owner-andre")
          dashboard = multi_ai_conversation_inventory_service.build_inventory_dashboard(tenant_id="owner-andre")

          assert conversations["conversation_count"] >= 2
          assert project_map["project_count"] >= 1
          assert dashboard["conversation_count"] >= 2
          assert dashboard["provider_counts"].get("chatgpt", 0) >= 1
          assert Path("data/multi_ai_conversation_inventory.json").exists()
          assert Path("backend/app/services/multi_ai_conversation_inventory_service.py").exists()
          assert Path("backend/app/routes/multi_ai_conversation_inventory.py").exists()
          assert Path("backend/app/routes/multi_ai_conversation_inventory_frontend.py").exists()
          assert Path("docs/frontend/multi-ai-conversation-inventory.md").exists()

          print("multi ai conversation inventory test passed")
          PY

      - name: Build summary
        run: |
          echo '## Multi-AI Conversation Inventory Test Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Multi-AI inventory routes were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Conversation staging and command seeding were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Project mapping, repo roles and dashboard aggregation were validated.' >> "$GITHUB_STEP_SUMMARY"
