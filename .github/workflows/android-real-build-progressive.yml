# Canonical Android placeholder workflow.
# Keep this as the single Android placeholder pipeline until the real APK build replaces it.
name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'backend/app/**'
      - 'backend/contracts/**'
      - 'docs/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/**'
      - 'backend/contracts/**'
      - 'docs/**'
      - '.github/workflows/**'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Android output structure
        run: |
          mkdir -p dist/android
          mkdir -p android-config

      - name: Generate Android config
        run: |
          cat > android-config/android-manifest.json <<'JSON'
          {
            "pipeline": "android_real_build_progressive",
            "topology": "pc_and_phone_primary",
            "artifact": "GodModeMobile.apk",
            "artifact_kind": "placeholder",
            "build_truth": "not_a_real_apk_yet"
          }
          JSON
          cat > android-config/android-config.json <<'JSON'
          {
            "runtime_binding": "pc_and_phone_primary",
            "pairing_support": "qr_or_code",
            "stage_mode": "progressive",
            "build_mode": "placeholder_only"
          }
          JSON
          cat > android-config/android-runtime.json <<'JSON'
          {
            "runtime_shell": "android_runtime_shell",
            "shell_status": "runtime_shell_ready",
            "build_mode": "placeholder_pipeline_progressive"
          }
          JSON
          cat > android-config/android-pairing.json <<'JSON'
          {
            "pairing_mode": "qr_or_code",
            "topology_binding": "pc_and_phone_primary",
            "pairing_status": "planned",
            "build_truth": "placeholder"
          }
          JSON

      - name: Build Android placeholder artifact
        run: |
          printf 'God Mode Android placeholder artifact. Not a real APK build yet.\n' > dist/android/GodModeMobile.apk
          cp android-config/android-manifest.json dist/android/android-manifest.json
          cp android-config/android-config.json dist/android/android-config.json
          cp android-config/android-runtime.json dist/android/android-runtime.json
          cp android-config/android-pairing.json dist/android/android-pairing.json
          ls -la dist/android

      - name: Verify placeholder files exist
        run: |
          test -f dist/android/GodModeMobile.apk
          test -f dist/android/android-manifest.json
          test -f dist/android/android-config.json
          test -f dist/android/android-runtime.json
          test -f dist/android/android-pairing.json

      - name: Upload artifact if quota allows
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: godmode-android-apk-placeholder
          path: |
            dist/android/GodModeMobile.apk
            dist/android/android-manifest.json
            dist/android/android-config.json
            dist/android/android-runtime.json
            dist/android/android-pairing.json

      - name: Build summary
        run: |
          echo '## Android APK Build Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow is still a placeholder pipeline, not a real APK build.' >> "$GITHUB_STEP_SUMMARY"
          echo '- The trigger scope was generalized so future phases can reuse the same workflow without phase-specific workflow churn.' >> "$GITHUB_STEP_SUMMARY"
          echo '- A placeholder Android artifact was created in `dist/android/GodModeMobile.apk`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Android manifest/config/runtime/pairing files were created in `dist/android/`.' >> "$GITHUB_STEP_SUMMARY"
