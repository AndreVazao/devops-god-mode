# Canonical Android APK build workflow.
# Builds the real God Mode WebView shell APK from android-app/.
name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
      - 'phase68-*'
    paths:
      - 'android-app/**'
      - 'backend/app/**'
      - 'backend/contracts/**'
      - 'docs/**'
      - '.github/workflows/android-real-build-progressive.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android-app/**'
      - 'backend/app/**'
      - 'backend/contracts/**'
      - 'docs/**'
      - '.github/workflows/android-real-build-progressive.yml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build real WebView APK
        working-directory: android-app
        run: gradle --no-daemon :app:assembleDebug

      - name: Prepare Android artifact bundle
        run: |
          mkdir -p dist/android
          cp android-app/app/build/outputs/apk/debug/app-debug.apk dist/android/GodModeMobile-debug.apk
          cat > dist/android/android-build-truth.json <<'JSON'
          {
            "pipeline": "android_real_build_progressive",
            "artifact": "GodModeMobile-debug.apk",
            "artifact_kind": "real_debug_apk",
            "build_truth": "real_webview_shell_apk",
            "entry_route": "/app/apk-start",
            "default_base_url": "http://127.0.0.1:8000",
            "operator_note": "Debug APK for first controlled local testing. Enter the PC backend URL in the APK field when using a physical phone."
          }
          JSON
          cat > dist/android/android-install-readme.txt <<'TXT'
          God Mode Mobile - Real WebView Shell APK

          Artifact: GodModeMobile-debug.apk
          Type: real debug APK
          Entry route: /app/apk-start
          Default URL inside APK: http://127.0.0.1:8000

          On a physical phone, replace the base URL in the APK with your PC backend URL, for example:
          http://192.168.1.50:8000

          This APK is for controlled first-use testing. Do not put passwords, tokens, cookies or API keys in chat.
          TXT
          ls -la dist/android

      - name: Verify real APK files exist
        run: |
          test -f dist/android/GodModeMobile-debug.apk
          test -f dist/android/android-build-truth.json
          test -f dist/android/android-install-readme.txt
          python - <<'PY'
          from pathlib import Path
          apk = Path('dist/android/GodModeMobile-debug.apk')
          assert apk.stat().st_size > 1024, 'APK artifact is too small to be a real APK'
          truth = Path('dist/android/android-build-truth.json').read_text(encoding='utf-8')
          assert 'real_webview_shell_apk' in truth
          assert 'placeholder' not in truth.lower()
          PY

      - name: Upload Android APK artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: godmode-android-webview-apk
          path: |
            dist/android/GodModeMobile-debug.apk
            dist/android/android-build-truth.json
            dist/android/android-install-readme.txt

      - name: Build summary
        run: |
          echo '## Android APK Build Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow now builds a real Android debug APK WebView shell.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Artifact: `godmode-android-webview-apk`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- APK file: `GodModeMobile-debug.apk`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Entry route: `/app/apk-start`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- On a physical phone, set the base URL to the PC backend URL, for example `http://192.168.1.50:8000`.' >> "$GITHUB_STEP_SUMMARY"
