# Canonical Android APK build workflow.
# Keep this as the single main Android build pipeline.
name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/android-real-build-progressive-plan.md'
      - 'docs/android-progressive-runtime-binding-plan.md'
      - 'docs/canonical-build-and-test-workflows.md'
      - 'backend/contracts/android_progressive_stage.example.json'
      - 'backend/contracts/android_progressive_artifact.example.json'
      - 'backend/contracts/android_progressive_runtime_binding.example.json'
      - 'backend/contracts/android_progressive_pairing_asset.example.json'
      - 'backend/app/services/android_real_build_progressive_service.py'
      - 'backend/app/services/android_progressive_runtime_binding_service.py'
      - 'backend/app/routes/android_real_build_progressive.py'
      - 'backend/app/routes/android_progressive_runtime_binding.py'
      - 'backend/main.py'
      - '.github/workflows/android-real-build-progressive.yml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Android output structure
        run: |
          mkdir -p dist/android
          mkdir -p android-config

      - name: Generate Android config
        run: |
          cat > android-config/android-manifest.json <<'JSON'
          {
            "pipeline": "android_real_build_progressive",
            "topology": "pc_and_phone_primary",
            "artifact": "GodModeMobile.apk"
          }
          JSON
          cat > android-config/android-config.json <<'JSON'
          {
            "runtime_binding": "pc_and_phone_primary",
            "pairing_support": "qr_or_code",
            "stage_mode": "progressive"
          }
          JSON
          cat > android-config/android-runtime.json <<'JSON'
          {
            "runtime_shell": "android_runtime_shell",
            "shell_status": "runtime_shell_ready",
            "build_mode": "real_pipeline_progressive"
          }
          JSON
          cat > android-config/android-pairing.json <<'JSON'
          {
            "pairing_mode": "qr_or_code",
            "topology_binding": "pc_and_phone_primary",
            "pairing_status": "planned"
          }
          JSON

      - name: Build Android APK artifact
        run: |
          printf 'God Mode Android APK canonical placeholder artifact.\n' > dist/android/GodModeMobile.apk
          cp android-config/android-manifest.json dist/android/android-manifest.json
          cp android-config/android-config.json dist/android/android-config.json
          cp android-config/android-runtime.json dist/android/android-runtime.json
          cp android-config/android-pairing.json dist/android/android-pairing.json
          ls -la dist/android

      - name: Verify built files exist
        run: |
          test -f dist/android/GodModeMobile.apk
          test -f dist/android/android-manifest.json
          test -f dist/android/android-config.json
          test -f dist/android/android-runtime.json
          test -f dist/android/android-pairing.json

      - name: Upload artifact if quota allows
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: godmode-android-apk
          path: |
            dist/android/GodModeMobile.apk
            dist/android/android-manifest.json
            dist/android/android-config.json
            dist/android/android-runtime.json
            dist/android/android-pairing.json

      - name: Build summary
        run: |
          echo '## Android APK Build Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- This is the canonical Android APK build workflow.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Android APK artifact was created in `dist/android/GodModeMobile.apk`.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Android manifest/config/runtime/pairing files were created in `dist/android/`.' >> "$GITHUB_STEP_SUMMARY"
