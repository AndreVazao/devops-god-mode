name: Script Extraction And Reuse Mapping Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/script-extraction-and-reuse-mapping'
    paths:
      - 'docs/script-extraction-and-reuse-mapping-plan.md'
      - 'backend/contracts/extracted_script_item.example.json'
      - 'backend/contracts/reuse_map_item.example.json'
      - 'backend/app/services/script_extraction_reuse_service.py'
      - 'backend/app/routes/script_extraction_reuse.py'
      - 'backend/main.py'
      - '.github/workflows/script-extraction-and-reuse-mapping-smoke.yml'

jobs:
  smoke-script-extraction-and-reuse-mapping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate script reuse files
        run: |
          test -f docs/script-extraction-and-reuse-mapping-plan.md
          test -f backend/contracts/extracted_script_item.example.json
          test -f backend/contracts/reuse_map_item.example.json
          test -f backend/app/services/script_extraction_reuse_service.py
          test -f backend/app/routes/script_extraction_reuse.py
          test -f backend/main.py

      - name: Validate script reuse markers
        run: |
          grep -q '"script_id": "script_0001"' backend/contracts/extracted_script_item.example.json
          grep -q '"reuse_map_id": "reuse_0001"' backend/contracts/reuse_map_item.example.json
          grep -q 'extracted_scripts' backend/app/services/script_extraction_reuse_service.py
          grep -q 'script_reuse_best_candidates' backend/app/services/script_extraction_reuse_service.py
          grep -q '/api/script-reuse' backend/app/routes/script_extraction_reuse.py
          grep -q 'script_reuse_router' backend/main.py
