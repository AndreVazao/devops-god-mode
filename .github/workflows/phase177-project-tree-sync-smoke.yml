name: Phase 177 Project Tree Sync Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/project_tree_autorefresh.py'
      - 'backend/app/services/project_tree_autorefresh_service.py'
      - 'scripts/generate_project_tree.py'
      - 'docs/orchestration/project-tree-autorefresh.md'
      - '.github/workflows/project-tree-autorefresh.yml'
      - '.github/workflows/phase177-project-tree-sync-smoke.yml'

jobs:
  phase177-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate named GOD_MODE project tree generation
        env:
          PYTHONPATH: backend
        run: |
          python scripts/generate_project_tree.py --project-name GOD_MODE --output docs/project-tree/GOD_MODE_TREE.md
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.project_tree_autorefresh_service import project_tree_autorefresh_service

          tree_path = Path("docs/project-tree/GOD_MODE_TREE.md")
          assert tree_path.exists(), "GOD_MODE_TREE.md was not generated"
          content = tree_path.read_text(encoding="utf-8")
          assert content.startswith("# GOD_MODE Tree"), content.splitlines()[:3]
          assert "GOD_MODE/" in content
          assert "devops-god-mode/" not in content.split("```text", 1)[1].splitlines()[1]
          assert "Generated at:" not in content, "tree output must be deterministic"
          assert "scripts/generate_project_tree.py" in content
          assert ".env" not in content
          assert "node_modules" not in content

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/project-tree-autorefresh/status",
              "/api/project-tree-autorefresh/package",
              "/api/project-tree-autorefresh/dashboard",
              "/api/project-tree-autorefresh/current",
              "/api/project-tree-autorefresh/generated",
              "/api/project-tree-autorefresh/compare",
              "/api/project-tree-autorefresh/write",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing project tree routes: {missing}"

          status = project_tree_autorefresh_service.get_status()
          assert status["ok"] is True
          assert status["project_id"] == "GOD_MODE"
          assert status["tree_file"] == "docs/project-tree/GOD_MODE_TREE.md"
          assert status["workflow_expected"] == ".github/workflows/project-tree-autorefresh.yml"

          generated = project_tree_autorefresh_service.build_tree_text()
          assert generated.startswith("# GOD_MODE Tree")
          assert "GOD_MODE/" in generated
          assert "Generated at:" not in generated

          comparison = project_tree_autorefresh_service.compare_tree()
          assert comparison["ok"] is True
          assert comparison["report"]["project_id"] == "GOD_MODE"
          assert comparison["report"]["tree_path"] == "docs/project-tree/GOD_MODE_TREE.md"

          workflow = Path(".github/workflows/project-tree-autorefresh.yml").read_text(encoding="utf-8")
          assert "contents: write" in workflow
          assert "github.actor != 'github-actions[bot]'" in workflow
          assert "docs/project-tree/GOD_MODE_TREE.md" in workflow
          assert "[skip ci]" in workflow

          docs = Path("docs/orchestration/project-tree-autorefresh.md").read_text(encoding="utf-8")
          assert "docs/project-tree/GOD_MODE_TREE.md" in docs
          assert "GOD_MODE" in docs
          assert "fallback" in docs

          print("phase 177 project tree sync smoke passed")
          PY
