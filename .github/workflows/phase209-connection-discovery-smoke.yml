name: Phase 209 Connection Discovery Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/mobile_pc_pairing_remote_access_service.py'
      - 'backend/app/routes/mobile_pc_pairing_remote_access.py'
      - 'docs/orchestration/lan-connection-discovery.md'
      - '.github/workflows/phase209-connection-discovery-smoke.yml'

jobs:
  phase209-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 209 connection discovery contract
        run: |
          python - <<'PY'
          from pathlib import Path
          service = Path('backend/app/services/mobile_pc_pairing_remote_access_service.py')
          route = Path('backend/app/routes/mobile_pc_pairing_remote_access.py')
          docs = Path('docs/orchestration/lan-connection-discovery.md')
          for path in [service, route, docs]:
              assert path.exists(), f'Missing {path}'
          s = service.read_text(encoding='utf-8')
          for marker in ['VERSION = "phase_209_v1"','KNOWN_HOME_PC_IPS = ["192.168.1.81"]','KNOWN_HOME_PHONE_IPS = ["192.168.1.47"]','LAN_SWEEP_RADIUS = 20','lan_scan_candidates','_lan_sweep_ips','192.168.1.61','192.168.1.101']:
              assert marker in s, marker
          assert 'lan_sweep_range' in s and 'mobile_should_try_in_order' in s
          r = route.read_text(encoding='utf-8')
          assert '/lan-scan-candidates' in r
          d = docs.read_text(encoding='utf-8')
          for marker in ['192.168.1.81','192.168.1.47','192.168.1.61','192.168.1.101','/api/mobile-pc-pairing/lan-scan-candidates']:
              assert marker in d, marker
          workflows = sorted(p.name for p in Path('.github/workflows').glob('phase*-*.yml'))
          assert workflows == ['phase209-connection-discovery-smoke.yml'], workflows
          print('phase 209 connection discovery contract passed')
          PY
