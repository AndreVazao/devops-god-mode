name: Chat Adapter And Conversation Inventory Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/chat-adapter-and-conversation-inventory'
    paths:
      - 'docs/chat-adapter-and-conversation-inventory-plan.md'
      - 'backend/contracts/chat_frontend_adapter.example.json'
      - 'backend/contracts/conversation_inventory_item.example.json'
      - 'backend/app/services/chat_adapter_inventory_service.py'
      - 'backend/app/routes/chat_adapter_inventory.py'
      - 'backend/main.py'
      - '.github/workflows/chat-adapter-and-conversation-inventory-smoke.yml'

jobs:
  smoke-chat-adapter-and-conversation-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate chat inventory files
        run: |
          test -f docs/chat-adapter-and-conversation-inventory-plan.md
          test -f backend/contracts/chat_frontend_adapter.example.json
          test -f backend/contracts/conversation_inventory_item.example.json
          test -f backend/app/services/chat_adapter_inventory_service.py
          test -f backend/app/routes/chat_adapter_inventory.py
          test -f backend/main.py

      - name: Validate chat inventory markers
        run: |
          grep -q '"adapter_id": "adapter_0001"' backend/contracts/chat_frontend_adapter.example.json
          grep -q '"conversation_id": "conv_0001"' backend/contracts/conversation_inventory_item.example.json
          grep -q 'conversation_inventory' backend/app/services/chat_adapter_inventory_service.py
          grep -q 'conversation_reuse_candidates' backend/app/services/chat_adapter_inventory_service.py
          grep -q '/api/chat-inventory' backend/app/routes/chat_adapter_inventory.py
          grep -q 'chat_inventory_router' backend/main.py
