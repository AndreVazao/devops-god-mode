name: Prune Merged Phase Plans Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/prune-merged-phase-plans-plan.md'
      - '.github/workflows/prune-merged-phase-plans-phase.yml'

jobs:
  prune-merged-phase-plans-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate removed merged phase plans and cleanup workflow
        run: |
          test ! -f docs/remote-channel-stability-plan.md
          test ! -f docs/remote-session-persistence-plan.md
          test ! -f docs/continuous-remote-execution-plan.md
          test ! -f docs/offline-command-buffering-plan.md
          test ! -f docs/initial-inventory-project-graph-plan.md
          test ! -f docs/automatic-project-classification-plan.md
          test ! -f docs/inter-provider-handoff-adaptation-plan.md
          test ! -f docs/multi-file-parsing-placement-plan.md
          test ! -f docs/cleanup-obvious-legacy-files-plan.md
          test ! -f docs/cleanup-repo-tree-legacy-surface-plan.md
          test ! -f docs/cleanup-repo-tree-final-route-surface-plan.md
          test ! -f docs/cleanup-repo-tree-services-plan.md
          test ! -f .github/workflows/cleanup-repo-tree-services-phase.yml

      - name: Build summary
        run: |
          echo '## Prune Merged Phase Plans Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed merged phase plan docs that no longer add runtime value.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed stale cleanup workflow scaffolding already consumed by earlier merges.' >> "$GITHUB_STEP_SUMMARY"
