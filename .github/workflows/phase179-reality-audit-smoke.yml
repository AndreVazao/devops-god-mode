name: Phase 179 Reality Audit Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/god_mode_reality_audit.py'
      - 'backend/app/services/god_mode_reality_audit_service.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/reality-audit-first-install.md'
      - '.github/workflows/phase179-reality-audit-smoke.yml'

jobs:
  phase179-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 179 reality audit and first install mission
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.god_mode_global_state_service import god_mode_global_state_service
          from app.services.god_mode_reality_audit_service import god_mode_reality_audit_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/god-mode-reality-audit/status",
              "/api/god-mode-reality-audit/audit",
              "/api/god-mode-reality-audit/capabilities",
              "/api/god-mode-reality-audit/first-install-mission",
              "/api/god-mode-reality-audit/project-tree-and-inventory-mission",
              "/api/god-mode-reality-audit/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 179 routes: {missing}"

          audit = god_mode_reality_audit_service.audit()
          assert audit["ok"] is True
          assert audit["overall"]["real_percent"] >= 40
          statuses = {item["status"] for item in audit["capabilities"]}
          assert "real" in statuses
          assert "partial" in statuses or "blocked" in statuses
          assert any(item["id"] == "external_ai_browser_worker" for item in audit["capabilities"])
          assert any(item["id"] == "external_ai_chat_reader" for item in audit["capabilities"])
          assert any(item["id"] == "project_tree_autorefresh" for item in audit["capabilities"])
          assert audit["first_install_mission"]["ready_for_pc_install_attempt"] is True
          assert len(audit["first_install_mission"]["steps"]) >= 10
          assert "conversation" in audit["project_tree_and_inventory_mission"]["inputs"][0]

          status = god_mode_reality_audit_service.status()
          assert status["ok"] is True
          assert status["first_install_ready"] is True
          assert status["fantasy_risk"] in {"low", "medium", "high"}

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 178
          assert global_status["current_phase"] == 179
          assert global_status["reality_audit_endpoint"] == "/api/god-mode-reality-audit/package"

          global_package = god_mode_global_state_service.package()
          assert global_package["reality_audit_model"]["endpoint"] == "/api/god-mode-reality-audit/package"
          assert any(item["phase"] == 178 and item["status"] == "merged" for item in global_package["implemented_phases"])
          assert any(item["phase"] == 179 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          docs = Path("docs/orchestration/reality-audit-first-install.md").read_text(encoding="utf-8")
          assert "/api/god-mode-reality-audit/package" in docs
          assert "Primeira missão no PC" in docs
          assert "100% real" in docs

          print("phase 179 reality audit smoke passed")
          PY
