name: Prune Browser And Conversation Plan Docs Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/prune-browser-and-conversation-plan-docs-plan.md'
      - '.github/workflows/prune-browser-and-conversation-plan-docs-phase.yml'

jobs:
  prune-browser-and-conversation-plan-docs-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate removed browser and conversation plan docs
        run: |
          test ! -f docs/browser-chat-intake-real-plan.md
          test ! -f docs/browser-conversation-intake-plan.md
          test ! -f docs/chat-adapter-and-conversation-inventory-plan.md
          test ! -f docs/context-aware-automation-layer-plan.md
          test ! -f docs/conversation-organization-intelligence-plan.md
          test ! -f docs/conversation-to-repo-reconstruction-plan.md
          test ! -f docs/prune-android-and-approval-plan-docs-plan.md
          test ! -f .github/workflows/prune-android-and-approval-plan-docs-phase.yml

      - name: Build summary
        run: |
          echo '## Prune Browser And Conversation Plan Docs Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed another large browser and conversation planning batch.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Removed merged pruning scaffolding from the previous round.' >> "$GITHUB_STEP_SUMMARY"
