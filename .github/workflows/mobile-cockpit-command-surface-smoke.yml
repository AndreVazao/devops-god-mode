name: Mobile Cockpit Command Surface Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/mobile-cockpit-command-surface-plan.md'
      - 'backend/contracts/mobile_cockpit_card_item.example.json'
      - 'backend/contracts/mobile_quick_action_item.example.json'
      - 'backend/app/services/mobile_cockpit_command_surface_service.py'
      - 'backend/app/routes/mobile_cockpit_command_surface.py'
      - 'backend/app/services/browser_control_real_service.py'
      - 'backend/app/services/browser_conversation_intake_service.py'
      - 'backend/main.py'
      - '.github/workflows/mobile-cockpit-command-surface-smoke.yml'

jobs:
  mobile-cockpit-command-surface-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Smoke mobile cockpit command surface
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from app.services.browser_conversation_intake_service import browser_conversation_intake_service
          from app.services.mobile_cockpit_command_surface_service import mobile_cockpit_command_surface_service
          from main import app

          browser_conversation_intake_service.seed_from_conversation_focus()
          summary = mobile_cockpit_command_surface_service.get_summary()["summary"]
          cards = mobile_cockpit_command_surface_service.get_cards()["cards"]
          quick_actions = mobile_cockpit_command_surface_service.get_quick_actions()["quick_actions"]
          next_action = mobile_cockpit_command_surface_service.get_next_critical_action()["next_critical_action"]

          assert summary is not None
          assert cards, "Mobile cockpit cards should not be empty"
          assert quick_actions, "Mobile quick actions should not be empty"
          assert next_action is not None

          advanced = mobile_cockpit_command_surface_service.advance_quick_action(
              quick_actions[0]["action_id"]
          )
          assert advanced["ok"] is True

          route_paths = {route.path for route in app.routes}
          assert "/api/mobile-cockpit/status" in route_paths
          assert "/api/mobile-cockpit/summary" in route_paths
          assert "/api/mobile-cockpit/cards" in route_paths
          assert "/api/mobile-cockpit/quick-actions" in route_paths
          assert "/api/mobile-cockpit/next-critical-action" in route_paths
          print("mobile cockpit command surface smoke passed")
          PY

      - name: Build summary
        run: |
          echo '## Mobile Cockpit Command Surface Smoke Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Mobile cockpit command surface service imported successfully.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Summary, cards, quick actions and next critical action were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Assisted quick action advance was validated.' >> "$GITHUB_STEP_SUMMARY"
