name: Recovery Write Dispatch Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/project-recovery-write-dispatch-plan.md'
      - 'backend/contracts/recovery_write_dispatch.example.json'
      - 'backend/contracts/recovery_write_dispatch_target.example.json'
      - 'backend/app/services/project_recovery_write_dispatch_service.py'
      - 'backend/app/routes/project_recovery_write_dispatch.py'
      - 'backend/main.py'
      - '.github/workflows/recovery-write-dispatch-phase.yml'

jobs:
  recovery-write-dispatch-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate recovery write dispatch layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.project_recovery_write_dispatch_service import project_recovery_write_dispatch_service

          dispatches = project_recovery_write_dispatch_service.get_dispatches()["dispatches"]
          targets = project_recovery_write_dispatch_service.get_dispatch_targets()["targets"]
          next_action = project_recovery_write_dispatch_service.get_next_dispatch_action()["next_dispatch_action"]
          route_paths = {route.path for route in app.routes}

          assert dispatches, "Expected at least one recovery write dispatch"
          assert targets, "Expected at least one recovery write dispatch target"
          assert next_action is not None
          assert "/api/project-recovery-write-dispatch/status" in route_paths
          assert "/api/project-recovery-write-dispatch/dispatches" in route_paths
          assert "/api/project-recovery-write-dispatch/targets" in route_paths
          assert "/api/project-recovery-write-dispatch/next-dispatch-action" in route_paths
          print("recovery write dispatch phase passed")
          PY

      - name: Build summary
        run: |
          echo '## Recovery Write Dispatch Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Temporary phase workflow for recovery write dispatch validation.' >> "$GITHUB_STEP_SUMMARY"
          echo '- This workflow must be removed in the next phase according to repo policy.' >> "$GITHUB_STEP_SUMMARY"
