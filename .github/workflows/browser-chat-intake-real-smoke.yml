name: Browser Chat Intake Real Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/browser-chat-intake-real-plan.md'
      - 'backend/contracts/browser_intake_session_item.example.json'
      - 'backend/contracts/browser_intake_navigation_step.example.json'
      - 'backend/app/services/browser_conversation_intake_service.py'
      - 'backend/app/routes/browser_conversation_intake.py'
      - 'backend/app/services/conversation_organization_service.py'
      - '.github/workflows/browser-chat-intake-real-smoke.yml'

jobs:
  browser-chat-intake-real-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Smoke browser chat intake real
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from app.services.browser_conversation_intake_service import browser_conversation_intake_service
          from main import app

          seeded = browser_conversation_intake_service.seed_from_conversation_focus()
          assert seeded["ok"] is True
          queue = browser_conversation_intake_service.get_priority_queue()["sessions"]
          assert queue, "Priority queue should not be empty"
          session_id = queue[0]["session_id"]
          navigation = browser_conversation_intake_service.get_navigation_plan(session_id)["navigation_steps"]
          progress = browser_conversation_intake_service.get_capture_progress(session_id)["progress"]
          next_session = browser_conversation_intake_service.get_next_session()["next_session"]
          route_paths = {route.path for route in app.routes}

          assert navigation, "Navigation plan should not be empty"
          assert progress["session_id"] == session_id
          assert next_session is not None
          assert "/api/browser-intake/priority-queue" in route_paths
          assert "/api/browser-intake/next-session" in route_paths
          assert "/api/browser-intake/seed-from-focus" in route_paths
          print("browser chat intake real smoke passed")
          PY

      - name: Build summary
        run: |
          echo '## Browser Chat Intake Real Smoke Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Browser chat intake service imported successfully.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Priority queue, next session, navigation plan and progress payloads were validated.' >> "$GITHUB_STEP_SUMMARY"
          echo '- Focus seeding from conversation organization was validated.' >> "$GITHUB_STEP_SUMMARY"
