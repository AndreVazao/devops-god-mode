name: First Run Bundle And Pairing Assets Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/first-run-bundle-and-pairing-assets'
    paths:
      - 'docs/first-run-bundle-and-pairing-assets-plan.md'
      - 'backend/contracts/first_run_bundle_profile.example.json'
      - 'backend/app/services/first_run_bundle_service.py'
      - 'backend/app/routes/first_run_bundle.py'
      - 'desktop/godmode_desktop_launcher.py'
      - '.github/workflows/android-mobile-build.yml'
      - '.github/workflows/first-run-bundle-and-pairing-assets-smoke.yml'
      - 'backend/main.py'

jobs:
  smoke-first-run-bundle-and-pairing-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate first-run bundle files
        run: |
          test -f docs/first-run-bundle-and-pairing-assets-plan.md
          test -f backend/contracts/first_run_bundle_profile.example.json
          test -f backend/app/services/first_run_bundle_service.py
          test -f backend/app/routes/first_run_bundle.py
          test -f desktop/godmode_desktop_launcher.py
          test -f .github/workflows/android-mobile-build.yml
          test -f backend/main.py

      - name: Validate first-run bundle markers
        run: |
          grep -q '"bundle_id": "bundle_0001"' backend/contracts/first_run_bundle_profile.example.json
          grep -q '"pairing_mode": "qr_or_code"' backend/contracts/first_run_bundle_profile.example.json
          grep -q 'generate_pairing_payload' backend/app/services/first_run_bundle_service.py
          grep -q 'first_run_pairing_asset' backend/app/services/first_run_bundle_service.py
          grep -q '/api/first-run-bundle' backend/app/routes/first_run_bundle.py
          grep -q 'first_run_bundle_router' backend/main.py
          grep -q 'godmode-mobile-pairing.json' desktop/godmode_desktop_launcher.py
          grep -q 'godmode-mobile-pairing.json' .github/workflows/android-mobile-build.yml
