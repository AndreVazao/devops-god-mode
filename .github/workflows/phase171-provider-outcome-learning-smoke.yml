name: Phase 171 Provider Outcome Learning Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docs/orchestration/provider-outcome-learning.md'
      - '.github/workflows/phase171-provider-outcome-learning-smoke.yml'

jobs:
  phase171-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 171 import, routes, outcome learning and router hints
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.provider_outcome_learning_service import provider_outcome_learning_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/provider-outcome-learning/status",
              "/api/provider-outcome-learning/panel",
              "/api/provider-outcome-learning/policy",
              "/api/provider-outcome-learning/rules",
              "/api/provider-outcome-learning/record-outcome",
              "/api/provider-outcome-learning/scorecard",
              "/api/provider-outcome-learning/router-hints",
              "/api/provider-outcome-learning/simulate-route",
              "/api/provider-outcome-learning/latest",
              "/api/provider-outcome-learning/package",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 171 routes: {missing}"

          status = provider_outcome_learning_service.status()
          assert status["ok"] is True
          assert status["raw_prompt_storage"] is False
          assert status["safety_bypass_allowed"] is False

          blocked = provider_outcome_learning_service.record_outcome(
              provider_id="chatgpt",
              task_tags=["code_generation"],
              outcome="success",
              notes="contains password and must be blocked",
          )
          assert blocked["ok"] is False
          assert blocked["error"] == "blocked_secret_keyword"

          first = provider_outcome_learning_service.record_outcome(
              provider_id="chatgpt",
              task_tags=["architecture", "planning"],
              outcome="success",
              quality_score=0.92,
              latency_ms=1200,
              cost_hint="medium",
              operator_rating=5,
              notes="Excellent structured plan without sensitive context.",
          )
          assert first["ok"] is True

          second = provider_outcome_learning_service.record_outcome(
              provider_id="deepseek",
              task_tags=["code_generation"],
              outcome="success",
              quality_score=0.86,
              latency_ms=900,
              cost_hint="low",
              operator_rating=4,
              notes="Good complete code generation after security guard.",
          )
          assert second["ok"] is True

          third = provider_outcome_learning_service.record_outcome(
              provider_id="gemini",
              task_tags=["code_generation"],
              outcome="failed",
              quality_score=0.2,
              latency_ms=2000,
              failure_reason="tool_mismatch",
              operator_rating=2,
              notes="Not ideal for this coding task.",
          )
          assert third["ok"] is True

          unsafe = provider_outcome_learning_service.record_outcome(
              provider_id="grok",
              task_tags=["cross_check"],
              outcome="blocked",
              quality_score=0.0,
              failure_reason="policy_block",
              notes="Blocked for safety; must not be boosted.",
          )
          assert unsafe["ok"] is True
          assert unsafe["outcome"]["safety_bypass_attempt"] is True

          scorecard = provider_outcome_learning_service.scorecard()
          assert scorecard["ok"] is True
          assert scorecard["scorecard"]["rows"]

          hints = provider_outcome_learning_service.router_hints(task_tags=["code_generation"], sensitive=False)
          assert hints["ok"] is True
          payload = hints["router_hints"]
          assert payload["safety_bypass_allowed"] is False
          assert payload["apply_mode"] == "advisory_v1"
          assert "deepseek" in payload["learned_provider_adjustments"]

          sensitive_hints = provider_outcome_learning_service.router_hints(task_tags=["code_generation"], sensitive=True)
          assert sensitive_hints["ok"] is True
          assert sensitive_hints["router_hints"]["learned_provider_adjustments"]["deepseek"] <= 0

          simulation = provider_outcome_learning_service.simulate_route(
              goal="Implement a coding task with provider outcome learning",
              task_tags=["code_generation"],
              needs_code=True,
          )
          assert simulation["ok"] is True
          assert simulation["safety_bypass_allowed"] is False
          assert simulation["learned_selected_provider"] is not None
          assert simulation["learned_scores"]

          assert Path("docs/orchestration/provider-outcome-learning.md").exists()
          print("phase 171 provider outcome learning smoke passed")
          PY
