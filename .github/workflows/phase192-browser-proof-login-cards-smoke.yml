name: Phase 192 Browser Proof Login Cards Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/provider_browser_proof_link.py'
      - 'backend/app/services/provider_browser_proof_link_service.py'
      - 'backend/app/routes/provider_broadcast_cockpit_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/provider-browser-proof-link.md'
      - '.github/workflows/phase192-browser-proof-login-cards-smoke.yml'

jobs:
  phase192-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate Phase 192 browser proof login cards
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path
          from main import app
          from app.services.god_mode_global_state_service import god_mode_global_state_service
          from app.services.provider_prompt_broadcast_runtime_service import provider_prompt_broadcast_runtime_service
          from app.services.provider_browser_proof_link_service import provider_browser_proof_link_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/api/provider-browser-proof-link/status",
              "/api/provider-browser-proof-link/policy",
              "/api/provider-browser-proof-link/build-links",
              "/api/provider-browser-proof-link/create-login-cards",
              "/api/provider-browser-proof-link/create-automation-gate",
              "/api/provider-browser-proof-link/dashboard",
              "/api/provider-browser-proof-link/package",
              "/app/provider-broadcast-cockpit",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 192 routes: {missing}"

          status = provider_browser_proof_link_service.status()
          assert status["ok"] is True
          assert status["browser_automation_enabled"] is False
          assert status["manual_open_enabled"] is True
          assert status["stores_credentials"] is False
          assert status["stores_cookies"] is False

          policy = provider_browser_proof_link_service.policy()
          assert "store credentials" in policy["policy"]["blocked"]
          assert "automate login" in policy["policy"]["blocked"]

          profile = provider_prompt_broadcast_runtime_service.default_pane_profile("phase192-proof")
          assert profile["ok"] is True
          plan = provider_prompt_broadcast_runtime_service.create_broadcast_plan(
              operator_request="Oner: abrir providers manualmente e criar cards de login sem guardar credenciais.",
              project_key="GOD_MODE",
              selected_provider_ids=["chatgpt", "claude", "local_ollama"],
              profile_id=profile["profile"]["profile_id"],
              use_prompt_critic=True,
          )
          assert plan["ok"] is True
          plan_id = plan["plan"]["plan_id"]

          links = provider_browser_proof_link_service.build_links_for_plan(plan_id)
          assert links["ok"] is True
          assert links["link_count"] == 3
          by_provider = {item["provider_id"]: item for item in links["links"]}
          assert by_provider["chatgpt"]["safe_open_url"].startswith("https://chatgpt.com")
          assert by_provider["claude"]["requires_login_attention"] is True
          assert by_provider["local_ollama"]["stores_credentials"] is False
          assert all(item["browser_automation_enabled"] is False for item in links["links"])

          cards = provider_browser_proof_link_service.create_login_attention_cards(plan_id)
          assert cards["ok"] is True
          assert cards["card_count"] >= 2
          assert all(card["card_type"] == "provider_login_request" for card in cards["cards"])
          assert all(card["metadata"]["stores_credentials"] is False for card in cards["cards"])

          gate = provider_browser_proof_link_service.create_browser_automation_gate(plan_id, "chatgpt")
          assert gate["ok"] is True
          assert gate["phase192_executes_automation"] is False
          assert gate["gate"]["risk_level"] == "high"

          dashboard = provider_browser_proof_link_service.dashboard(plan_id)
          assert dashboard["ok"] is True
          assert dashboard["browser_automation_enabled"] is False
          assert dashboard["manual_open_enabled"] is True

          frontend = Path("backend/app/routes/provider_broadcast_cockpit_frontend.py").read_text(encoding="utf-8")
          assert "/api/provider-browser-proof-link/build-links" in frontend
          assert "/api/provider-browser-proof-link/create-login-cards" in frontend
          assert "Gerar links/login cards" in frontend
          assert "não guarda passwords" in frontend.lower() or "não guarda password" in frontend.lower()

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 191
          assert global_status["current_phase"] == 192
          assert global_status["provider_browser_proof_link_endpoint"] == "/api/provider-browser-proof-link/package"

          global_package = god_mode_global_state_service.package()
          model = global_package["provider_browser_proof_link_model"]
          assert model["manual_open_enabled"] is True
          assert model["browser_automation_enabled"] is False
          assert model["stores_credentials"] is False
          assert any(item["phase"] == 192 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          workflow_dir = Path(".github/workflows")
          phase_workflows = sorted(path.name for path in workflow_dir.glob("phase*-*.yml"))
          assert phase_workflows == ["phase192-browser-proof-login-cards-smoke.yml"], phase_workflows

          docs = Path("docs/orchestration/provider-browser-proof-link.md").read_text(encoding="utf-8")
          assert "/api/provider-browser-proof-link/package" in docs
          assert "Não guarda credenciais" in docs
          assert "Não automatiza login" in docs

          print("phase 192 browser proof login cards smoke passed")
          PY
