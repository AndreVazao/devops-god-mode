name: Phase 201 Native Skills Adoption Queue Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/native_skills_adoption_queue_service.py'
      - 'backend/app/routes/native_skills_adoption_queue.py'
      - 'backend/app/routes/native_skills_adoption_queue_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/native-skills-adoption-queue.md'
      - '.github/workflows/phase201-native-skills-adoption-queue-smoke.yml'

jobs:
  phase201-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 201 file contract
        run: |
          python - <<'PY'
          from pathlib import Path

          files = {
              'service': Path('backend/app/services/native_skills_adoption_queue_service.py'),
              'route': Path('backend/app/routes/native_skills_adoption_queue.py'),
              'frontend': Path('backend/app/routes/native_skills_adoption_queue_frontend.py'),
              'global_state': Path('backend/app/services/god_mode_global_state_service.py'),
              'docs': Path('docs/orchestration/native-skills-adoption-queue.md'),
          }
          for label, path in files.items():
              assert path.exists(), f'Missing {label}: {path}'

          service = files['service'].read_text(encoding='utf-8')
          for marker in [
              'class NativeSkillsAdoptionQueueService',
              'ALLOWED_STATUSES',
              'STATUS_TRANSITIONS',
              'promote_candidate',
              'promote_candidates_by_filter',
              'adoption_queue_item',
              'create_implementation_plan',
              'can_apply_code_without_gate',
              'can_merge_without_oner_approval',
              'requires_actions_validation_before_merge',
              'module_registry_snapshot_service.search_modules',
          ]:
              assert marker in service, marker

          route = files['route'].read_text(encoding='utf-8')
          for endpoint in ['/status', '/policy', '/promote-candidate', '/promote-candidates-by-filter', '/queue', '/update-status', '/create-implementation-plan', '/dashboard', '/package']:
              assert endpoint in route, f'Missing endpoint {endpoint}'
          assert 'prefix="/api/native-skills-adoption-queue"' in route

          frontend = files['frontend'].read_text(encoding='utf-8')
          for marker in ['Native Skills Adoption Queue', '/api/native-skills-adoption-queue/promote-candidate', '/api/native-skills-adoption-queue/create-implementation-plan', '/app/native-skills-adoption-queue', '/app/native-skills-runtime']:
              assert marker in frontend, marker

          global_state = files['global_state'].read_text(encoding='utf-8')
          for marker in ['current_phase": 201', 'latest_merged_phase": 200', 'native_skills_adoption_queue_model', '/api/native-skills-adoption-queue/package', 'native_skills_adoption_queue_route']:
              assert marker in global_state, marker

          docs = files['docs'].read_text(encoding='utf-8')
          for marker in ['/api/native-skills-adoption-queue/package', 'adoption_queue_item', 'approved_for_planning', 'can_apply_code_without_gate=false']:
              assert marker in docs, marker

          workflow_dir = Path('.github/workflows')
          phase_workflows = sorted(path.name for path in workflow_dir.glob('phase*-*.yml'))
          assert phase_workflows == ['phase201-native-skills-adoption-queue-smoke.yml'], phase_workflows

          print('phase 201 native skills adoption queue file contract passed')
          PY
