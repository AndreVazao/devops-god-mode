name: Phase 195 GitHub Repo Inventory Feed Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/services/github_repo_inventory_feed_service.py'
      - 'backend/app/routes/github_repo_inventory_feed.py'
      - 'backend/app/routes/github_repo_inventory_feed_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/github-repo-inventory-feed.md'
      - '.github/workflows/phase195-github-repo-inventory-feed-smoke.yml'

jobs:
  phase195-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Phase 195 file contract
        run: |
          python - <<'PY'
          from pathlib import Path

          files = {
              "service": Path("backend/app/services/github_repo_inventory_feed_service.py"),
              "route": Path("backend/app/routes/github_repo_inventory_feed.py"),
              "frontend": Path("backend/app/routes/github_repo_inventory_feed_frontend.py"),
              "global_state": Path("backend/app/services/god_mode_global_state_service.py"),
              "docs": Path("docs/orchestration/github-repo-inventory-feed.md"),
          }
          for label, path in files.items():
              assert path.exists(), f"Missing {label}: {path}"

          service = files["service"].read_text(encoding="utf-8")
          assert "class GithubRepoInventoryFeedService" in service
          assert "def import_connector_snapshot" in service
          assert "def import_repo_names" in service
          assert "def seed_from_connector_sample" in service
          assert "def create_new_repo_cards" in service
          assert "CONNECTOR_SEED_REPOS" in service
          assert "AndreVazao/devops-god-mode" in service
          assert "AndreVazao/baribudos-studio" in service
          assert "AndreVazao/proventil" in service
          assert "store secrets" in service
          assert "clone repos automatically" in service

          route = files["route"].read_text(encoding="utf-8")
          for endpoint in ["/status", "/policy", "/import-connector-snapshot", "/import-repo-names", "/seed-connector-seen", "/create-new-repo-cards", "/dashboard", "/package"]:
              assert endpoint in route, f"Missing endpoint {endpoint}"
          assert "prefix=\"/api/github-repo-inventory-feed\"" in route

          frontend = files["frontend"].read_text(encoding="utf-8")
          assert "GitHub Repo Inventory Feed" in frontend
          assert "/api/github-repo-inventory-feed/import-repo-names" in frontend
          assert "/api/github-repo-inventory-feed/seed-connector-seen" in frontend
          assert "/app/github-repo-inventory-feed" in frontend
          assert "/app/repo-inventory" in frontend

          global_state = files["global_state"].read_text(encoding="utf-8")
          assert "current_phase\": 195" in global_state
          assert "latest_merged_phase\": 194" in global_state
          assert "github_repo_inventory_feed_model" in global_state
          assert "/api/github-repo-inventory-feed/package" in global_state

          docs = files["docs"].read_text(encoding="utf-8")
          assert "/api/github-repo-inventory-feed/package" in docs
          assert "Não guarda segredos" in docs
          assert "AndreVazao/devops-god-mode" in docs
          assert "AndreVazao/baribudos-studio" in docs

          workflow_dir = Path(".github/workflows")
          phase_workflows = sorted(path.name for path in workflow_dir.glob("phase*-*.yml"))
          assert phase_workflows == ["phase195-github-repo-inventory-feed-smoke.yml"], phase_workflows

          print("phase 195 github repo inventory feed file contract passed")
          PY
