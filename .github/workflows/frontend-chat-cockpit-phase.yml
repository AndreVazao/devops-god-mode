name: Frontend Chat Cockpit Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/frontend-chat-cockpit-plan.md'
      - 'frontend/index.html'
      - '.github/workflows/frontend-chat-cockpit-phase.yml'

jobs:
  frontend-chat-cockpit-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate chat cockpit shell
        run: |
          test -f frontend/index.html
          grep -q "Chat novo" frontend/index.html
          grep -q "Histórico de chats" frontend/index.html
          grep -q "Popup de aceitação" frontend/index.html
          grep -q "Renomear conversa" frontend/index.html
          echo "frontend chat cockpit phase passed"
      - name: Build summary
        run: |
          echo '## Frontend Chat Cockpit Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Rebuilt the frontend shell into a chat-style cockpit with history, rename actions and approval popups.' >> "$GITHUB_STEP_SUMMARY"
