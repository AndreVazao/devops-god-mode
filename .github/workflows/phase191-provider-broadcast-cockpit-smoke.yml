name: Phase 191 Provider Broadcast Cockpit Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/app/routes/provider_broadcast_cockpit_frontend.py'
      - 'backend/app/routes/god_mode_home_frontend.py'
      - 'backend/app/services/god_mode_global_state_service.py'
      - 'docs/orchestration/visible-provider-broadcast-cockpit.md'
      - '.github/workflows/phase191-provider-broadcast-cockpit-smoke.yml'

jobs:
  phase191-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate Phase 191 visible provider broadcast cockpit
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from pathlib import Path

          from main import app
          from app.services.god_mode_global_state_service import god_mode_global_state_service
          from app.services.provider_prompt_broadcast_runtime_service import provider_prompt_broadcast_runtime_service

          route_paths = {route.path for route in app.routes}
          required = {
              "/app/provider-broadcast-cockpit",
              "/app/provider-prompt-broadcast",
              "/app/home",
              "/api/provider-prompt-broadcast-runtime/create-broadcast-plan",
              "/api/provider-prompt-broadcast-runtime/import-provider-response",
              "/api/provider-prompt-broadcast-runtime/compare-responses",
          }
          missing = sorted(required - route_paths)
          assert not missing, f"Missing Phase 191 routes: {missing}"

          frontend = Path("backend/app/routes/provider_broadcast_cockpit_frontend.py").read_text(encoding="utf-8")
          assert "Provider Broadcast Cockpit" in frontend
          assert "/app/provider-broadcast-cockpit" in frontend
          assert "/app/provider-prompt-broadcast" in frontend
          assert "copyPrompt" in frontend
          assert "importResponse" in frontend
          assert "compareResponses" in frontend
          assert "ai_response" in frontend
          assert "Não" not in frontend or "Não" in frontend

          home = Path("backend/app/routes/god_mode_home_frontend.py").read_text(encoding="utf-8")
          assert "Broadcast IA" in home
          assert "/app/provider-broadcast-cockpit" in home

          profile = provider_prompt_broadcast_runtime_service.default_pane_profile("phase191-visible")
          assert profile["ok"] is True
          plan = provider_prompt_broadcast_runtime_service.create_broadcast_plan(
              operator_request="Oner: Teste visual do cockpit para copiar prompt e importar resposta.",
              project_key="GOD_MODE",
              selected_provider_ids=["chatgpt", "claude"],
              profile_id=profile["profile"]["profile_id"],
              prompt_mode="development",
              use_prompt_critic=True,
          )
          assert plan["ok"] is True
          assert plan["plan"]["browser_automation_executed"] is False
          assert plan["plan"]["operator_request_original"].startswith("Oner:")
          assert plan["plan"]["broadcast_prompt"].startswith(plan["plan"]["operator_request_original"])
          response = provider_prompt_broadcast_runtime_service.import_provider_response(
              plan_id=plan["plan"]["plan_id"],
              provider_id="chatgpt",
              response_text="Assistant: Resposta importada manualmente pelo cockpit. ```python\nprint('manual capture')\n```",
              source_mode="manual_cockpit_paste",
          )
          assert response["ok"] is True
          assert response["response_import"]["ledger_role"] == "ai_response"
          assert response["response_import"]["is_decision"] is False
          assert response["response_import"]["requires_reconciliation"] is True
          comparison = provider_prompt_broadcast_runtime_service.compare_responses(plan["plan"]["plan_id"])
          assert comparison["ok"] is True
          assert comparison["comparison"]["answers_are_decisions"] is False
          assert comparison["comparison"]["requires_operator_review"] is True

          global_status = god_mode_global_state_service.status()
          assert global_status["latest_merged_phase"] == 190
          assert global_status["current_phase"] == 191
          assert global_status["provider_broadcast_cockpit_route"] == "/app/provider-broadcast-cockpit"

          global_package = god_mode_global_state_service.package()
          assert global_package["visible_provider_broadcast_cockpit_model"]["manual_capture_enabled"] is True
          assert global_package["visible_provider_broadcast_cockpit_model"]["browser_automation_enabled"] is False
          assert global_package["visible_provider_broadcast_cockpit_model"]["answers_are_decisions"] is False
          assert any(item["phase"] == 191 and item["status"] == "in_progress" for item in global_package["implemented_phases"])

          workflow_dir = Path(".github/workflows")
          phase_workflows = sorted(path.name for path in workflow_dir.glob("phase*-*.yml"))
          assert phase_workflows == ["phase191-provider-broadcast-cockpit-smoke.yml"], phase_workflows

          docs = Path("docs/orchestration/visible-provider-broadcast-cockpit.md").read_text(encoding="utf-8")
          assert "/app/provider-broadcast-cockpit" in docs
          assert "copiar prompt" in docs
          assert "colar/importar respostas" in docs
          assert "Não guarda credenciais" in docs

          print("phase 191 visible provider broadcast cockpit smoke passed")
          PY
