name: Cloud Runtime Transition Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/cloud-legacy-retirement-and-local-first-cutover-plan.md'
      - 'backend/contracts/cloud_legacy_retirement.example.json'
      - 'backend/contracts/local_first_cutover_action.example.json'
      - 'backend/app/services/cloud_runtime_transition_service.py'
      - 'backend/app/routes/cloud_runtime_transition.py'
      - 'backend/main.py'
      - '.github/workflows/cloud-runtime-transition-phase.yml'

jobs:
  cloud-runtime-transition-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate cloud runtime transition layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.cloud_runtime_transition_service import cloud_runtime_transition_service
          legacy_stacks = cloud_runtime_transition_service.get_legacy_stacks()["legacy_stacks"]
          actions = cloud_runtime_transition_service.get_cutover_actions()["actions"]
          package = cloud_runtime_transition_service.get_transition_package()["package"]
          next_action = cloud_runtime_transition_service.get_next_transition_action()["next_transition_action"]
          route_paths = {route.path for route in app.routes}
          assert legacy_stacks
          assert actions
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/cloud-runtime-transition/status" in route_paths
          assert "/api/cloud-runtime-transition/legacy-stacks" in route_paths
          assert "/api/cloud-runtime-transition/cutover-actions" in route_paths
          assert "/api/cloud-runtime-transition/next-transition-action" in route_paths
          print("cloud runtime transition phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Cloud Runtime Transition Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Added cloud legacy transition and local first cutover layer.' >> "$GITHUB_STEP_SUMMARY"
