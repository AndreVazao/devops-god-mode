name: Remote Session Persistence Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/remote-session-persistence-plan.md'
      - 'backend/contracts/remote_session_persistence.example.json'
      - 'backend/contracts/remote_session_action.example.json'
      - 'backend/app/services/remote_session_persistence_service.py'
      - 'backend/app/routes/remote_session_persistence.py'
      - 'backend/main.py'
      - '.github/workflows/remote-session-persistence-phase.yml'

jobs:
  remote-session-persistence-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate remote session persistence layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.remote_session_persistence_service import remote_session_persistence_service
          sessions = remote_session_persistence_service.get_sessions()["sessions"]
          actions = remote_session_persistence_service.get_session_actions()["actions"]
          package = remote_session_persistence_service.get_session_package()["package"]
          next_action = remote_session_persistence_service.get_next_session_action()["next_session_action"]
          route_paths = {route.path for route in app.routes}
          assert sessions
          assert actions
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/remote-session-persistence/status" in route_paths
          assert "/api/remote-session-persistence/sessions" in route_paths
          assert "/api/remote-session-persistence/actions" in route_paths
          assert "/api/remote-session-persistence/next-session-action" in route_paths
          print("remote session persistence phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Remote Session Persistence Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Workflow for remote session persistence validation.' >> "$GITHUB_STEP_SUMMARY"
