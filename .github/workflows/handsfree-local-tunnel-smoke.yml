name: Handsfree Local Tunnel Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/handsfree-local-tunnel-next'
    paths:
      - 'docs/handsfree-local-tunnel-next-plan.md'
      - 'frontend/mobile-shell/backend-presets.example.json'
      - 'frontend/mobile-shell/index.handsfree.html'
      - 'frontend/mobile-shell/app.handsfree.js'
      - 'frontend/mobile-shell/styles.handsfree.css'
      - '.github/workflows/handsfree-local-tunnel-smoke.yml'

jobs:
  smoke-handsfree-local-tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f docs/handsfree-local-tunnel-next-plan.md
          test -f frontend/mobile-shell/backend-presets.example.json
          test -f frontend/mobile-shell/index.handsfree.html
          test -f frontend/mobile-shell/app.handsfree.js
          test -f frontend/mobile-shell/styles.handsfree.css

      - name: Validate preset and UX markers
        run: |
          grep -q "Túnel privado/free" frontend/mobile-shell/index.handsfree.html
          grep -q "backendPresetSelect" frontend/mobile-shell/index.handsfree.html
          grep -q "copySummaryBtn" frontend/mobile-shell/index.handsfree.html
          grep -q "KEY_PRESET" frontend/mobile-shell/app.handsfree.js
          grep -q "applyPreset" frontend/mobile-shell/app.handsfree.js
          grep -q "private_tunnel" frontend/mobile-shell/backend-presets.example.json
          grep -q "three-col" frontend/mobile-shell/styles.handsfree.css
