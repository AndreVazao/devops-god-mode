name: Asset Workspace Sync Phase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'docs/asset-and-workspace-sync-plan.md'
      - 'backend/contracts/asset_sync.example.json'
      - 'backend/contracts/workspace_bridge.example.json'
      - 'backend/contracts/asset_preview.example.json'
      - 'backend/app/services/asset_workspace_sync_service.py'
      - 'backend/app/routes/asset_workspace_sync.py'
      - 'backend/main.py'
      - '.github/workflows/asset-workspace-sync-phase.yml'

jobs:
  asset-workspace-sync-phase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate asset workspace sync layer
        env:
          PYTHONPATH: backend
        run: |
          python - <<'PY'
          from main import app
          from app.services.asset_workspace_sync_service import asset_workspace_sync_service
          syncs = asset_workspace_sync_service.get_asset_syncs()["syncs"]
          bridges = asset_workspace_sync_service.get_workspace_bridges()["bridges"]
          previews = asset_workspace_sync_service.get_asset_previews()["previews"]
          package = asset_workspace_sync_service.get_sync_package()["package"]
          next_action = asset_workspace_sync_service.get_next_sync_action()["next_sync_action"]
          route_paths = {route.path for route in app.routes}
          assert syncs
          assert bridges
          assert previews
          assert next_action is not None
          assert package["mobile_compact"] is True
          assert "/api/asset-workspace-sync/status" in route_paths
          assert "/api/asset-workspace-sync/syncs" in route_paths
          assert "/api/asset-workspace-sync/workspaces" in route_paths
          assert "/api/asset-workspace-sync/previews" in route_paths
          assert "/api/asset-workspace-sync/next-sync-action" in route_paths
          print("asset workspace sync phase passed")
          PY
      - name: Build summary
        run: |
          echo '## Asset Workspace Sync Phase Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- Added asset transfer, workspace bridge and preview approval layer for the local first runtime.' >> "$GITHUB_STEP_SUMMARY"
